                        specialItem.revealed = gameState.specialItem.revealed;
                    }
                    
                    const now = Date.now();
                    const oneWeek = 7 * 24 * 60 * 60 * 1000;
                    if (now - (gameState.battlePass.lastReset || 0) > oneWeek) {
                        gameState.battlePass = { level: 1, exp: 0, claimed: [], lastReset: now };
                    }
                    
                    const lastOnline = gameState.lastOnlineTime || now;
                    const secondsPassed = Math.floor((now - lastOnline) / 1000);
                    
                    if (secondsPassed > 10) {
                        calculateOfflineEarnings(secondsPassed);
                        updateTaxesOffline(secondsPassed);
                    }
                    
                    gameState.lastOnlineTime = now;
                    
                    return true;
                } catch(e) {
                    return false;
                }
            }
            return false;
        }
        
        function saveGame() {
            if (gameState) {
                gameState.lastOnlineTime = Date.now();
                gameState.cryptoPrices = cryptoPrices;
                gameState.specialItem = { owned: specialItem.owned, revealed: specialItem.revealed };
                const saveData = {
                    gameState: gameState,
                    settings: settings,
                    nickname: currentUser
                };
                localStorage.setItem('imperiaClickerSave_' + currentUserId, JSON.stringify(saveData));
            }
        }
        
        function updateTaxesOffline(seconds) {
            if (!gameState.taxes) return;
            
            const hoursPassed = seconds / 3600;
            
            gameState.taxes.forEach(tax => {
                if (!tax.paid) {
                    tax.accrued += tax.hourlyRate * hoursPassed;
                    if (tax.accrued > tax.totalAmount) {
                        tax.accrued = tax.totalAmount;
                    }
                    
                    // Проверка на просрочку
                    const now = Date.now();
                    if (now > tax.dueDate && tax.accrued < tax.totalAmount) {
                        tax.overdue = true;
                    }
                }
            });
        }
        
        function calculateOfflineEarnings(seconds) {
            let income = 0;
            
            if (gameState.autoClickerLevel > 0) {
                income += gameState.autoClickerLevel * seconds;
            }
            
            if (gameState.myBusinesses && gameState.myBusinesses.length > 0) {
                gameState.myBusinesses.forEach(b => {
                    // Проверяем, оплачен ли налог
                    const taxItem = gameState.taxes.find(t => t.type === 'business' && t.id === b.id);
                    if (!taxItem || (taxItem.paid && taxItem.accrued < taxItem.totalAmount) || (!taxItem.paid && taxItem.accrued < taxItem.totalAmount && Date.now() <= taxItem.dueDate)) {
                        let inc = (b.income || 0) * seconds;
                        if (b.manager) {
                            inc *= (1 + b.manager.level * 0.1);
                        }
                        if (gameState.businessPassUpgraded) {
                            inc *= 1.5;
                        }
                        income += inc;
                        b.totalEarned = (b.totalEarned || 0) + inc;
                    }
                });
            }
            
            if (gameState.crypto && cryptoPrices) {
                gameState.crypto.forEach(c => {
                    const taxItem = gameState.taxes.find(t => t.type === 'crypto' && t.id === c.id);
                    if ((!taxItem || (taxItem.paid && taxItem.accrued < taxItem.totalAmount) || (!taxItem.paid && taxItem.accrued < taxItem.totalAmount && Date.now() <= taxItem.dueDate)) && c.owned > 0) {
                        const cryptoData = cryptoCurrencies.find(cr => cr.id === c.id);
                        if (cryptoData) {
                            income += cryptoData.incomePerCoin * c.owned * seconds;
                        }
                    }
                });
            }
            
            if (gameState.miningFarms) {
                const now = Date.now();
                gameState.miningFarms.forEach(farm => {
                    const taxItem = gameState.taxes.find(t => t.type === 'mining' && t.id === farm.id);
                    if (!taxItem || (taxItem.paid && taxItem.accrued < taxItem.totalAmount) || (!taxItem.paid && taxItem.accrued < taxItem.totalAmount && Date.now() <= taxItem.dueDate)) {
                        const timePassed = (now - (farm.lastUpdate || now)) / 1000;
                        farm.progress += timePassed * farm.level;
                        farm.lastUpdate = now;
                        
                        while (farm.progress >= farm.maxProgress) {
                            farm.progress -= farm.maxProgress;
                            const earned = Math.floor(farm.crypto.basePrice * farm.level * 1000);
                            gameState.balance += earned;
                            gameState.totalEarned += earned;
                            income += earned;
                        }
                    }
                });
            }
            
            if (gameState.houses) {
                gameState.houses.forEach(h => {
                    if (h.owned) {
                        const taxItem = gameState.taxes.find(t => t.type === 'house' && t.id === h.id);
                        if (!taxItem || (taxItem.paid && taxItem.accrued < taxItem.totalAmount) || (!taxItem.paid && taxItem.accrued < taxItem.totalAmount && Date.now() <= taxItem.dueDate)) {
                            let houseIncome = h.baseIncome;
                            const upgradeCount = Object.values(h.upgrades).reduce((a, b) => a + b, 0);
                            houseIncome *= (1 + upgradeCount);
                            income += houseIncome * seconds;
                        }
                    }
                });
            }
            
            if (gameState.islands) {
                gameState.islands.forEach(i => {
                    if (i.owned) {
                        const taxItem = gameState.taxes.find(t => t.type === 'island' && t.id === i.id);
                        if (!taxItem || (taxItem.paid && taxItem.accrued < taxItem.totalAmount) || (!taxItem.paid && taxItem.accrued < taxItem.totalAmount && Date.now() <= taxItem.dueDate)) {
                            income += i.income * seconds;
                        }
                    }
                });
            }
            
            if (specialItem.owned) {
                income += specialItem.income * seconds;
            }
            
            if (income > 0) {
                const earned = Math.floor(income);
                gameState.balance = (gameState.balance || 0) + earned;
                gameState.totalEarned = (gameState.totalEarned || 0) + earned;
                
                if (gameState.battlePass && gameState.battlePass.level < 200) {
                    gameState.battlePass.exp += 100 * seconds;
                    checkBattlePassLevel();
                }
            }
        }
        
        function updateCryptoPrices() {
            cryptoPrices = cryptoPrices.map((price, i) => {
                const crypto = cryptoCurrencies[i];
                const change = (Math.random() - 0.5) * 2 * crypto.volatility;
                let newPrice = price * (1 + change);
                newPrice = Math.max(newPrice, crypto.basePrice * 0.1);
                newPrice = Math.min(newPrice, crypto.basePrice * 10);
                return Math.floor(newPrice);
            });
        }
        
        function calculateTotalCryptoPortfolio() {
            if (!gameState || !cryptoPrices) return 0;
            
            let total = 0;
            gameState.crypto.forEach(c => {
                if (c.owned > 0) {
                    const cryptoData = cryptoCurrencies.find(cr => cr.id === c.id);
                    if (cryptoData) {
                        const price = cryptoPrices[c.id] || cryptoData.basePrice;
                        total += price * c.owned;
                    }
                }
            });
            return total;
        }
        
        function calculateTotalCryptoIncome() {
            if (!gameState) return 0;
            
            let total = 0;
            gameState.crypto.forEach(c => {
                if (c.owned > 0) {
                    const cryptoData = cryptoCurrencies.find(cr => cr.id === c.id);
                    if (cryptoData) {
                        total += cryptoData.incomePerCoin * c.owned;
                    }
                }
            });
            return total;
        }
        
        // ========== НАЛОГИ ==========
        function addTaxItem(type, id, value) {
            if (!gameState.taxes) gameState.taxes = [];
            
            // Проверяем, есть ли уже такой налог
            const existing = gameState.taxes.find(t => t.type === type && t.id === id);
            if (existing) {
                existing.value += value;
                existing.totalAmount = Math.floor(existing.value * TAX_RATE);
                existing.hourlyRate = existing.totalAmount / 72;
                existing.paid = false;
                existing.accrued = 0;
                existing.dueDate = Date.now() + TAX_PERIOD;
                return;
            }
            
            const totalAmount = Math.floor(value * TAX_RATE);
            gameState.taxes.push({
                type: type,
                id: id,
                value: value,
                totalAmount: totalAmount,
                hourlyRate: totalAmount / 72,
                accrued: 0,
                dueDate: Date.now() + TAX_PERIOD,
                paid: false,
                overdue: false
            });
        }
        
        function updateTaxes() {
            if (!gameState.taxes) return;
            
            const now = Date.now();
            
            gameState.taxes.forEach(tax => {
                if (!tax.paid) {
                    // Добавляем налог за прошедший час
                    tax.accrued += tax.hourlyRate;
                    if (tax.accrued > tax.totalAmount) {
                        tax.accrued = tax.totalAmount;
                    }
                    
                    // Проверка на просрочку
                    if (now > tax.dueDate && tax.accrued < tax.totalAmount) {
                        tax.overdue = true;
                    }
                }
            });
        }
        
        function payTax(type, id) {
            const taxItem = gameState.taxes.find(t => t.type === type && t.id === id);
            if (!taxItem || taxItem.paid) return false;
            
            const amountToPay = Math.floor(taxItem.accrued);
            
            if (amountToPay <= 0) {
                alert('❌ НЕТ НАЧИСЛЕННЫХ НАЛОГОВ!');
                return false;
            }
            
            if (gameState.balance < amountToPay) {
                alert('❌ НЕДОСТАТОЧНО МОНЕТ ДЛЯ УПЛАТЫ НАЛОГА!');
                return false;
            }
            
            gameState.balance -= amountToPay;
            taxItem.paid = true;
            taxItem.accrued = 0;
            taxItem.overdue = false;
            
            saveGame();
            updateUI();
            renderCurrentTab();
            alert(`✅ Налог оплачен: ${formatMoney(amountToPay)}`);
            return true;
        }
        
        function getTaxStatus(taxItem) {
            if (!taxItem) return 'none';
            if (taxItem.paid) return 'paid';
            if (taxItem.overdue) return 'overdue';
            const timeLeft = taxItem.dueDate - Date.now();
            if (timeLeft < 12 * 60 * 60 * 1000) return 'soon';
            return 'normal';
        }
        
        function formatTimeLeft(ms) {
            if (ms < 0) return 'ПРОСРОЧЕНО';
            const hours = Math.floor(ms / (60 * 60 * 1000));
            const minutes = Math.floor((ms % (60 * 60 * 1000)) / (60 * 1000));
            return `${hours}ч ${minutes}м`;
        }

            const t = businessTemplates[business.templateId];
            if (!t) return;

            business.income = Math.floor(t.baseIncome * Math.pow(t.incomeMultiplier, business.level - 1));

                taxItem.value += (business.upgradeCost || 0) / (t.costMultiplier);

                taxItem.hourlyRate = taxItem.totalAmount / 72;
                taxItem.paid = false;
                taxItem.accrued = 0;

            updateUI();

        function executeTrade(cryptoId, type) {
            const crypto = cryptoCurrencies.find(c => c.id === cryptoId);
            const userCrypto = gameState.crypto.find(c => c.id === cryptoId);
            const currentPrice = cryptoPrices[cryptoId] || crypto.basePrice;
            const amount = parseInt(document.getElementById('tradeAmount')?.value);
            
            if (!amount || amount <= 0) {
                alert('❌ Введите количество!');
                return;
            }
            
            if (type === 'buy') {
                const maxBuy = crypto.maxBuy - userCrypto.owned;
                if (amount > maxBuy) {
                    alert(`❌ Можно купить только ${formatFullNumber(maxBuy)}!`);
                    return;
                }
                
                const totalPrice = currentPrice * amount;
                if (gameState.balance < totalPrice) {
                    alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
                    return;
                }
                
                gameState.balance -= totalPrice;
                userCrypto.owned += amount;
                
                // Добавляем налог на крипту
                const taxItem = gameState.taxes.find(t => t.type === 'crypto' && t.id === cryptoId);
                if (taxItem) {
                    taxItem.value += totalPrice;
                    taxItem.totalAmount = Math.floor(taxItem.value * TAX_RATE);
                    taxItem.hourlyRate = taxItem.totalAmount / 72;
                    taxItem.paid = false;
                    taxItem.accrued = 0;
                    taxItem.dueDate = Date.now() + TAX_PERIOD;
                } else {
                    addTaxItem('crypto', cryptoId, totalPrice);
                }
                
                saveGame();
                updateUI();
                closeModal();
                alert(`✅ Куплено ${amount} ${crypto.name} за ${formatMoney(totalPrice)}`);
                
            } else {
                if (amount > userCrypto.owned) {
                    alert(`❌ У вас только ${formatFullNumber(userCrypto.owned)}!`);
                    return;
                }
                
                const totalPrice = currentPrice * amount;
                gameState.balance += totalPrice;
                userCrypto.owned -= amount;
                
                // Если продали всю крипту, удаляем налог
                if (userCrypto.owned === 0) {
                    const taxIndex = gameState.taxes.findIndex(t => t.type === 'crypto' && t.id === cryptoId);
                    if (taxIndex !== -1) gameState.taxes.splice(taxIndex, 1);
                }
                
                saveGame();
                updateUI();
                closeModal();
                alert(`✅ Продано ${amount} ${crypto.name} за ${formatMoney(totalPrice)}`);
            }
        }

        // ========== БОЕВОЙ ПРОПУСК ==========
        function checkBattlePassLevel() {
            if (!gameState.battlePass) {
                gameState.battlePass = { level: 1, exp: 0, claimed: [], lastReset: Date.now() };
            }
            
            if (gameState.battlePass.level >= 200) return;
            
            const expNeeded = 10000 * gameState.battlePass.level;
            
            while (gameState.battlePass.exp >= expNeeded && gameState.battlePass.level < 200) {
                gameState.battlePass.exp -= expNeeded;
                gameState.battlePass.level++;
            }
        }
        
        function getTimeUntilNextPass() {
            const now = Date.now();
            const lastReset = gameState.battlePass?.lastReset || now;
            const oneWeek = 7 * 24 * 60 * 60 * 1000;
            const timeLeft = oneWeek - (now - lastReset);
            
            if (timeLeft <= 0) return "Обновляется...";
            
            const days = Math.floor(timeLeft / (24 * 60 * 60 * 1000));
            const hours = Math.floor((timeLeft % (24 * 60 * 60 * 1000)) / (60 * 60 * 1000));
            const minutes = Math.floor((timeLeft % (60 * 60 * 1000)) / (60 * 1000));
            
            return `${days}д ${hours}ч ${minutes}м`;
        }
        
        function claimBattlePassReward(level) {
            if (!gameState.battlePass) return;
            if (gameState.battlePass.claimed.includes(level)) return;
            if (level > gameState.battlePass.level) return;
            
            let moneyReward = level * 10000;
            gameState.balance += moneyReward;
            
            if (level % 5 === 0) {
                gameState.diamonds += 10;
            }
            
            if (level % 10 === 0) {
                const randomCrypto = cryptoCurrencies[Math.floor(Math.random() * cryptoCurrencies.length)];
                const userCrypto = gameState.crypto.find(c => c.id === randomCrypto.id);
                userCrypto.owned += 100000;
                alert(`🎉 Вы получили 100,000 ${randomCrypto.name}!`);
            }
            
            if (level === 200) {
                gameState.businessSlots = (gameState.businessSlots || MAX_BUSINESSES) + 1;
                alert('🎉 ПОЗДРАВЛЯЕМ! Вы получили +1 слот для бизнеса!');
            }
            
            gameState.battlePass.claimed.push(level);
            saveGame();
            updateUI();
            renderTab('profile');
            alert(`✅ Получено ${formatMoney(moneyReward)} за ${level} уровень пропуска!`);
        }

        // ========== ОБНОВЛЕНИЕ ИНТЕРФЕЙСА ==========
        function updateUI() {
            if (!gameState) return;
            
            document.getElementById('balance').textContent = formatMoney(gameState.balance || 0);
            
            const totalEarned = gameState.totalEarned || 0;
            const percentChange = totalEarned > 0 ? ((gameState.balance - totalEarned) / totalEarned * 100).toFixed(2) : 0;
            document.getElementById('balanceChange').innerHTML = `+ ${formatMoney(totalEarned)} (${percentChange}%) за все время`;
            
            const clickPower = BASE_CLICK_POWER * gameState.level;
            document.getElementById('clickPower').textContent = '$ ' + formatNumber(clickPower) + ' тыс.';
            
            const now = Date.now();
            if (gameState.myBusinesses) {
                gameState.myBusinesses.forEach((business, index) => {
                    if (business.upgradeEnd && business.upgradeEnd <= now) {
                        completeUpgrade(index);
                    }
                });
            }
            
            if (gameState.miningFarms) {
                gameState.miningFarms.forEach(farm => {
                    const timePassed = (now - (farm.lastUpdate || now)) / 1000;
                    farm.progress += timePassed * farm.level;
                    farm.lastUpdate = now;
                    
                    // Проверяем налог перед начислением дохода
                    const taxItem = gameState.taxes.find(t => t.type === 'mining' && t.id === farm.id);
                    if (!taxItem || (taxItem.paid && taxItem.accrued < taxItem.totalAmount) || (!taxItem.paid && taxItem.accrued < taxItem.totalAmount && now <= taxItem.dueDate)) {
                        while (farm.progress >= farm.maxProgress) {
                            farm.progress -= farm.maxProgress;
                            const earned = Math.floor(farm.crypto.basePrice * farm.level * 1000);
                            gameState.balance += earned;
                            gameState.totalEarned += earned;
                        }
                    }
                });
            }
            
            // Обновляем налоги
            updateTaxes();
            
            renderCurrentTab();
        }
        
        function playClickSound() {
            if (!settings.soundEnabled) return;
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.type = 'sine';
                oscillator.frequency.value = 523.25;
                gainNode.gain.value = 0.1;
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.05);
            } catch(e) {}
        }
        
        function createFloatingEffect(x, y, text) {
            if (!settings.effectsEnabled) return;
            const el = document.createElement('div');
            el.className = 'floating-effect';
            el.textContent = text;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }
        
        function handleClick(event) {
            if (!gameState) return;
            
            const clickPower = BASE_CLICK_POWER * gameState.level;
            
            const earned = Math.floor(clickPower);
            gameState.balance = (gameState.balance || 0) + earned;
            gameState.totalClicks = (gameState.totalClicks || 0) + 1;
            gameState.totalEarned = (gameState.totalEarned || 0) + earned;
            gameState.exp = (gameState.exp || 0) + earned / 100;
            
            if (gameState.battlePass && gameState.battlePass.level < 200) {
                gameState.battlePass.exp += 100;
                checkBattlePassLevel();
            }
            
            const expNeeded = gameState.level * 1500;
            while (gameState.exp >= expNeeded && gameState.level < MAX_PLAYER_LEVEL) {
                gameState.exp -= expNeeded;
                gameState.level = (gameState.level || 1) + 1;
                gameState.diamonds = (gameState.diamonds || 0) + 5;
            }
            
            if (gameState.level >= MAX_PLAYER_LEVEL) {
                gameState.exp = 0;
            }
            
            playClickSound();
            if (event) {
                createFloatingEffect(event.clientX, event.clientY, `+${formatNumber(earned)}💰`);
            }
            
            updateUI();
            saveGame();
        }

                addTaxItem('crypto', crypto.id, totalPrice);

            saveGame();
            updateUI();
            alert(`✅ Выдано ${amount} ${crypto.name}`);
        }

        // ========== АВТОМАТИЧЕСКИЙ ДОХОД ==========
        setInterval(() => {
            if (!gameState) return;
            
            let income = 0;
            
            if (gameState.autoClickerLevel > 0) {
                income += gameState.autoClickerLevel;
            }
            
            if (gameState.myBusinesses && gameState.myBusinesses.length > 0) {
                gameState.myBusinesses.forEach(b => {
                    const taxItem = gameState.taxes.find(t => t.type === 'business' && t.id === b.id);
                    if (!taxItem || (taxItem.paid && taxItem.accrued < taxItem.totalAmount) || (!taxItem.paid && taxItem.accrued < taxItem.totalAmount && Date.now() <= taxItem.dueDate)) {
                        let inc = b.income || 0;
                        if (b.manager) {
                            inc *= (1 + b.manager.level * 0.1);
                        }
                        if (gameState.businessPassUpgraded) {
                            inc *= 1.5;
                        }
                        income += inc;
                        b.totalEarned = (b.totalEarned || 0) + inc;
                    }
                    
                    if (gameState.battlePass && gameState.battlePass.level < 200) {
                        gameState.battlePass.exp += 100;
                    }
                });
            }
            
            if (gameState.crypto && cryptoPrices) {
                gameState.crypto.forEach(c => {
                    const taxItem = gameState.taxes.find(t => t.type === 'crypto' && t.id === c.id);
                    if ((!taxItem || (taxItem.paid && taxItem.accrued < taxItem.totalAmount) || (!taxItem.paid && taxItem.accrued < taxItem.totalAmount && Date.now() <= taxItem.dueDate)) && c.owned > 0) {
                        const cryptoData = cryptoCurrencies.find(cr => cr.id === c.id);
                        if (cryptoData) {
                            income += cryptoData.incomePerCoin * c.owned;
                        }
                    }
                });
            }
            
            if (gameState.miningFarms) {
                const now = Date.now();
                gameState.miningFarms.forEach(farm => {
                    const taxItem = gameState.taxes.find(t => t.type === 'mining' && t.id === farm.id);
                    if (!taxItem || (taxItem.paid && taxItem.accrued < taxItem.totalAmount) || (!taxItem.paid && taxItem.accrued < taxItem.totalAmount && now <= taxItem.dueDate)) {
                        const timePassed = (now - (farm.lastUpdate || now)) / 1000;
                        farm.progress += timePassed * farm.level;
                        farm.lastUpdate = now;
                        
                        while (farm.progress >= farm.maxProgress) {
                            farm.progress -= farm.maxProgress;
                            const earned = Math.floor(farm.crypto.basePrice * farm.level * 1000);
                            gameState.balance += earned;
                            gameState.totalEarned += earned;
                            income += earned;
                        }
                    }
                });
            }
            
            if (gameState.houses) {
                gameState.houses.forEach(h => {
                    if (h.owned) {
                        const taxItem = gameState.taxes.find(t => t.type === 'house' && t.id === h.id);
                        if (!taxItem || (taxItem.paid && taxItem.accrued < taxItem.totalAmount) || (!taxItem.paid && taxItem.accrued < taxItem.totalAmount && Date.now() <= taxItem.dueDate)) {
                            let houseIncome = h.baseIncome;
                            const upgradeCount = Object.values(h.upgrades).reduce((a, b) => a + b, 0);
                            houseIncome *= (1 + upgradeCount);
                            income += houseIncome;
                        }
                    }
                });
            }
            
            if (gameState.islands) {
                gameState.islands.forEach(i => {
                    if (i.owned) {
                        const taxItem = gameState.taxes.find(t => t.type === 'island' && t.id === i.id);
                        if (!taxItem || (taxItem.paid && taxItem.accrued < taxItem.totalAmount) || (!taxItem.paid && taxItem.accrued < taxItem.totalAmount && Date.now() <= taxItem.dueDate)) {
                            income += i.income;
                        }
                    }
                });
            }
            
            if (specialItem.owned) {
                income += specialItem.income;
            }
            
            if (income > 0) {
                gameState.balance = (gameState.balance || 0) + Math.floor(income);
                gameState.totalEarned = (gameState.totalEarned || 0) + Math.floor(income);
            }
            
            updateTaxes();
            checkBattlePassLevel();
            
            updateUI();
            saveGame();
        }, 1000);
        
        setInterval(() => {
            if (gameState) {
                updateUI();
            }
        }, 100);
        
        setInterval(() => {
            if (gameState) {
                updateCryptoPrices();
                const activeTab = document.querySelector('.nav-item.active');
                if (activeTab && activeTab.dataset.tab === 'investments') {
                    renderTab('investments');
                }
            }
        }, 300000);
        
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                if (!gameState) return;
                
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                this.classList.add('active');
                if (isAdmin) {
                    this.classList.add('admin-active');
                }
                renderTab(this.dataset.tab);
            });
        });
        
        window.onload = function() {
            if (loadGame()) {
                if (ADMIN_SECRETS.includes(currentUser)) {
                    enableAdminMode();
                }
                
                document.getElementById('username').innerHTML = `👑 ${currentUser} <span class="warning-badge">⚠️ ЛОКАЛЬНО</span>`;
                if (specialItem.owned) {
                    document.getElementById('username').innerHTML += ' <span class="suguru-badge">💎</span>';
                }
                updateUI();
                renderTab('earn');
            } else {
                const randomNum = Math.floor(Math.random() * 900 + 100);
                currentUser = `ИГРОК${randomNum}`;
                
                gameState = {
                    balance: 0,
                    diamonds: 1000,
                    exp: 0,
                    level: 1,
                    clickPower: 1,
                    clickPowerLevel: 0,
                    autoClickerLevel: 0,
                    critLevel: 0,
                    totalClicks: 0,
                    totalEarned: 0,
                    playTime: 0,
                    lastOnlineTime: Date.now(),
                    myBusinesses: [],
                    miningFarms: [],
                    battlePass: { level: 1, exp: 0, claimed: [], lastReset: Date.now() },
                    businessSlots: MAX_BUSINESSES,
                    businessPassUpgraded: false,
                    houses: houses.map(h => ({ ...h })),
                    islands: islands.map(i => ({ ...i })),
                    garages: { cars: [], planes: [], ships: [] },
                    crypto: cryptoCurrencies.map(c => ({ id: c.id, owned: 0 })),
                    cryptoPrices: cryptoCurrencies.map(c => c.basePrice),
                    taxes: []
                };
                
                cryptoPrices = gameState.cryptoPrices;
                
                document.getElementById('username').innerHTML = `👑 ${currentUser} <span class="warning-badge">⚠️ ЛОКАЛЬНО</span>`;
                updateUI();
                renderTab('earn');
                saveGame();
            }
            
            window.handleClick = handleClick;
            window.buySalonItem = buySalonItem;
            window.sellGarageItem = sellGarageItem;
            window.buyHouse = buyHouse;
            window.sellHouse = sellHouse;
            window.upgradeHouse = upgradeHouse;
            window.buyIsland = buyIsland;
            window.showSalon = showSalon;
            window.showGarage = showGarage;
            window.showHousesModal = showHousesModal;
            window.closeHousesModal = closeHousesModal;
            window.openHouseModal = openHouseModal;
            window.showMyIslands = showMyIslands;
            window.closeIslandsModal = closeIslandsModal;
            window.buyBusiness = buyBusiness;
            window.startUpgrade = startUpgrade;
            window.hireManager = hireManager;
            window.sellBusiness = sellBusiness;
            window.upgradeBusinessPass = upgradeBusinessPass;
            window.showBuyBusinessModal = showBuyBusinessModal;
            window.openBusinessModal = openBusinessModal;
            window.buyMiningFarm = buyMiningFarm;
            window.upgradeMiningFarm = upgradeMiningFarm;
            window.sellMiningFarm = sellMiningFarm;
            window.openTradeModal = openTradeModal;
            window.setTradeAmount = setTradeAmount;
            window.quickBuyMaxMoney = quickBuyMaxMoney;
            window.quickSellAll = quickSellAll;
            window.executeTrade = executeTrade;
            window.showCryptoPortfolio = showCryptoPortfolio;
            window.showAllCrypto = showAllCrypto;
            window.buySpecialItem = buySpecialItem;
            window.showBattlePass = showBattlePass;
            window.claimBattlePassReward = claimBattlePassReward;
            window.changePassPage = changePassPage;
            window.closeModal = closeModal;
            window.showTop100 = showTop100;
            window.closeTopModal = closeTopModal;
            window.payTax = payTax;
            window.resetGame = resetGame;
            window.showNicknameModal = showNicknameModal;
            window.closeNicknameModal = closeNicknameModal;
            window.saveNickname = saveNickname;
            window.toggleSound = toggleSound;
            window.toggleEffects = toggleEffects;
            window.renderTab = renderTab;
            
            window.showAdminPanel = showAdminPanel;
            window.closeAdminModal = closeAdminModal;
            window.adminGiveMoney = adminGiveMoney;
            window.adminGiveDiamonds = adminGiveDiamonds;
            window.adminGiveCrypto = adminGiveCrypto;
            window.adminGiveBusiness = adminGiveBusiness;
            window.adminGiveFarm = adminGiveFarm;
            window.adminResetMoney = adminResetMoney;
            window.adminResetDiamonds = adminResetDiamonds;
            window.adminResetLevel = adminResetLevel;
            window.adminResetPlayer = adminResetPlayer;
            
            window.showAdminPasswordModal = showAdminPasswordModal;
            window.closeAdminPasswordModal = closeAdminPasswordModal;
            window.checkAdminPassword = checkAdminPassword;
        };
    </script>
</body>
</html>
