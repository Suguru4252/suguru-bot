        function formatNumber(num) {
            if (num >= 1e12) return (num / 1e12).toFixed(2) + 'T';
            if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(2) + 'K';
            return Math.floor(num).toString();
        }
        
        function formatFullNumber(num) {
            return Math.floor(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }
        
        function formatMoney(num) {
            return '$ ' + formatFullNumber(num);
        }
        
        // ========== ЗАГРУЗКА/СОХРАНЕНИЕ ==========
        function loadGame() {
            const saved = localStorage.getItem('imperiaClickerSave_' + currentUserId);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    gameState = data.gameState;
                    settings = data.settings || { soundEnabled: true, effectsEnabled: true };
                    currentUser = data.nickname || "ИГРОК";
                    
                    if (!gameState.houses) {
                        gameState.houses = houses.map(h => ({ ...h }));
                    }
                    
                    if (!gameState.garages) {
                        gameState.garages = { cars: [], planes: [], ships: [] };
                    }
                    
                    if (!gameState.crypto) {
                        gameState.crypto = cryptoCurrencies.map(c => ({ id: c.id, owned: 0 }));
                    }
                    
                    if (!gameState.cryptoPrices) {
                        cryptoPrices = cryptoCurrencies.map(c => c.basePrice);
                        gameState.cryptoPrices = cryptoPrices;
                    } else {
                        cryptoPrices = gameState.cryptoPrices;
                    }
                    
                    if (!gameState.myBusinesses) {
                        gameState.myBusinesses = [];
                    }
                    
                    if (!gameState.battlePass) {
                        gameState.battlePass = { level: 1, exp: 0, claimed: [], lastReset: Date.now() };
                    }
                    
                    if (gameState.specialItem === undefined) {
                        gameState.specialItem = { owned: false, revealed: false };
                    } else {
                        specialItem.owned = gameState.specialItem.owned;
                        specialItem.revealed = gameState.specialItem.revealed;
                    }
                    
                    const now = Date.now();
                    const oneWeek = 7 * 24 * 60 * 60 * 1000;
                    if (now - (gameState.battlePass.lastReset || 0) > oneWeek) {
                        gameState.battlePass = { level: 1, exp: 0, claimed: [], lastReset: now };
                    }
                    
                    const lastOnline = gameState.lastOnlineTime || now;
                    const secondsPassed = Math.floor((now - lastOnline) / 1000);
                    
                    if (secondsPassed > 10) {
                        calculateOfflineEarnings(secondsPassed);
                    }
                    
                    gameState.lastOnlineTime = now;
                    
                    return true;
                } catch(e) {
                    return false;
                }
            }
            return false;
        }
        
        function saveGame() {
            if (gameState) {
                gameState.lastOnlineTime = Date.now();
                gameState.cryptoPrices = cryptoPrices;
                gameState.specialItem = { owned: specialItem.owned, revealed: specialItem.revealed };
                const saveData = {
                    gameState: gameState,
                    settings: settings,
                    nickname: currentUser
                };
                localStorage.setItem('imperiaClickerSave_' + currentUserId, JSON.stringify(saveData));
            }
        }
        
        function calculateOfflineEarnings(seconds) {
            let income = 0;
            
            if (gameState.autoClickerLevel > 0) {
                income += gameState.autoClickerLevel * seconds;
            }
            
            if (gameState.myBusinesses && gameState.myBusinesses.length > 0) {
                gameState.myBusinesses.forEach(b => {
                    let inc = (b.income || 0) * seconds;
                    income += inc;
                });
            }
            
            if (gameState.crypto && cryptoPrices) {
                gameState.crypto.forEach(c => {
                    if (c.owned > 0) {
                        const cryptoData = cryptoCurrencies.find(cr => cr.id === c.id);
                        if (cryptoData) {
                            income += (cryptoData.incomePerCoin * c.owned) * seconds;
                        }
                    }
                });
            }
            
            if (gameState.houses) {
                gameState.houses.forEach(h => {
                    if (h.owned) {
                        let houseIncome = h.baseIncome;
                        const upgradeCount = Object.values(h.upgrades).reduce((a, b) => a + b, 0);
                        houseIncome *= (1 + upgradeCount);
                        income += houseIncome;
                    }
                });
            }
            
            if (specialItem.owned) {
                income += specialItem.income * seconds;
            }
            
            if (income > 0) {
                const earned = Math.floor(income);
                gameState.balance = (gameState.balance || 0) + earned;
                gameState.totalEarned = (gameState.totalEarned || 0) + earned;
                
                if (gameState.battlePass && gameState.battlePass.level < 200) {
                    gameState.battlePass.exp += 100 * seconds;
                    checkBattlePassLevel();
                }
            }
        }
        
        function updateCryptoPrices() {
            cryptoPrices = cryptoPrices.map((price, i) => {
                const crypto = cryptoCurrencies[i];
                const change = (Math.random() - 0.5) * 2 * crypto.volatility;
                let newPrice = price * (1 + change);
                newPrice = Math.max(newPrice, crypto.basePrice * 0.1);
                newPrice = Math.min(newPrice, crypto.basePrice * 10);
                return Math.floor(newPrice);
            });
        }
        
        function calculateTotalCryptoPortfolio() {
            if (!gameState || !cryptoPrices) return 0;
            
            let total = 0;
            gameState.crypto.forEach(c => {
                if (c.owned > 0) {
                    const cryptoData = cryptoCurrencies.find(cr => cr.id === c.id);
                    if (cryptoData) {
                        const price = cryptoPrices[c.id] || cryptoData.basePrice;
                        total += price * c.owned;
                    }
                }
            });
            return total;
        }
        
        function calculateTotalCryptoIncome() {
            if (!gameState) return 0;
            
            let total = 0;
            gameState.crypto.forEach(c => {
                if (c.owned > 0) {
                    const cryptoData = cryptoCurrencies.find(cr => cr.id === c.id);
                    if (cryptoData) {
                        total += cryptoData.incomePerCoin * c.owned;
                    }
                }
            });
            return total;
        }

            const house = gameState.houses.find(h => h.id === houseId);
            if (!house || !house.owned) return;
            
            const costs = {
                interior: 50000000 * Math.pow(2, house.upgrades.interior),
                kitchen: 100000000 * Math.pow(2, house.upgrades.kitchen),
                bed: 150000000 * Math.pow(2, house.upgrades.bed),
                antenna: 200000000 * Math.pow(2, house.upgrades.antenna),
                tv: 300000000 * Math.pow(2, house.upgrades.tv)
            };
            
            const cost = costs[upgradeType];
            if (gameState.balance < cost) {
                alert('❌ НЕДОСТАТОЧНО МОНЕТ!');

            gameState.balance -= cost;

            const business = gameState.myBusinesses[index];

            if ((business.level || 1) >= t.maxLevel) {
                alert('❌ МАКСИМАЛЬНЫЙ УРОВЕНЬ!');

            if (business.upgradeEnd && business.upgradeEnd > Date.now()) {
                alert('⏱️ УЛУЧШЕНИЕ УЖЕ ИДЕТ!');

            if ((gameState.balance || 0) < (business.upgradeCost || 0)) {
                alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
                return;
            }
            
            gameState.balance -= (business.upgradeCost || 0);
            
            business.upgradeEnd = Date.now() + ((business.upgradeTime || t.upgradeTime) * 1000);
            
            saveGame();
            updateUI();
            renderCurrentTab();
            
            alert(`✅ Улучшение запущено на ${business.upgradeTime || t.upgradeTime} сек.`);
        }
        
        function completeUpgrade(index) {
            const business = gameState.myBusinesses[index];
            if (!business) return;
            
            const t = businessTemplates[business.templateId];
            if (!t) return;
            
            business.level++;
            business.income = Math.floor(t.baseIncome * Math.pow(t.incomeMultiplier, business.level - 1));
            business.upgradeCost = Math.floor(t.baseUpgradeCost * Math.pow(t.costMultiplier, business.level - 1));
            business.upgradeTime = Math.floor((business.upgradeTime || t.upgradeTime) * 1.3);
            business.upgradeEnd = 0;
            
            saveGame();
            updateUI();
            renderCurrentTab();
        }

        function sellBusiness(index) {
            const business = gameState.myBusinesses[index];
            if (!business) return;
            
            const t = businessTemplates[business.templateId];
            if (!t) return;
            
            let totalSpent = t.baseUpgradeCost;
            let currentCost = t.baseUpgradeCost;
            for (let i = 1; i < (business.level || 1); i++) {
                currentCost = Math.floor(currentCost * t.costMultiplier);
                totalSpent += currentCost;
            }
            
            const sellPrice = Math.floor(totalSpent * 0.5);
            
            if (confirm(`Продать ${business.name} за ${formatMoney(sellPrice)}?`)) {
                gameState.myBusinesses.splice(index, 1);
                gameState.balance += sellPrice;
                
                saveGame();
                updateUI();
                renderCurrentTab();
                alert(`✅ Продано! +${formatMoney(sellPrice)}`);
            }
        }

        function quickBuyMaxMoney(cryptoId) {
            const crypto = cryptoCurrencies.find(c => c.id === cryptoId);
            const userCrypto = gameState.crypto.find(c => c.id === cryptoId);
            const currentPrice = cryptoPrices[cryptoId] || crypto.basePrice;
            
            const maxBuy = crypto.maxBuy - userCrypto.owned;
            const maxWithMoney = Math.floor(gameState.balance / currentPrice);
            const maxPossible = Math.min(maxBuy, maxWithMoney);
            
            const input = document.getElementById('tradeAmount');
            if (input) {

        function executeTrade(cryptoId, type) {
            const crypto = cryptoCurrencies.find(c => c.id === cryptoId);
            const userCrypto = gameState.crypto.find(c => c.id === cryptoId);
            const currentPrice = cryptoPrices[cryptoId] || crypto.basePrice;
            const amount = parseInt(document.getElementById('tradeAmount')?.value);
            
            if (!amount || amount <= 0) {
                alert('❌ Введите количество!');
                return;
            }
            
            if (type === 'buy') {
                const maxBuy = crypto.maxBuy - userCrypto.owned;
                if (amount > maxBuy) {
                    alert(`❌ Можно купить только ${formatFullNumber(maxBuy)}!`);
                    return;
                }
                
                const totalPrice = currentPrice * amount;
                if (gameState.balance < totalPrice) {
                    alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
                    return;
                }
                
                gameState.balance -= totalPrice;
                userCrypto.owned += amount;
                
                saveGame();
                updateUI();
                closeModal();
                alert(`✅ Куплено ${amount} ${crypto.name} за ${formatMoney(totalPrice)}`);
                
            } else {
                if (amount > userCrypto.owned) {
                    alert(`❌ У вас только ${formatFullNumber(userCrypto.owned)}!`);
                    return;
                }
                
                const totalPrice = currentPrice * amount;
                gameState.balance += totalPrice;
                userCrypto.owned -= amount;
                
                saveGame();
                updateUI();
                closeModal();
                alert(`✅ Продано ${amount} ${crypto.name} за ${formatMoney(totalPrice)}`);
            }
        }

        function checkBattlePassLevel() {
            if (!gameState.battlePass) {
                gameState.battlePass = { level: 1, exp: 0, claimed: [], lastReset: Date.now() };
            }
            
            if (gameState.battlePass.level >= 200) return;
            
            const expNeeded = 10000 * gameState.battlePass.level;
            
            while (gameState.battlePass.exp >= expNeeded && gameState.battlePass.level < 200) {
                gameState.battlePass.exp -= expNeeded;
                gameState.battlePass.level++;
            }
        }
        
        function claimBattlePassReward(level) {
            if (!gameState.battlePass) return;
            if (gameState.battlePass.claimed.includes(level)) return;
            if (level > gameState.battlePass.level) return;
            
            let moneyReward = level * 10000;
            gameState.balance += moneyReward;
            
            if (level % 5 === 0) {
                gameState.diamonds += 10;
            }
            
            if (level % 10 === 0) {
                const randomCrypto = cryptoCurrencies[Math.floor(Math.random() * cryptoCurrencies.length)];
                const userCrypto = gameState.crypto.find(c => c.id === randomCrypto.id);
                userCrypto.owned += 100000;
                alert(`🎉 Вы получили 100,000 ${randomCrypto.name}!`);
            }
            
            if (level === 200) {
                gameState.businessSlots = (gameState.businessSlots || MAX_BUSINESSES) + 1;
                alert('🎉 ПОЗДРАВЛЯЕМ! Вы получили +1 слот для бизнеса!');
            }
            
            gameState.battlePass.claimed.push(level);
            saveGame();
            updateUI();
            renderTab('profile');
            alert(`✅ Получено ${formatMoney(moneyReward)} за ${level} уровень пропуска!`);
        }

        function playClickSound() {
            if (!settings.soundEnabled) return;
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.type = 'sine';
                oscillator.frequency.value = 523.25;
                gainNode.gain.value = 0.1;
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.05);
            } catch(e) {}
        }
        
        function createFloatingEffect(x, y, text) {
            if (!settings.effectsEnabled) return;
            const el = document.createElement('div');
            el.className = 'floating-effect';
            el.textContent = text;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }
        
        function handleClick(event) {
            if (!gameState) return;
            
            const clickPower = BASE_CLICK_POWER * gameState.level;
            
            const earned = Math.floor(clickPower);
            gameState.balance = (gameState.balance || 0) + earned;
            gameState.totalClicks = (gameState.totalClicks || 0) + 1;
            gameState.totalEarned = (gameState.totalEarned || 0) + earned;
            gameState.exp = (gameState.exp || 0) + earned / 100;
            
            if (gameState.battlePass && gameState.battlePass.level < 200) {
                gameState.battlePass.exp += 100;
                checkBattlePassLevel();
            }
            
            // Прогрессия уровней - каждый уровень требует больше опыта
            const expNeeded = gameState.level * 1500; // 1500, 3000, 4500, 6000 и т.д.
            while (gameState.exp >= expNeeded) {
                gameState.exp -= expNeeded;
                gameState.level = (gameState.level || 1) + 1;
                gameState.diamonds = (gameState.diamonds || 0) + (gameState.level * 5);
            }
            
            playClickSound();
            if (event) {
                createFloatingEffect(event.clientX, event.clientY, `+${formatNumber(earned)}💰`);
            }
            
            updateUI();
            saveGame();
        }

                        </div>
                    ` : ''}
                    <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
                        <span>Заработано</span>
                        <span style="color:#ffd700;">${formatMoney(business.totalEarned || 0)}</span>
                    </div>
            `;
            
            if ((business.level || 1) < t.maxLevel) {
                if (business.upgradeEnd && business.upgradeEnd > Date.now()) {
                    const timeLeft = Math.ceil((business.upgradeEnd - Date.now()) / 1000);
                    content += `
                        <div style="color:#ff9800; text-align:center; margin:12px 0;">
                            ⏱️ Улучшение... ${timeLeft}с
                        </div>
                    `;
                } else {
                    content += `
                        <button class="card-btn" style="margin-top:12px;" onclick="startUpgrade(${index}); closeModal();">
                            🚀 Улучшить (${formatMoney(business.upgradeCost || 0)}) - ${business.upgradeTime || t.upgradeTime}с
                        </button>
                    `;
                }
            }
            
            content += `
                <button class="card-btn" style="margin-top:8px; background:#7b1fa2;" onclick="hireManager(${index}); closeModal();">
                    👔 Улучшить менеджера (50💎) ${business.manager ? `ур.${business.manager.level}/10` : ''}
                </button>
                <button class="card-btn" style="margin-top:8px; background:#ff9800;" onclick="sellBusiness(${index}); closeModal();">
                    Продать (${formatMoney(sellPrice)})
                </button>
                </div>
                <div class="close-btn" onclick="closeModal()">ЗАКРЫТЬ</div>
            `;
            
            modalContent.innerHTML = content;
            modal.classList.add('active');
        }
        
        // ========== НАСТРОЙКИ ==========
        function toggleSound() {
            settings.soundEnabled = !settings.soundEnabled;
            saveGame();
            renderCurrentTab();
        }
        
        function toggleEffects() {
            settings.effectsEnabled = !settings.effectsEnabled;
            saveGame();
            renderCurrentTab();
        }
        
        // ========== АДМИНКА ==========
        function showAdminPanel() {
            if (!isAdmin) return;
            
            const modal = document.getElementById('adminModal');
            const modalContent = document.getElementById('adminModalContent');
            
            let html = `
                <div class="modal-title" style="color:#ff4444;">🔧 АДМИН ПАНЕЛЬ</div>
                
                <div style="margin-bottom:16px;">
                    <button class="card-btn" style="background:#ff4444;" onclick="adminGiveMoney()">💰 ВЫДАТЬ ДЕНЬГИ</button>
                    <button class="card-btn" style="background:#ff4444; margin-top:8px;" onclick="adminGiveDiamonds()">💎 ВЫДАТЬ АЛМАЗЫ</button>
                    <button class="card-btn" style="background:#ff4444; margin-top:8px;" onclick="adminGiveCrypto()">📈 ВЫДАТЬ КРИПТУ</button>
                    <button class="card-btn" style="background:#ff4444; margin-top:8px;" onclick="adminGiveBusiness()">💼 ВЫДАТЬ БИЗНЕС</button>
                    <button class="card-btn" style="background:#ff4444; margin-top:8px;" onclick="adminResetMoney()">💰 ОБНУЛИТЬ ДЕНЬГИ</button>
                    <button class="card-btn" style="background:#ff4444; margin-top:8px;" onclick="adminResetDiamonds()">💎 ОБНУЛИТЬ АЛМАЗЫ</button>
                    <button class="card-btn" style="background:#ff4444; margin-top:8px;" onclick="adminResetLevel()">📊 ОБНУЛИТЬ УРОВЕНЬ</button>
                    <button class="card-btn" style="background:#ff4444; margin-top:8px;" onclick="adminResetPlayer()">🔄 ОБНУЛИТЬ ВСЁ</button>
                </div>
                
                <div class="close-btn" onclick="closeAdminModal()">ЗАКРЫТЬ</div>
            `;
            
            modalContent.innerHTML = html;
            modal.classList.add('active');
        }
        
        function closeAdminModal() {
            document.getElementById('adminModal').classList.remove('active');
        }
        
        function adminGiveMoney() {
            const amount = parseInt(prompt('Введите сумму монет:'));
            if (isNaN(amount) || amount <= 0) return;
            gameState.balance += amount;
            saveGame();
            updateUI();
            alert(`✅ Выдано ${formatMoney(amount)}`);
        }
        
        function adminGiveDiamonds() {
            const amount = parseInt(prompt('Введите количество алмазов:'));
            if (isNaN(amount) || amount <= 0) return;
            gameState.diamonds += amount;
            saveGame();
            updateUI();
            alert(`✅ Выдано ${amount}💎`);
        }
        
        function adminGiveCrypto() {
            const cryptoName = prompt('Введите название крипты (например, BITCOIN):').toUpperCase();
            const amount = parseInt(prompt('Введите количество:'));
            
            if (isNaN(amount) || amount <= 0) return;
            
            const crypto = cryptoCurrencies.find(c => c.name === cryptoName);
            if (!crypto) {
                alert('❌ Крипта не найдена!');
                return;
            }
            
            const userCrypto = gameState.crypto.find(c => c.id === crypto.id);
            userCrypto.owned += amount;
            saveGame();
            updateUI();
            alert(`✅ Выдано ${amount} ${crypto.name}`);
        }
        
        function adminGiveBusiness() {
            const businessName = prompt('Введите название бизнеса (ТАКСОПАРК, РЕСТОРАН и т.д.):').toUpperCase();
            
            const t = businessTemplates.find(b => b.name.includes(businessName));
            if (!t) {
                alert('❌ Бизнес не найден!');
                return;
            }
            
            if (!gameState.myBusinesses) gameState.myBusinesses = [];
            
            const businessLimit = gameState.businessSlots || MAX_BUSINESSES;
            if (gameState.myBusinesses.length >= businessLimit) {
                alert(`❌ Уже максимум ${businessLimit} бизнесов!`);
                return;
            }
            
            gameState.myBusinesses.push({
                id: Date.now() + Math.random(),
                templateId: t.id,
                name: t.name,
                level: 1,
                income: t.baseIncome,
                upgradeCost: Math.floor(t.baseUpgradeCost * t.costMultiplier),
                upgradeTime: t.upgradeTime,
                upgradeEnd: 0,
                manager: null,
                totalEarned: 0,
                incomeMultiplier: t.incomeMultiplier,
                costMultiplier: t.costMultiplier
            });
            
            saveGame();
            updateUI();
            alert(`✅ Выдан бизнес ${t.name}`);
        }
        
        function adminResetMoney() {
            if (confirm('Обнулить деньги?')) {
                gameState.balance = 0;
                saveGame();
                updateUI();
                alert('✅ Деньги обнулены');
            }
        }
        
        function adminResetDiamonds() {
            if (confirm('Обнулить алмазы?')) {
                gameState.diamonds = 0;
                saveGame();
                updateUI();
                alert('✅ Алмазы обнулены');
            }
        }
        
        function adminResetLevel() {
            if (confirm('Обнулить уровень до 1?')) {
                gameState.level = 1;
                gameState.exp = 0;
                saveGame();
                updateUI();
                alert('✅ Уровень обнулен');
            }
        }
        
        function adminResetPlayer() {
            resetGame();
        }
        
        function resetGame() {
            if (confirm('ТОЧНО СБРОСИТЬ ВЕСЬ ПРОГРЕСС? Это действие необратимо!')) {
                localStorage.removeItem('imperiaClickerSave_' + currentUserId);
                localStorage.removeItem('deviceId');
                location.reload();
            }
        }
        
        function showNicknameModal() {
            document.getElementById('nicknameInput').value = currentUser;
            document.getElementById('nicknameModal').classList.add('active');
        }
        
        function closeNicknameModal() {
            document.getElementById('nicknameModal').classList.remove('active');
        }
        
        function saveNickname() {
            const newNick = document.getElementById('nicknameInput').value.trim();
            if (!newNick) return;
            
            const oldUser = currentUser;
            currentUser = newNick;
            
            if (ADMIN_SECRETS.includes(currentUser) && !ADMIN_SECRETS.includes(oldUser)) {
                enableAdminMode();
            } else if (!ADMIN_SECRETS.includes(currentUser) && ADMIN_SECRETS.includes(oldUser)) {
                disableAdminMode();
            }
            
            document.getElementById('username').innerHTML = `👑 ${currentUser} <span class="warning-badge">⚠️ ЛОКАЛЬНО</span>`;
            if (specialItem.owned) {
                document.getElementById('username').innerHTML += ' <span class="suguru-badge">💎</span>';
            }
            saveGame();
            closeNicknameModal();
            renderCurrentTab();
        }
        
        function enableAdminMode() {
            isAdmin = true;
            document.body.classList.add('admin-mode');
            document.querySelector('.app-container').classList.add('admin-app');
            document.querySelector('.header').classList.add('admin-header');
            document.getElementById('username').classList.add('admin-username');
            document.querySelector('.bottom-nav').classList.add('admin-nav');
            
            const flash = document.createElement('div');
            flash.style.position = 'fixed';
            flash.style.top = '0';
            flash.style.left = '0';
            flash.style.width = '100%';
            flash.style.height = '100%';
            flash.style.background = 'rgba(255, 0, 0, 0.3)';
            flash.style.zIndex = '9999';
            flash.style.pointerEvents = 'none';
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 1000);
            
            alert('🔥 ВАМ ВЫДАНЫ ПРАВА АДМИНИСТРАТОРА!');
        }
        
        function disableAdminMode() {
            isAdmin = false;
            document.body.classList.remove('admin-mode');
            document.querySelector('.app-container').classList.remove('admin-app');
            document.querySelector('.header').classList.remove('admin-header');
            document.getElementById('username').classList.remove('admin-username');
            document.querySelector('.bottom-nav').classList.remove('admin-nav');
        }
        
        // ========== АВТОМАТИЧЕСКИЙ ДОХОД ==========
        setInterval(() => {
            if (!gameState) return;
            
            let income = 0;
            
            if (gameState.autoClickerLevel > 0) {
                income += gameState.autoClickerLevel;
            }
            
            if (gameState.myBusinesses && gameState.myBusinesses.length > 0) {
                gameState.myBusinesses.forEach(b => {
                    let inc = b.income || 0;
                    if (b.manager) {
                        inc *= (1 + b.manager.level * 0.1);
                    }
                    income += inc;
                    b.totalEarned = (b.totalEarned || 0) + inc;
                    
                    if (gameState.battlePass && gameState.battlePass.level < 200) {
                        gameState.battlePass.exp += 100;
                    }
                });
            }
            
            if (gameState.crypto && cryptoPrices) {
                gameState.crypto.forEach(c => {
                    if (c.owned > 0) {
                        const cryptoData = cryptoCurrencies.find(cr => cr.id === c.id);
                        if (cryptoData) {
                            income += cryptoData.incomePerCoin * c.owned;
                        }
                    }
                });
            }
            
            if (gameState.houses) {
                gameState.houses.forEach(h => {
                    if (h.owned) {
                        let houseIncome = h.baseIncome;
                        const upgradeCount = Object.values(h.upgrades).reduce((a, b) => a + b, 0);
                        houseIncome *= (1 + upgradeCount);
                        income += houseIncome;
                    }
                });
            }
            
            if (specialItem.owned) {
                income += specialItem.income;
            }
            
            if (income > 0) {
                gameState.balance = (gameState.balance || 0) + Math.floor(income);
                gameState.totalEarned = (gameState.totalEarned || 0) + Math.floor(income);
            }
            
            checkBattlePassLevel();
            
            updateUI();
            saveGame();
        }, 1000);
        
        setInterval(() => {
            if (gameState) {
                updateUI();
            }
        }, 100);
        
        setInterval(() => {
            if (gameState) {
                updateCryptoPrices();
                const activeTab = document.querySelector('.nav-item.active');
                if (activeTab && activeTab.dataset.tab === 'investments') {
                    renderTab('investments');
                }
            }
        }, 300000);
        
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                if (!gameState) return;
                
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                this.classList.add('active');
                if (isAdmin) {
                    this.classList.add('admin-active');
                }
                renderTab(this.dataset.tab);
            });
        });
        
        window.onload = function() {
            if (loadGame()) {
                if (ADMIN_SECRETS.includes(currentUser)) {
                    enableAdminMode();
                }
                
                document.getElementById('username').innerHTML = `👑 ${currentUser} <span class="warning-badge">⚠️ ЛОКАЛЬНО</span>`;
                if (specialItem.owned) {
                    document.getElementById('username').innerHTML += ' <span class="suguru-badge">💎</span>';
                }
                updateUI();
                renderTab('earn');
            } else {
                const randomNum = Math.floor(Math.random() * 900 + 100);
                currentUser = `ИГРОК${randomNum}`;
                
                gameState = {
                    balance: 0,
                    diamonds: 1000,
                    exp: 0,
                    level: 1,
                    clickPower: 1,
                    clickPowerLevel: 0,
                    autoClickerLevel: 0,
                    critLevel: 0,
                    totalClicks: 0,
                    totalEarned: 0,
                    playTime: 0,
                    lastOnlineTime: Date.now(),
                    myBusinesses: [],
                    battlePass: { level: 1, exp: 0, claimed: [], lastReset: Date.now() },
                    businessSlots: MAX_BUSINESSES,
                    houses: houses.map(h => ({ ...h })),
                    garages: { cars: [], planes: [], ships: [] },
                    crypto: cryptoCurrencies.map(c => ({ id: c.id, owned: 0 })),
                    cryptoPrices: cryptoCurrencies.map(c => c.basePrice)
                };
                
                cryptoPrices = gameState.cryptoPrices;
                
                document.getElementById('username').innerHTML = `👑 ${currentUser} <span class="warning-badge">⚠️ ЛОКАЛЬНО</span>`;
                updateUI();
                renderTab('earn');
                saveGame();
            }
            
            window.handleClick = handleClick;
            window.buySalonItem = buySalonItem;
            window.buyHouse = buyHouse;
            window.upgradeHouse = upgradeHouse;
            window.showSalon = showSalon;
            window.showGarage = showGarage;
            window.showAllHouses = showAllHouses;
            window.openHouseModal = openHouseModal;
            window.buyBusiness = buyBusiness;
            window.startUpgrade = startUpgrade;
            window.hireManager = hireManager;
            window.sellBusiness = sellBusiness;
            window.showBuyBusinessModal = showBuyBusinessModal;
            window.openBusinessModal = openBusinessModal;
            window.openTradeModal = openTradeModal;
            window.setTradeAmount = setTradeAmount;
            window.quickBuyMaxMoney = quickBuyMaxMoney;
            window.quickSellAll = quickSellAll;
            window.executeTrade = executeTrade;
            window.showCryptoPortfolio = showCryptoPortfolio;
            window.buySpecialItem = buySpecialItem;
            window.showBattlePass = showBattlePass;
            window.claimBattlePassReward = claimBattlePassReward;
            window.changePassPage = changePassPage;
            window.closeModal = closeModal;
            window.resetGame = resetGame;
            window.showNicknameModal = showNicknameModal;
            window.closeNicknameModal = closeNicknameModal;
            window.saveNickname = saveNickname;
            window.toggleSound = toggleSound;
            window.toggleEffects = toggleEffects;
            window.renderTab = renderTab;
            
            window.showAdminPanel = showAdminPanel;
            window.closeAdminModal = closeAdminModal;
            window.adminGiveMoney = adminGiveMoney;
            window.adminGiveDiamonds = adminGiveDiamonds;
            window.adminGiveCrypto = adminGiveCrypto;
            window.adminGiveBusiness = adminGiveBusiness;
            window.adminResetMoney = adminResetMoney;
            window.adminResetDiamonds = adminResetDiamonds;
            window.adminResetLevel = adminResetLevel;
            window.adminResetPlayer = adminResetPlayer;
        };
    </script>
</body>
</html>
