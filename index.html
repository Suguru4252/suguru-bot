<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>IMPERIA CLICKER 2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            overscroll-behavior: none;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            touch-action: pan-y pinch-zoom;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a050f 0%, #1a1025 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5px;
        }
        
        body.admin-mode {
            background: linear-gradient(135deg, #2a0000 0%, #4a0000 100%);
        }
        
        .app-container {
            width: 100%;
            max-width: 400px;
            height: 98vh;
            background: rgba(10, 5, 20, 0.97);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            border: 2px solid #ffd700;
            overscroll-behavior: contain;
        }
        
        .app-container.admin-app {
            border: 3px solid #ff0000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
            animation: adminPulse 2s infinite;
        }
        
        @keyframes adminPulse {
            0% { border-color: #ff0000; box-shadow: 0 0 20px rgba(255, 0, 0, 0.5); }
            50% { border-color: #ff6666; box-shadow: 0 0 40px rgba(255, 0, 0, 0.8); }
            100% { border-color: #ff0000; box-shadow: 0 0 20px rgba(255, 0, 0, 0.5); }
        }
        
        .header {
            background: linear-gradient(135deg, #2a1b3d 0%, #1a0f2a 100%);
            color: white;
            padding: 12px;
            text-align: center;
            border-bottom: 2px solid #ffd700;
            flex-shrink: 0;
        }
        
        .header.admin-header {
            background: linear-gradient(135deg, #3d1b1b 0%, #2a0f0f 100%);
            border-bottom: 3px solid #ff0000;
        }
        
        .username {
            font-size: 15px;
            color: #ffd700;
            font-weight: bold;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            background: rgba(0,0,0,0.3);
            cursor: pointer;
            position: relative;
        }
        
        .username.admin-username {
            color: #ff6666;
            animation: adminGlow 1s infinite;
        }
        
        @keyframes adminGlow {
            0% { text-shadow: 0 0 5px #ff0000; }
            50% { text-shadow: 0 0 20px #ff6666; }
            100% { text-shadow: 0 0 5px #ff0000; }
        }
        
        .suguru-badge {
            background: linear-gradient(135deg, #ffd700, #ff00ff);
            color: black;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 20px;
            font-size: 11px;
            margin-left: 5px;
            display: inline-block;
            border: 1px solid white;
            animation: badgeGlow 2s infinite;
        }
        
        @keyframes badgeGlow {
            0% { box-shadow: 0 0 5px #ffd700; }
            50% { box-shadow: 0 0 15px #ff00ff; }
            100% { box-shadow: 0 0 5px #ffd700; }
        }
        
        .pass-badge {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: black;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            margin-left: 5px;
            display: inline-block;
        }
        
        .warning-badge {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff3333;
            border-radius: 30px;
            padding: 4px 8px;
            font-size: 10px;
            display: inline-block;
            color: #ff3333;
            margin-left: 8px;
        }
        
        .offline-badge {
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid #ffd700;
            border-radius: 30px;
            padding: 6px 12px;
            font-size: 13px;
            display: inline-block;
            color: #ffd700;
            margin: 4px 0;
        }
        
        .balance-container {
            display: flex;
            justify-content: space-between;
            gap: 5px;
            margin: 12px 0;
        }
        
        .balance-box {
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 3px;
            border-radius: 12px;
            flex: 1;
            border: 1px solid rgba(255, 215, 0, 0.5);
        }
        
        .balance-box.admin-balance {
            border-color: #ff0000;
        }
        
        .balance-label {
            font-size: 10px;
            opacity: 0.9;
        }
        
        .balance-value {
            font-size: 14px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .level-bar {
            background: rgba(255, 255, 255, 0.15);
            height: 6px;
            border-radius: 3px;
            margin: 8px 0;
            overflow: hidden;
        }
        
        .level-progress {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffaa00);
            width: 0%;
            border-radius: 3px;
        }
        
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            color: white;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }
        
        .content::-webkit-scrollbar {
            display: none;
        }
        
        #home-content {
            min-height: 100%;
            cursor: pointer;
            padding: 8px 0;
        }
        
        .clicker-area {
            text-align: center;
            cursor: pointer;
        }
        
        .click-btn {
            background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b);
            border: none;
            border-radius: 50%;
            width: 180px;
            height: 180px;
            font-size: 50px;
            color: white;
            margin: 15px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 3px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.5);
            cursor: pointer;
            transition: transform 0.05s;
        }
        
        .click-btn:active {
            transform: scale(0.97);
        }
        
        .click-btn span {
            font-size: 18px;
            margin-top: 8px;
        }
        
        .per-second {
            color: #4CAF50;
            font-size: 16px;
            margin: 8px 0;
            font-weight: bold;
            cursor: pointer;
        }
        
        .offline-earnings {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid #ffd700;
            border-radius: 12px;
            padding: 12px;
            margin: 12px 0;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        
        .card-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 16px;
            color: #ffd700;
            text-align: center;
            border-bottom: 1px solid #ffd700;
            padding-bottom: 8px;
        }
        
        .btn {
            background: linear-gradient(135deg, #3a2a4d 0%, #2a1a3d 100%);
            border: 1px solid #ffd700;
            color: white;
            padding: 14px 20px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin: 8px 0;
            font-size: 16px;
            transition: transform 0.05s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .btn-gold {
            background: linear-gradient(135deg, #ffd700 0%, #b8860b 100%);
            color: black;
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);
            color: white;
        }
        
        .btn-green {
            background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%);
            color: white;
        }
        
        .btn-purple {
            background: linear-gradient(135deg, #7b1fa2 0%, #4a0072 100%);
            color: white;
        }
        
        .btn-crypto {
            background: linear-gradient(135deg, #00c853 0%, #009624 100%);
            border: 1px solid #ffd700;
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
            margin: 3px;
            flex: 1;
        }
        
        .btn-crypto-portfolio {
            background: linear-gradient(135deg, #7b1fa2 0%, #4a0072 100%);
            border: 1px solid #ffd700;
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;

            margin: 5px 0 15px 0;

            text-align: center;
        }
        
        .portfolio-mini {

            border-radius: 12px;

            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        
        .portfolio-mini-label {
            font-size: 13px;
            color: #b39ddb;
        }
        
        .portfolio-mini-value {
            font-size: 16px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .input-field {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 30px;
            padding: 12px 16px;
            width: 100%;
            margin: 8px 0;
            color: white;
            font-size: 15px;
            outline: none;
        }
        
        .input-field:focus {
            border-color: #ffd700;
        }
        
        .welcome-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100%;
            padding: 16px;
        }
        
        .welcome-title {
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
            text-align: center;
            margin-bottom: 16px;
        }
        
        .welcome-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #ffd700;
            margin-bottom: 16px;
            text-align: center;
        }
        
        .warning-box {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid #ff3333;
            border-radius: 12px;
            padding: 16px;
            margin: 16px 0;
            text-align: left;
        }
        
        .warning-box h3 {
            color: #ff3333;
            margin-bottom: 8px;
            font-size: 16px;
        }
        
        .warning-box ul {
            color: #ff9999;
            margin-left: 16px;
            font-size: 13px;
        }
        
        .warning-box li {
            margin: 5px 0;
        }
        
        .agree-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 16px 0;
            color: white;
        }
        
        .agree-checkbox input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .bottom-nav {
            display: flex;
            background: rgba(0, 0, 0, 0.95);
            padding: 8px 3px;
            gap: 2px;
            border-top: 2px solid #ffd700;
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        .bottom-nav.admin-nav {
            border-top-color: #ff0000;
        }
        
        .bottom-nav::-webkit-scrollbar {
            display: none;
        }
        
        .nav-item {
            flex: 0 0 auto;
            text-align: center;
            padding: 8px 10px;
            color: rgba(255, 255, 255, 0.6);
            border-radius: 12px;

        }
        
        .nav-item span {
            font-size: 18px;
            display: block;
            margin-bottom: 3px;
        }
        
        .nav-item.active {
            color: #ffd700;
            background: rgba(255, 215, 0, 0.15);
            border: 1px solid #ffd700;
        }
        
        .nav-item.admin-active {
            color: #ff0000;
            background: rgba(255, 0, 0, 0.15);
            border-color: #ff0000;
        }
        
        .shop-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        
        .item-name {
            font-weight: bold;
            color: #ffd700;
            font-size: 16px;
            margin-bottom: 3px;
        }
        
        .item-price {
            color: #4CAF50;
            font-weight: bold;
            font-size: 14px;
        }
        
        .buy-btn {
            background: linear-gradient(135deg, #4a2a6a 0%, #3a1a5a 100%);
            border: 1px solid #ffd700;
            color: white;
            padding: 10px 18px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .property-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        
        .property-emoji {
            font-size: 32px;
            width: 50px;
            text-align: center;
        }
        
        .property-title {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 3px;
        }
        
        .property-price {
            color: #ffd700;

        }
        
        .property-owned {

        .business-item {

        }
        
        .business-name {
            font-weight: bold;
            color: #ffd700;
            font-size: 18px;
        }
        
        .business-level {
            color: #4CAF50;
            font-size: 14px;
            font-weight: bold;
        }
        
        .business-stats {
            display: flex;
            justify-content: space-between;
            font-size: 13px;

        }
        
        .manager-badge {
            background: rgba(123, 31, 162, 0.3);
            border: 1px solid #7b1fa2;
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 12px;
            color: #b39ddb;
            display: inline-block;

            margin: 5px 0;
        }
        
        .business-progress {
            background: rgba(255, 255, 255, 0.1);
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            margin: 8px 0;
        }
        
        .business-bar {
            height: 100%;

        .upgrade-time {

        }
        
        .crypto-item {
            background: rgba(0, 200, 83, 0.08);
            border-radius: 12px;
            padding: 12px;

            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #00c853;
        }
        
        .crypto-name {

            color: #00c853;
            font-size: 16px;
        }
        
        .crypto-price {
            color: #ffd700;

        }
        
        .crypto-owned {

        .crypto-profit {

        .farm-name {

        .farm-level {
            color: #ffd700;
            font-size: 13px;

        .farm-progress {

            border: 1px solid rgba(255, 215, 0, 0.3);

        .collection-item span {

        }
        
        .collection-name {
            font-size: 11px;

        }
        
        .collection-owned {
            font-size: 10px;
            color: #4CAF50;
        }
        
        .collection-detail {
            background: rgba(255, 255, 255, 0.05);

        function formatNumber(num) {
            if (num >= 1e12) return (num / 1e12).toFixed(2) + 'T';
            if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(2) + 'K';
            return Math.floor(num).toString();
        }
        
        function formatFullNumber(num) {
            return Math.floor(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        function loadGame() {
            const saved = localStorage.getItem('imperiaClickerSave_' + currentUserId);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    gameState = data.gameState;
                    settings = data.settings || { soundEnabled: true, effectsEnabled: true };
                    currentUser = data.nickname || "ИГРОК";
                    
                    if (!gameState.collections) {
                        gameState.collections = JSON.parse(JSON.stringify(collectionItems));
                    }
                    
                    if (!gameState.crypto) {
                        gameState.crypto = cryptoCurrencies.map(c => ({ id: c.id, owned: 0 }));
                    }
                    
                    if (!gameState.cryptoPrices) {
                        cryptoPrices = cryptoCurrencies.map(c => c.basePrice);
                        gameState.cryptoPrices = cryptoPrices;
                    } else {
                        cryptoPrices = gameState.cryptoPrices;
                    }
                    
                    if (!gameState.miningFarms) {
                        gameState.miningFarms = [];
                    }
                    
                    if (!gameState.battlePass) {
                        gameState.battlePass = { level: 1, exp: 0, claimed: [] };
                    }
                    
                    if (!gameState.dailyBusinesses) {
                        gameState.dailyBusinesses = [];
                    }
                    
                    if (gameState.specialItem === undefined) {
                        gameState.specialItem = { owned: false, revealed: false };
                    }
                    
                    // Проверка ежедневных бизнесов
                    const now = Date.now();
                    if (now - (gameState.lastDailyUpdate || 0) > 86400000) {
                        generateDailyBusinesses();
                        gameState.lastDailyUpdate = now;
                    }
                    
                    const lastOnline = gameState.lastOnlineTime || now;
                    const secondsPassed = Math.floor((now - lastOnline) / 1000);
                    
                    if (secondsPassed > 10) {
                        calculateOfflineEarnings(secondsPassed);
                    }
                    
                    gameState.lastOnlineTime = now;
                    
                    return true;
                } catch(e) {
                    return false;
                }
            }
            return false;
        }

            if (gameState) {

                gameState.cryptoPrices = cryptoPrices;
                const saveData = {

        function calculateOfflineEarnings(seconds) {
            let income = 0;
            
            if (gameState.autoClickerLevel > 0) {
                income += gameState.autoClickerLevel * seconds;
            }
            
            if (gameState.myBusinesses && gameState.myBusinesses.length > 0) {
                gameState.myBusinesses.forEach(b => {
                    const t = businessTemplates[b.templateId];
                    if (b.level > 0 && t) {
                        income += t.baseIncome * b.level * seconds;
                    }
                });
            }
            
            if (gameState.crypto && cryptoPrices) {
                gameState.crypto.forEach(c => {
                    const cryptoData = cryptoCurrencies.find(cr => cr.id === c.id);
                    if (c.owned > 0 && cryptoData) {
                        const price = cryptoPrices[c.id] || cryptoData.basePrice;
                        income += (price / 32000) * c.owned * seconds;
                    }
                });
            }
            
            if (gameState.miningFarms) {
                gameState.miningFarms.forEach(farm => {
                    income += (farm.crypto.basePrice * farm.level / 100) * seconds;
                });
            }
            
            if (gameState.specialItem && gameState.specialItem.owned) {
                income += 777 * seconds;
            }
            
            if (income > 0) {
                const earned = Math.floor(income);
                gameState.balance = (gameState.balance || 0) + earned;
                gameState.totalEarned = (gameState.totalEarned || 0) + earned;
                
                const minutes = Math.floor(seconds / 60);
                const secs = seconds % 60;
                
                alert(`⏱️ ОФФЛАЙН ДОХОД\nОтсутствовал: ${minutes} мин ${secs} сек\n💰 ЗАРАБОТАНО: ${formatFullNumber(earned)} монет`);
                
                const badge = document.getElementById('offlineBadge');
                if (badge) {
                    badge.style.display = 'inline-block';
                    badge.textContent = `⏱️ +${formatFullNumber(earned)} ЗА ОФФЛАЙН`;
                    setTimeout(() => {
                        badge.style.display = 'none';
                    }, 5000);
                }
            }
        }

        // ========== КРИПТА ==========
        function updateCryptoPrices() {
            cryptoPrices = cryptoPrices.map((price, i) => {
                const crypto = cryptoCurrencies[i];
                const change = (Math.random() - 0.5) * 2 * crypto.volatility;
                let newPrice = price * (1 + change);
                newPrice = Math.max(newPrice, crypto.basePrice * 0.1);
                newPrice = Math.min(newPrice, crypto.basePrice * 10);
                return Math.floor(newPrice);
            });
        }

            if (!gameState || !cryptoPrices) return 0;

                    if (cryptoData) {
                        const price = cryptoPrices[c.id] || cryptoData.basePrice;
                        total += price * c.owned;
                    }
                }
            });
            return total;
        }

        function executeTrade(cryptoId, type) {
            const crypto = cryptoCurrencies.find(c => c.id === cryptoId);
            const userCrypto = gameState.crypto.find(c => c.id === cryptoId);
            const currentPrice = cryptoPrices[cryptoId] || crypto.basePrice;
            const amount = parseInt(document.getElementById('tradeAmount')?.value);
            
            if (!amount || amount <= 0) {
                alert('❌ Введите корректное количество!');
                return;
            }
            
            if (type === 'buy') {
                const maxBuy = crypto.maxBuy - userCrypto.owned;
                
                if (amount > maxBuy) {
                    alert(`❌ Можно купить только ${formatFullNumber(maxBuy)}!`);
                    return;
                }
                
                const totalPrice = currentPrice * amount;
                
                if (gameState.balance < totalPrice) {
                    alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
                    return;
                }
                
                gameState.balance -= totalPrice;
                userCrypto.owned += amount;
                
                saveGame();
                updateUI();
                closeTradeModal();
                showCryptoPortfolio();
                alert(`✅ Куплено ${amount} ${crypto.name} за ${formatFullNumber(totalPrice)}💰`);
                
            } else {
                if (amount > userCrypto.owned) {
                    alert(`❌ У вас только ${formatFullNumber(userCrypto.owned)}!`);
                    return;
                }
                
                const totalPrice = currentPrice * amount;
                
                gameState.balance += totalPrice;
                userCrypto.owned -= amount;
                
                saveGame();
                updateUI();
                closeTradeModal();
                showCryptoPortfolio();
                alert(`✅ Продано ${amount} ${crypto.name} за ${formatFullNumber(totalPrice)}💰`);
            }
        }

        function checkBattlePassLevel() {
            if (!gameState.battlePass) {
                gameState.battlePass = { level: 1, exp: 0, claimed: [] };
            }
            
            while (gameState.battlePass.exp >= 100 && gameState.battlePass.level < 20) {
                gameState.battlePass.exp -= 100;
                gameState.battlePass.level++;
            }
        }
        
        function claimBattlePassReward(level) {
            if (!gameState.battlePass) return;
            if (gameState.battlePass.claimed.includes(level)) return;
            if (level > gameState.battlePass.level) return;
            
            const reward = battlePassLevels.find(l => l.level === level);
            if (!reward) return;
            
            if (reward.type === 'money') {
                gameState.balance += reward.reward;
            } else {
                gameState.diamonds += reward.reward;
            }
            
            gameState.battlePass.claimed.push(level);
            saveGame();
            updateUI();
            renderTab('pass');
        }

        function playClickSound() {
            if (!settings.soundEnabled) return;
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.type = 'sine';
                oscillator.frequency.value = 523.25;
                
                gainNode.gain.value = 0.1;
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.05);
            } catch(e) {}
        }
        
        function createFloatingEffect(x, y, text) {
            if (!settings.effectsEnabled) return;
            const el = document.createElement('div');
            el.className = 'floating-effect';
            el.textContent = text;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }
        
        function handleClick(event) {

            let power = (gameState.clickPower || 1) * (1 + (gameState.clickPowerLevel || 0) * 0.5);
            
            if (Math.random() * 100 < (gameState.critLevel || 0) * 10) {
                power *= 10;
            }
            
            const earned = Math.floor(power);
            gameState.balance = (gameState.balance || 0) + earned;
            gameState.totalClicks = (gameState.totalClicks || 0) + 1;
            gameState.totalEarned = (gameState.totalEarned || 0) + earned;
            gameState.exp = (gameState.exp || 0) + earned / 100;
            
            // Опыт боевого пропуска
            if (gameState.battlePass) {
                gameState.battlePass.exp += earned / 100;
                checkBattlePassLevel();
            }
            
            while (gameState.exp >= (gameState.level || 1) * 1000) {
                gameState.exp -= (gameState.level || 1) * 1000;
                gameState.level = (gameState.level || 1) + 1;
                gameState.diamonds = (gameState.diamonds || 0) + (gameState.level * 5);
            }
            
            playClickSound();
            if (event) {
                createFloatingEffect(event.clientX, event.clientY, `+${earned}💰`);
            }
            
            updateUI();
            saveGame();
            renderCurrentTab();
        }

        function startUpgrade(index) {
            const business = gameState.myBusinesses[index];
            if (!business) return;
            
            const t = businessTemplates[business.templateId];
            if (!t) return;
            
            if ((business.level || 1) >= t.maxLevel) {
                alert('❌ МАКСИМАЛЬНЫЙ УРОВЕНЬ!');
                return;
            }
            
            if ((gameState.balance || 0) < (business.upgradeCost || 0)) {
                alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
                return;
            }
            
            gameState.balance -= (business.upgradeCost || 0);
            
            business.level++;
            business.income = t.baseIncome * business.level;
            business.upgradeCost = Math.floor((business.upgradeCost || t.baseUpgradeCost) * 2.5);
            
            saveGame();
            updateUI();
            closeBusinessModal();
            renderCurrentTab();
            alert(`✅ ${business.name || t.name} улучшен до ${business.level} уровня!`);
        }
        
        function sellBusiness(index) {
            const business = gameState.myBusinesses[index];
            if (!business) return;
            
            const t = businessTemplates[business.templateId];
            if (!t) return;
            
            let totalSpent = t.baseUpgradeCost;
            let currentCost = t.baseUpgradeCost;
            for (let i = 1; i < (business.level || 1); i++) {
                currentCost = Math.floor(currentCost * 2.5);
                totalSpent += currentCost;
            }
            
            const sellPrice = Math.floor(totalSpent * 0.5);
            
            if (confirm(`Продать ${business.name || t.name} за ${formatFullNumber(sellPrice)}💰?`)) {
                gameState.myBusinesses.splice(index, 1);
                gameState.balance = (gameState.balance || 0) + sellPrice;
                
                saveGame();
                updateUI();
                closeBusinessModal();
                renderCurrentTab();
                alert(`✅ Продано! +${formatFullNumber(sellPrice)}💰`);
            }
        }

                if (business.manager && business.manager.autoUpgrade && business.level < 20) {
                    if (Math.random() < 0.001) { // 0.1% шанс каждый тик
                        const t = businessTemplates[business.templateId];
                        if (t && (gameState.balance || 0) >= (business.upgradeCost || 0)) {

            document.body.classList.remove('admin-mode');
            document.querySelector('.app-container').classList.remove('admin-app');
            document.querySelector('.header').classList.remove('admin-header');
            document.getElementById('username').classList.remove('admin-username');
            document.querySelectorAll('.balance-box').forEach(el => el.classList.remove('admin-balance'));
            document.querySelector('.bottom-nav').classList.remove('admin-nav');
        }
        
        function resetGame() {
            if (confirm('ТОЧНО СБРОСИТЬ ВЕСЬ ПРОГРЕСС?\n\nЭто действие необратимо!')) {
                localStorage.removeItem('imperiaClickerSave_' + currentUserId);
                location.reload();
            }
        }
        
        function showAdminPanel() {
            if (!isAdmin) return;
            
            const modal = document.getElementById('adminModal');
            const modalContent = document.getElementById('adminModalContent');
            
            let html = `
                <div class="modal-title" style="color:#ff0000;">🔧 АДМИН ПАНЕЛЬ</div>
                
                <div style="margin-bottom:16px;">
                    <div class="btn btn-gold" style="background:#ff4444;" onclick="adminGiveMoney()">💰 ВЫДАТЬ ДЕНЬГИ</div>
                    <div class="btn btn-gold" style="background:#ff4444;" onclick="adminGiveDiamonds()">💎 ВЫДАТЬ АЛМАЗЫ</div>
                    <div class="btn btn-gold" style="background:#ff4444;" onclick="adminGiveCrypto()">📈 ВЫДАТЬ КРИПТУ</div>
                    <div class="btn btn-gold" style="background:#ff4444;" onclick="adminGiveBusiness()">💼 ВЫДАТЬ БИЗНЕС</div>
                    <div class="btn btn-gold" style="background:#ff4444;" onclick="adminGiveFarm()">⛏️ ВЫДАТЬ ФЕРМУ</div>
                    <div class="btn btn-gold" style="background:#ff4444;" onclick="adminLevelUp()">📊 ПОВЫСИТЬ УРОВЕНЬ</div>
                    <div class="btn btn-gold" style="background:#ff4444;" onclick="adminResetMoney()">💰 ОБНУЛИТЬ ДЕНЬГИ</div>
                    <div class="btn btn-gold" style="background:#ff4444;" onclick="adminResetDiamonds()">💎 ОБНУЛИТЬ АЛМАЗЫ</div>
                    <div class="btn btn-gold" style="background:#ff4444;" onclick="adminResetLevel()">📊 ОБНУЛИТЬ УРОВЕНЬ</div>
                    <div class="btn btn-gold" style="background:#ff4444;" onclick="adminResetPlayer()">🔄 ОБНУЛИТЬ ВСЁ</div>
                </div>
                
                <div class="close-btn" onclick="closeAdminModal()">ЗАКРЫТЬ</div>
            `;
            
            modalContent.innerHTML = html;
            modal.classList.add('active');
            document.querySelector('.modal-content').classList.add('admin-modal');
        }
        
        function closeAdminModal() {
            document.getElementById('adminModal').classList.remove('active');
        }
        
        function adminGiveMoney() {
            const amount = parseInt(prompt('Введите сумму монет:'));
            if (isNaN(amount) || amount <= 0) {
                alert('❌ Некорректная сумма!');
                return;
            }
            gameState.balance += amount;
            saveGame();
            updateUI();
            alert(`✅ Выдано себе ${formatFullNumber(amount)}💰`);
        }
        
        function adminGiveDiamonds() {
            const amount = parseInt(prompt('Введите количество алмазов:'));
            if (isNaN(amount) || amount <= 0) {
                alert('❌ Некорректное количество!');
                return;
            }
            gameState.diamonds += amount;
            saveGame();
            updateUI();
            alert(`✅ Выдано себе ${amount}💎`);
        }
        
        function adminGiveCrypto() {
            const cryptoName = prompt('Введите название крипты (например, BITCOIN):').toUpperCase();
            const amount = parseInt(prompt('Введите количество:'));
            
            if (isNaN(amount) || amount <= 0) {
                alert('❌ Некорректное количество!');
                return;
            }
            
            const crypto = cryptoCurrencies.find(c => c.name === cryptoName);
            if (!crypto) {
                alert('❌ Крипта не найдена!');
                return;
            }
            
            const userCrypto = gameState.crypto.find(c => c.id === crypto.id);
            userCrypto.owned += amount;
            saveGame();
            updateUI();
            alert(`✅ Выдано себе ${amount} ${crypto.name}`);
        }
        
        function adminGiveBusiness() {
            const businessName = prompt('Введите название бизнеса (ТАКСОПАРК, РЕСТОРАН и т.д.):').toUpperCase();
            
            const t = businessTemplates.find(b => b.name.includes(businessName));
            if (!t) {
                alert('❌ Бизнес не найден!');
                return;
            }
            
            if (!gameState.myBusinesses) gameState.myBusinesses = [];
            
            if (gameState.myBusinesses.length >= MAX_BUSINESSES) {
                alert(`❌ Уже максимум ${MAX_BUSINESSES} бизнесов!`);
                return;
            }
            
            gameState.myBusinesses.push({
                id: Date.now() + Math.random(),
                templateId: t.id,
                name: t.name,
                level: 1,
                income: t.baseIncome,
                upgradeCost: Math.floor(t.baseUpgradeCost * 2.5),
                manager: null,
                totalEarned: 0
            });
            
            saveGame();
            updateUI();
            alert(`✅ Выдан бизнес ${t.name} себе`);
        }
        
        function adminGiveFarm() {
            if (!gameState.miningFarms) gameState.miningFarms = [];
            
            gameState.miningFarms.push({
                id: Date.now(),
                level: 1,
                crypto: cryptoCurrencies[Math.floor(Math.random() * cryptoCurrencies.length)],
                progress: 0,
                maxProgress: 100,
                lastUpdate: Date.now()
            });
            
            saveGame();
            updateUI();
            alert('✅ Выдана майнинг-ферма');
        }
        
        function adminLevelUp() {
            const levels = parseInt(prompt('На сколько уровней повысить?'));
            if (isNaN(levels) || levels <= 0) {
                alert('❌ Некорректное количество!');
                return;
            }
            gameState.level += levels;
            saveGame();
            updateUI();
            alert(`✅ Уровень повышен до ${gameState.level}`);
        }
        
        function adminResetMoney() {
            if (confirm('Обнулить деньги?')) {
                gameState.balance = 0;
                saveGame();
                updateUI();
                alert('✅ Деньги обнулены');
            }
        }
        
        function adminResetDiamonds() {
            if (confirm('Обнулить алмазы?')) {
                gameState.diamonds = 0;
                saveGame();
                updateUI();
                alert('✅ Алмазы обнулены');
            }
        }
        
        function adminResetLevel() {
            if (confirm('Обнулить уровень до 1?')) {
                gameState.level = 1;
                gameState.exp = 0;
                saveGame();
                updateUI();
                alert('✅ Уровень обнулен до 1');
            }
        }
        
        function adminResetPlayer() {
            resetGame();
        }
        
        // ========== АВТОМАТИЧЕСКИЙ ДОХОД ==========
        setInterval(() => {
            if (!gameState) return;
            
            let income = 0;
            
            if (gameState.autoClickerLevel > 0) {
                income += gameState.autoClickerLevel;
            }
            
            if (gameState.myBusinesses && gameState.myBusinesses.length > 0) {
                gameState.myBusinesses.forEach(b => {
                    const inc = b.income || 0;
                    income += inc;
                    b.totalEarned = (b.totalEarned || 0) + inc;
                });
            }
            
            if (gameState.crypto && cryptoPrices) {
                gameState.crypto.forEach(c => {
                    if (c.owned > 0) {
                        const cryptoData = cryptoCurrencies.find(cr => cr.id === c.id);
                        if (cryptoData) {
                            const price = cryptoPrices[c.id] || cryptoData.basePrice;
                            income += (price / 32000) * c.owned;
                        }
                    }
                });
            }
            
            if (gameState.miningFarms) {
                const now = Date.now();
                gameState.miningFarms.forEach(farm => {
                    const timePassed = (now - (farm.lastUpdate || now)) / 1000;
                    farm.progress += timePassed * farm.level;
                    farm.lastUpdate = now;
                    
                    while (farm.progress >= farm.maxProgress) {
                        farm.progress -= farm.maxProgress;
                        const earned = farm.crypto.basePrice * farm.level;
                        gameState.balance += earned;
                        gameState.totalEarned += earned;
                        income += earned;
                    }
                });
            }
            
            if (gameState.specialItem && gameState.specialItem.owned) {
                income += 777;
            }
            
            if (income > 0) {
                gameState.balance = (gameState.balance || 0) + income;
                gameState.totalEarned = (gameState.totalEarned || 0) + income;
                
                // Опыт за пассивный доход
                const expGain = income / 100;
                gameState.exp = (gameState.exp || 0) + expGain;
                
                if (gameState.battlePass) {
                    gameState.battlePass.exp += expGain;
                    checkBattlePassLevel();
                }
                
                while (gameState.exp >= (gameState.level || 1) * 1000) {
                    gameState.exp -= (gameState.level || 1) * 1000;
                    gameState.level = (gameState.level || 1) + 1;
                    gameState.diamonds = (gameState.diamonds || 0) + (gameState.level * 5);
                }
            }
            
            gameState.playTime = (gameState.playTime || 0) + 1;
            
            updateUI();
            saveGame();
        }, 1000);
        
        setInterval(() => {
            if (gameState) {
                updateCryptoPrices();
                const activeTab = document.querySelector('.nav-item.active');
                if (activeTab && activeTab.dataset.tab === 'crypto') {
                    renderTab('crypto');
                }
                const portfolioModal = document.getElementById('portfolioModal');
                if (portfolioModal.classList.contains('active')) {
                    showCryptoPortfolio();
                }
            }
        }, 300000);
        
        setInterval(checkBusinessUpgrades, 1000);
        
        // ========== НАВИГАЦИЯ ==========
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                if (!gameState) return;
                
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                this.classList.add('active');
                if (isAdmin) {
                    this.classList.add('admin-active');
                }
                renderTab(this.dataset.tab);
            });
        });
        
        // ========== ЗАПУСК ==========
        window.onload = function() {
            if (loadGame()) {
                if (currentUser === ADMIN_SECRET) {
                    enableAdminMode();
                }
                
                document.getElementById('header').style.display = 'block';
                document.getElementById('bottomNav').style.display = 'flex';
                document.getElementById('username').innerHTML = `👑 ${currentUser} <span class="warning-badge">⚠️ ЛОКАЛЬНО</span>`;
                if (gameState.specialItem && gameState.specialItem.owned) {
                    document.getElementById('username').innerHTML += ' <span class="suguru-badge">💎</span>';
                }
                
                updateUI();
                renderTab('home');
            } else {
                showWelcomeScreen();
            }
            
            // Глобальные функции
            window.handleClick = handleClick;
            window.openBuyBusinessModal = openBuyBusinessModal;
            window.buyBusinessFromModal = buyBusinessFromModal;
            window.openBusiness = openBusiness;
            window.startUpgrade = startUpgrade;
            window.sellBusiness = sellBusiness;
            window.closeBusinessModal = closeBusinessModal;
            window.hireManager = hireManager;
            window.toggleAutoUpgrade = toggleAutoUpgrade;
            window.buyMiningFarm = buyMiningFarm;
            window.upgradeMiningFarm = upgradeMiningFarm;
            window.claimBattlePassReward = claimBattlePassReward;
            window.buyDailyBusiness = buyDailyBusiness;
            window.showCryptoPortfolio = showCryptoPortfolio;
            window.closePortfolioModal = closePortfolioModal;
            window.openTradeModal = openTradeModal;
            window.closeTradeModal = closeTradeModal;
            window.setTradeAmount = setTradeAmount;
            window.quickBuyMaxMoney = quickBuyMaxMoney;
            window.executeTrade = executeTrade;
            window.buySpecialItem = buySpecialItem;
            window.showCollection = showCollection;
            window.buyCollectionItem = buyCollectionItem;
            window.closeCollectionModal = closeCollectionModal;
            window.buyUpgrade = buyUpgrade;
            window.exchangeDiamonds = exchangeDiamonds;
            window.resetGame = resetGame;
            window.showNicknameModal = showNicknameModal;
            window.closeNicknameModal = closeNicknameModal;
            window.saveNickname = saveNickname;
            window.toggleSound = toggleSound;
            window.toggleEffects = toggleEffects;
            window.renderTab = renderTab;
            
            window.showAdminPanel = showAdminPanel;
            window.closeAdminModal = closeAdminModal;
            window.adminGiveMoney = adminGiveMoney;
            window.adminGiveDiamonds = adminGiveDiamonds;
            window.adminGiveCrypto = adminGiveCrypto;
            window.adminGiveBusiness = adminGiveBusiness;
            window.adminGiveFarm = adminGiveFarm;
            window.adminLevelUp = adminLevelUp;
            window.adminResetMoney = adminResetMoney;
            window.adminResetDiamonds = adminResetDiamonds;
            window.adminResetLevel = adminResetLevel;
            window.adminResetPlayer = adminResetPlayer;
        };
    </script>
</body>
</html>
