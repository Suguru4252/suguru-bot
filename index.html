<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>IMPERIA CLICKER 2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            overscroll-behavior: none;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            touch-action: pan-y pinch-zoom;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0b0e;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5px;
        }
        
        body.admin-mode {
            background: #1a0a0a;
        }
        
        .app-container {
            width: 100%;
            max-width: 400px;
            height: 98vh;
            background: #0f1117;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            border: 1px solid #2a2c36;
            overscroll-behavior: contain;
            position: relative;
        }
        
        .app-container.admin-app {
            border: 2px solid #ff4444;
            box-shadow: 0 0 30px rgba(255, 68, 68, 0.3);
        }
        
        .header {
            background: #0f1117;
            color: white;
            padding: 20px 16px 12px;
            border-bottom: 1px solid #2a2c36;
            flex-shrink: 0;
        }
        
        .header.admin-header {
            border-bottom-color: #ff4444;
        }
        
        .username-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .username {
            font-size: 16px;
            color: #8e8e98;
            font-weight: 500;
            cursor: pointer;
        }
        
        .username.admin-username {
            color: #ff8888;
        }
        
        .settings-icon {
            color: #8e8e98;
            font-size: 20px;
            cursor: pointer;
        }
        
        .balance-container {
            margin: 8px 0;
        }
        
        .balance-label {
            font-size: 14px;
            color: #8e8e98;
            margin-bottom: 4px;
        }
        
        .balance-value {
            font-size: 28px;
            font-weight: 600;
            color: #ffd700;
            letter-spacing: 1px;
        }
        
        .balance-sub {
            font-size: 14px;
            color: #4caf50;
            margin-top: 4px;
        }
        
        .per-click {
            background: #1a1c24;
            padding: 12px 16px;
            border-radius: 16px;
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .per-click-label {
            color: #8e8e98;
            font-size: 14px;
        }
        
        .per-click-value {
            color: #ffd700;
            font-size: 18px;
            font-weight: 600;
        }
        
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            color: white;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }
        
        .content::-webkit-scrollbar {
            display: none;
        }
        
        .click-area {
            background: #1a1c24;
            border-radius: 30px;
            padding: 40px 20px;
            margin-bottom: 20px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #2a2c36;
            transition: transform 0.05s;
        }
        
        .click-area:active {
            transform: scale(0.98);
        }
        
        .click-area p {
            color: #8e8e98;
            font-size: 14px;
            margin-bottom: 12px;
        }
        
        .click-area h2 {
            color: white;
            font-size: 24px;
            font-weight: 600;
        }
        
        .offline-earnings {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid #ffd700;
            border-radius: 16px;
            padding: 16px;
            margin: 16px 0;
            text-align: center;
            font-size: 15px;
            font-weight: 500;
            color: #ffd700;
            cursor: pointer;
        }
        
        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .section-title h3 {
            color: white;
            font-size: 18px;
            font-weight: 600;
        }
        
        .section-title a {
            color: #ffd700;
            font-size: 14px;
            text-decoration: none;
            cursor: pointer;
        }
        
        .cards-row {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 8px;
            scrollbar-width: none;
        }
        
        .cards-row::-webkit-scrollbar {
            display: none;
        }
        
        .card {
            background: #1a1c24;
            border-radius: 20px;
            padding: 16px;
            min-width: 140px;
            border: 1px solid #2a2c36;
        }
        
        .card-title {
            color: white;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .card-sub {
            color: #4caf50;
            font-size: 14px;
            margin-bottom: 12px;
        }
        
        .card-btn {
            background: #2a2c36;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            pointer-events: auto;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .stat-box {
            background: #1a1c24;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #2a2c36;
        }
        
        .stat-label {
            color: #8e8e98;
            font-size: 13px;
            margin-bottom: 4px;
        }
        
        .stat-value {
            color: #ffd700;
            font-size: 18px;
            font-weight: 600;
        }
        
        .stat-change {
            color: #4caf50;
            font-size: 12px;
            margin-top: 4px;
        }
        
        .bottom-nav {
            display: flex;
            background: #0f1117;
            padding: 12px 8px;
            gap: 4px;
            border-top: 1px solid #2a2c36;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            flex-shrink: 0;
        }
        
        .bottom-nav::-webkit-scrollbar {
            display: none;
        }
        
        .bottom-nav.admin-nav {
            border-top-color: #ff4444;
        }
        
        .nav-item {
            flex: 0 0 auto;
            text-align: center;
            padding: 8px 12px;
            color: #8e8e98;
            border-radius: 12px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
            pointer-events: auto;
            min-width: 70px;
        }
        
        .nav-item span {
            font-size: 20px;
            display: block;
            margin-bottom: 4px;
        }
        
        .nav-item.active {
            color: #ffd700;
            background: rgba(255, 215, 0, 0.1);
        }
        
        .nav-item.admin-active {
            color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
        }
        
        /* ========== КАЛЕНДАРЬ 1000 ДНЕЙ ========== */
        .calendar-container {
            background: linear-gradient(135deg, #000428, #004e92);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #ffd700;
        }
        
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .calendar-day-info {
            text-align: center;
        }
        
        .calendar-day-number {
            font-size: 32px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .calendar-day-label {
            font-size: 12px;
            color: #8e8e98;
        }
        
        .calendar-progress {
            flex: 1;
            height: 8px;
            background: #2a2c36;
            border-radius: 4px;
            margin: 0 15px;
            overflow: hidden;
        }
        
        .calendar-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffaa00);
            width: 0%;
        }
        
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin: 20px 0;
        }
        
        .calendar-day-card {
            background: #1a1c24;
            border-radius: 12px;
            padding: 8px;
            text-align: center;
            border: 1px solid #2a2c36;
            position: relative;
        }
        
        .calendar-day-card.special-10 {
            border: 2px solid #ff9800;
        }
        
        .calendar-day-card.special-100 {
            border: 3px solid #ff4444;
        }
        
        .calendar-day-card.claimed {
            opacity: 0.5;
            border-color: #4caf50;
        }
        
        .calendar-day-card.claimed::after {
            content: "✓";
            position: absolute;
            top: 2px;
            right: 2px;
            color: #4caf50;
            font-size: 14px;
        }
        
        .calendar-day {
            font-size: 10px;
            color: #8e8e98;
        }
        
        .calendar-reward {
            font-size: 12px;
            color: #ffd700;
            font-weight: bold;
        }
        
        .calendar-claim-btn {
            background: #ffd700;
            border: none;
            color: black;
            padding: 4px;
            border-radius: 8px;
            font-size: 10px;
            margin-top: 4px;
            cursor: pointer;
            width: 100%;
        }
        
        .calendar-claim-btn.disabled {
            background: #2a2c36;
            color: #8e8e98;
            cursor: not-allowed;
        }
        
        /* ========== КОСМИЧЕСКАЯ ПРОГРАММА ========== */
        .space-container {
            background: linear-gradient(135deg, #000428, #004e92);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #ffd700;
            position: relative;
            overflow: hidden;
            min-height: 200px;
        }
        
        .space-stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .space-star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: space-twinkle 3s infinite;
        }
        
        @keyframes space-twinkle {
            0% { opacity: 0.2; }
            50% { opacity: 1; }
            100% { opacity: 0.2; }
        }
        
        .space-planet {
            position: absolute;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            animation: space-float 20s infinite;
        }
        
        @keyframes space-float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }
        
        .space-rocket {
            position: absolute;
            width: 80px;
            height: 120px;
            left: 50%;
            transform: translateX(-50%);
            bottom: 20px;
            transition: bottom 3s;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.5));
            z-index: 10;
        }
        
        .space-rocket.launch {
            bottom: 400px;
        }
        
        .space-rocket-body {
            position: relative;
            width: 50px;
            height: 100px;
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            border-radius: 50% 50% 30% 30%;
            margin: 0 auto;
            z-index: 2;
        }
        
        .space-rocket-window {
            position: absolute;
            width: 15px;
            height: 15px;
            background: #87CEEB;
            border-radius: 50%;
            top: 25px;
            left: 17px;
            animation: space-blink 2s infinite;
        }
        
        @keyframes space-blink {
            0% { background: #87CEEB; }
            50% { background: white; }
            100% { background: #87CEEB; }
        }
        
        .space-rocket-fire {
            position: absolute;
            width: 40px;
            height: 50px;
            background: linear-gradient(to top, #ffd700, #ff4444);
            bottom: -40px;
            left: 5px;
            border-radius: 50%;
            animation: space-fire 0.2s infinite;
            z-index: 1;
        }
        
        @keyframes space-fire {
            0% { height: 50px; opacity: 1; }
            50% { height: 70px; opacity: 0.8; }
            100% { height: 50px; opacity: 1; }
        }
        
        .space-levels {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
        }
        
        .space-level {
            flex: 1 0 calc(20% - 8px);
            background: rgba(0,0,0,0.7);
            border: 1px solid #2a2c36;
            border-radius: 12px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
        }
        
        .space-level.unlocked {
            border-color: #ffd700;
            background: rgba(255,215,0,0.1);
        }
        
        .space-level.current {
            border: 2px solid #ffd700;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
        }
        
        .space-level-number {
            font-size: 14px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .space-level-name {
            font-size: 8px;
            color: #8e8e98;
        }
        
        .space-level-bonus {
            font-size: 10px;
            color: #4caf50;
        }
        
        .rocket-launch-btn {
            background: linear-gradient(135deg, #ffd700, #ff4444);
            border: 2px solid white;
            color: black;
            padding: 16px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            margin: 16px 0;
            font-size: 16px;
            animation: rocket-glow 2s infinite;
        }
        
        @keyframes rocket-glow {
            0% { box-shadow: 0 0 10px #ffd700; }
            50% { box-shadow: 0 0 30px #ff4444; }
            100% { box-shadow: 0 0 10px #ffd700; }
        }
        
        .rocket-timer {
            background: #1a1c24;
            border-radius: 16px;
            padding: 12px;
            margin: 10px 0;
            text-align: center;
            font-size: 18px;
            color: #ff9800;
            border: 1px solid #ffd700;
        }
        
        .rocket-result {
            background: rgba(255,215,0,0.1);
            border-radius: 16px;
            padding: 16px;
            margin: 10px 0;
            text-align: center;
            border: 2px solid #ffd700;
        }
        
        .rocket-success {
            color: #4caf50;
            font-size: 16px;
            font-weight: bold;
        }
        
        .rocket-fail {
            color: #ff4444;
            font-size: 16px;
            font-weight: bold;
        }
        
        /* ========== 3D МОДЕЛИ - ИСПРАВЛЕНЫ ========== */
        .model-3d {
            width: 100%;
            height: 80px;
            position: relative;
            margin-bottom: 10px;
        }
        
        /* ТАКСИ - КОЛЕСА ПРАВИЛЬНО */
        .car-model {
            position: relative;
            width: 100%;
            height: 100%;
        }
        
        .car-body {
            position: absolute;
            width: 70px;
            height: 25px;
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            border-radius: 12px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            animation: car-drive 3s infinite;
        }
        
        .car-roof {
            position: absolute;
            width: 35px;
            height: 15px;
            background: linear-gradient(135deg, #ffaa00, #ff4444);
            border-radius: 8px 8px 0 0;
            left: 50%;
            top: 35%;
            transform: translateX(-50%);
            animation: car-drive 3s infinite;
        }
        
        .car-wheel {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #333;
            border-radius: 50%;
            border: 2px solid #ffd700;
            bottom: 15px;
            animation: wheel-spin 1s infinite linear;
        }
        
        .car-wheel.left {
            left: 20px;
        }
        
        .car-wheel.right {
            right: 20px;
        }
        
        @keyframes car-drive {
            0% { transform: translate(-50%, -50%) translateX(-5px); }
            50% { transform: translate(-50%, -50%) translateX(5px); }
            100% { transform: translate(-50%, -50%) translateX(-5px); }
        }
        
        @keyframes wheel-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* БИТКОИН */
        .bitcoin-model {
            position: relative;
            width: 100%;
            height: 100%;
        }
        
        .bitcoin-coin {
            position: absolute;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            border-radius: 50%;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            animation: bitcoin-float 3s infinite, bitcoin-spin 5s infinite linear;
            box-shadow: 0 0 30px #ffd700;
        }
        
        .bitcoin-symbol {
            position: absolute;
            font-size: 25px;
            font-weight: bold;
            color: black;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
        
        @keyframes bitcoin-float {
            0% { transform: translate(-50%, -50%) translateY(0); }
            50% { transform: translate(-50%, -50%) translateY(-5px); }
            100% { transform: translate(-50%, -50%) translateY(0); }
        }
        
        @keyframes bitcoin-spin {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        
        /* МАЙНИНГ ФЕРМА */
        .mining-rig {
            position: absolute;
            width: 70px;
            height: 35px;
            background: linear-gradient(135deg, #00c853, #009624);
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            border-radius: 10px;
            animation: rig-pulse 2s infinite;
        }
        
        .mining-fan {
            position: absolute;
            width: 18px;
            height: 18px;
            background: #666;
            border-radius: 50%;
            right: 8px;
            top: 8px;
            animation: fan-spin 1s infinite linear;
        }
        
        .mining-light {
            position: absolute;
            width: 5px;
            height: 5px;
            background: #4caf50;
            border-radius: 50%;
            left: 8px;
            top: 14px;
            animation: blink 0.5s infinite;
        }
        
        @keyframes fan-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes rig-pulse {
            0% { box-shadow: 0 0 10px #00c853; }
            50% { box-shadow: 0 0 30px #00c853; }
            100% { box-shadow: 0 0 10px #00c853; }
        }
        
        @keyframes blink {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }
        
        /* ОСТРОВ */
        .island-model {
            position: relative;
            width: 100%;
            height: 100%;
        }
        
        .island-base {
            position: absolute;
            width: 70px;
            height: 25px;
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            left: 50%;
            bottom: 15px;
            transform: translateX(-50%);
            border-radius: 50%;
        }
        
        .island-palm {
            position: absolute;
            width: 5px;
            height: 35px;
            background: #8B4513;
            left: 50%;
            bottom: 35px;
            transform: translateX(-50%);
        }
        
        .island-leaf {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #4CAF50;
            border-radius: 50%;
            left: 50%;
            bottom: 55px;
            transform: translateX(-50%);
            animation: leaf-wave 2s infinite;
        }
        
        @keyframes leaf-wave {
            0% { transform: translateX(-50%) rotate(0deg); }
            50% { transform: translateX(-50%) rotate(10deg); }
            100% { transform: translateX(-50%) rotate(0deg); }
        }
        
        .mining-farm {
            background: rgba(0, 200, 83, 0.1);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid #00c853;
        }
        
        .farm-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .farm-name {
            font-weight: 600;
            color: #00c853;
            font-size: 16px;
        }
        
        .farm-level {
            color: #ffd700;
            font-size: 14px;
        }
        
        .farm-progress {
            background: rgba(255,255,255,0.1);
            height: 6px;
            border-radius: 3px;
            margin: 8px 0;
            overflow: hidden;
        }
        
        .farm-progress-bar {
            height: 100%;
            background: #00c853;
            width: 0%;
        }
        
        .farm-income {
            color: #4caf50;
            font-size: 13px;
            margin: 4px 0;
        }
        
        .farm-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        
        .farm-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid #00c853;
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            flex: 1;
            text-align: center;
        }
        
        .business-item {
            background: #1a1c24;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid #2a2c36;
            cursor: pointer;
        }
        
        .business-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .business-name {
            font-weight: 600;
            color: #ffd700;
            font-size: 16px;
        }
        
        .business-level {
            color: #4caf50;
            font-size: 14px;
        }
        
        .business-stats {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin: 8px 0;
            color: #8e8e98;
        }
        
        .business-progress {
            background: rgba(255,255,255,0.1);
            height: 4px;
            border-radius: 2px;
            margin: 8px 0;

            if (num >= 1e18) return (num / 1e18).toFixed(2) + 'Qi';
            if (num >= 1e15) return (num / 1e15).toFixed(2) + 'Q';
            if (num >= 1e12) return (num / 1e12).toFixed(2) + 'T';

            if (num >= 1e3) return (num / 1e3).toFixed(2) + 'K';
            return Math.floor(num).toString();
        }
        
        function formatFullNumber(num) {
            if (num === undefined || num === null || isNaN(num)) return "0";
            return Math.floor(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");

function loadGame() {
    const saved = localStorage.getItem('imperiaClickerSave_' + currentUserId);
    if (saved) {
        try {
            const data = JSON.parse(saved);
            gameState = data.gameState;
            settings = data.settings || { soundEnabled: true, effectsEnabled: true };
            currentUser = data.nickname || "ИГРОК";
            
            if (!gameState.houses) {
                gameState.houses = houses.map(h => ({ ...h }));
            }
            
            if (!gameState.islands) {
                gameState.islands = islands.map(i => ({ ...i }));
            }
            
            if (!gameState.garages) {
                gameState.garages = { cars: [], planes: [], ships: [] };
            }
            
            if (!gameState.crypto) {
                gameState.crypto = cryptoCurrencies.map(c => ({ id: c.id, owned: 0 }));
            }
            
            if (!gameState.cryptoPrices) {
                cryptoPrices = cryptoCurrencies.map(c => c.basePrice);
                gameState.cryptoPrices = cryptoPrices;
            } else {
                cryptoPrices = gameState.cryptoPrices;
            }
            
            if (!gameState.myBusinesses) {
                gameState.myBusinesses = [];
            }
            
            if (!gameState.miningFarms) {
                gameState.miningFarms = [];
            }
            
            if (!gameState.battlePass) {
                gameState.battlePass = { level: 1, exp: 0, claimed: [], lastReset: Date.now() };
            }
            
            if (!gameState.businessPassUpgraded) {
                gameState.businessPassUpgraded = false;
            }
            
            if (!gameState.taxes) {
                gameState.taxes = [];
            }
            
            if (!gameState.calendar) {
                gameState.calendar = {
                    currentDay: 1,
                    lastClaimTime: Date.now() - 24 * 60 * 60 * 1000,
                    claimedDays: [],
                    totalDiamonds: 0,
                    streak: 0
                };
            }
            
            if (!gameState.space) {
                gameState.space = {
                    level: 0,
                    unlockedLevels: [0],
                    lastLaunchTime: null
                };
            }
            
            if (!gameState.achievements) {
                gameState.achievements = [];
                gameState.claimedAchievements = [];
            }
            
            if (!gameState.rocketLaunches) {
                gameState.rocketLaunches = [];
            }
            
            if (gameState.specialItem === undefined) {
                gameState.specialItem = { owned: false, revealed: false };
            } else {
                specialItem.owned = gameState.specialItem.owned;
                specialItem.revealed = gameState.specialItem.revealed;
            }
            
            const now = Date.now();
            const oneWeek = 7 * 24 * 60 * 60 * 1000;
            if (now - (gameState.battlePass.lastReset || 0) > oneWeek) {
                gameState.battlePass = { level: 1, exp: 0, claimed: [], lastReset: now };
            }
            
            const lastOnline = gameState.lastOnlineTime || now;
            const secondsPassed = Math.floor((now - lastOnline) / 1000);
            
            if (secondsPassed > 10) {
                calculateOfflineEarnings(secondsPassed);
            }
            
            gameState.lastOnlineTime = now;
            
            return true;
        } catch(e) {
            console.error('Load error', e);
            return false;
        }
    }
    return false;
}

function saveGame() {

        gameState.specialItem = { owned: specialItem.owned, revealed: specialItem.revealed };
        const saveData = {
            gameState: gameState,
            settings: settings,
            nickname: currentUser
        };
        localStorage.setItem('imperiaClickerSave_' + currentUserId, JSON.stringify(saveData));
    }
}

function calculateOfflineEarnings(seconds) {
    const minutes = seconds / 60;
    let income = 0;
    
    if (gameState.autoClickerLevel > 0) {
        income += gameState.autoClickerLevel * minutes;
    }
    
    if (gameState.myBusinesses && gameState.myBusinesses.length > 0) {
        gameState.myBusinesses.forEach(b => {
            const taxItem = gameState.taxes.find(t => t.type === 'business' && t.id === b.id);
            if (!taxItem || !taxItem.paid) {
                let inc = (b.income || 0) * minutes;
                if (b.manager) {
                    inc *= (1 + b.manager.level * 0.1);
                }
                if (gameState.businessPassUpgraded) {
                    inc *= 1.5;
                }
                income += inc;
                b.totalEarned = (b.totalEarned || 0) + inc;
            }
        });
    }
    
    if (gameState.crypto && cryptoPrices) {
        gameState.crypto.forEach(c => {
            const taxItem = gameState.taxes.find(t => t.type === 'crypto' && t.id === c.id);
            if ((!taxItem || !taxItem.paid) && c.owned > 0) {
                const cryptoData = cryptoCurrencies.find(cr => cr.id === c.id);
                if (cryptoData) {
                    income += cryptoData.incomePerCoin * c.owned * minutes;
                }
            }
        });
    }
    
    if (gameState.miningFarms) {
        gameState.miningFarms.forEach(farm => {
            const taxItem = gameState.taxes.find(t => t.type === 'mining' && t.id === farm.id);
            if (!taxItem || !taxItem.paid) {
                income += farm.crypto.basePrice * farm.level * 10 / 60 * minutes;
            }
        });
    }
    
    if (gameState.houses) {
        gameState.houses.forEach(h => {
            if (h.owned) {
                const taxItem = gameState.taxes.find(t => t.type === 'house' && t.id === h.id);
                if (!taxItem || !taxItem.paid) {
                    let houseIncome = h.baseIncome;
                    const upgradeCount = Object.values(h.upgrades).reduce((a, b) => a + b, 0);
                    houseIncome *= (1 + upgradeCount);
                    income += houseIncome * minutes;
                }
            }
        });
    }
    
    if (gameState.islands) {
        gameState.islands.forEach(i => {
            if (i.owned) {
                const taxItem = gameState.taxes.find(t => t.type === 'island' && t.id === i.id);
                if (!taxItem || !taxItem.paid) {
                    income += i.income * minutes;
                }
            }
        });
    }
    
    if (specialItem.owned) {
        income += specialItem.income * minutes;
    }
    
    if (income > 0) {
        const earned = Math.floor(income);
        gameState.balance = (gameState.balance || 0) + earned;
        gameState.totalEarned = (gameState.totalEarned || 0) + earned;
    }
}

function updateCryptoPrices() {
    cryptoPrices = cryptoPrices.map((price, i) => {
        const crypto = cryptoCurrencies[i];
        const change = (Math.random() - 0.5) * 2 * crypto.volatility;
        let newPrice = price * (1 + change);
        newPrice = Math.max(newPrice, crypto.basePrice * 0.1);
        newPrice = Math.min(newPrice, crypto.basePrice * 10);
        return Math.floor(newPrice);
    });
}

function calculateTotalCryptoPortfolio() {
    if (!gameState || !cryptoPrices) return 0;
    let total = 0;
    gameState.crypto.forEach(c => {
        if (c.owned > 0) {
            const cryptoData = cryptoCurrencies.find(cr => cr.id === c.id);
            if (cryptoData) {
                const price = cryptoPrices[c.id] || cryptoData.basePrice;
                total += price * c.owned;
            }
        }
    });
    return total;
}

function calculateTotalCryptoIncome() {
    if (!gameState) return 0;
    let total = 0;
    gameState.crypto.forEach(c => {
        if (c.owned > 0) {
            const cryptoData = cryptoCurrencies.find(cr => cr.id === c.id);
            if (cryptoData) {
                total += cryptoData.incomePerCoin * c.owned;
            }
        }
    });
    return total;
}

// ========== НАЛОГИ ==========
function addTaxItem(type, id, value) {
    if (!gameState.taxes) gameState.taxes = [];
    
    const existing = gameState.taxes.find(t => t.type === type && t.id === id);
    const totalAmount = Math.floor(value * TAX_RATE);
    
    if (existing) {
        existing.value = value;
        existing.totalAmount = totalAmount;
        existing.hourlyRate = totalAmount / 72;
        existing.paid = false;
        existing.accrued = 0;
        existing.dueDate = Date.now() + TAX_PERIOD;
        existing.lastUpdate = Date.now();
        return;
    }
    
    gameState.taxes.push({
        type: type,
        id: id,
        value: value,
        totalAmount: totalAmount,
        hourlyRate: totalAmount / 72,
        accrued: 0,
        dueDate: Date.now() + TAX_PERIOD,
        paid: false,
        lastUpdate: Date.now()
    });
}

function updateTaxes() {
    if (!gameState.taxes) return;
    const now = Date.now();
    
    gameState.taxes.forEach(tax => {
        if (!tax.paid) {
            const timePassed = Math.min(60 * 60 * 1000, now - (tax.lastUpdate || now));
            tax.accrued += (tax.hourlyRate * timePassed) / (60 * 60 * 1000);
            if (tax.accrued > tax.totalAmount) {
                tax.accrued = tax.totalAmount;
            }
            tax.lastUpdate = now;
        }
    });
}

function payTax(index) {
    const tax = gameState.taxes[index];
    if (!tax) return false;
    
    const amountToPay = Math.floor(tax.accrued);
    
    if (amountToPay <= 0) {
        alert('❌ НЕТ НАЧИСЛЕННЫХ НАЛОГОВ!');
        return false;
    }
    
    if (gameState.balance < amountToPay) {
        alert('❌ НЕДОСТАТОЧНО МОНЕТ ДЛЯ УПЛАТЫ НАЛОГА!');
        return false;
    }
    
    gameState.balance -= amountToPay;
    
    // СБРАСЫВАЕМ НАЛОГ - ТАЙМЕР НАЧИНАЕТСЯ ЗАНОВО
    tax.paid = true;
    tax.accrued = 0;
    tax.dueDate = Date.now() + TAX_PERIOD;
    tax.paid = false; // Снова неоплачен, но с новым таймером
    tax.lastUpdate = Date.now();
    
    saveGame();
    updateUI();
    renderTax();
    alert(`✅ Налог оплачен: ${formatMoney(amountToPay)}`);
    return true;
}

function getTaxStatus(taxItem) {
    if (!taxItem) return 'none';
    if (taxItem.paid) return 'paid';
    const timeLeft = taxItem.dueDate - Date.now();
    if (timeLeft < 0) return 'overdue';
    if (timeLeft < 12 * 60 * 60 * 1000) return 'soon';
    return 'normal';
}

function getTaxProgress(taxItem) {
    if (!taxItem) return 0;
    return (taxItem.accrued / taxItem.totalAmount) * 100;
}

function getTimeLeft(taxItem) {
    if (!taxItem) return 0;
    const timeLeft = taxItem.dueDate - Date.now();
    if (timeLeft < 0) return 0;
    return timeLeft;
}

        alert('❌ НЕДОСТАТОЧНО МОНЕТ!');

    gameState.balance -= cost;
    farm.level++;

        taxItem.hourlyRate = taxItem.totalAmount / 72;
        taxItem.paid = false;
        taxItem.accrued = 0;
        taxItem.dueDate = Date.now() + TAX_PERIOD;
    }
    
    saveGame();
    updateUI();
    renderMining();

function sellMiningFarm(index) {
    const farm = gameState.miningFarms[index];
    if (!farm) return;
    
    const taxItem = gameState.taxes.find(t => t.type === 'mining' && t.id === farm.id);
    const baseValue = taxItem ? taxItem.value : 1000000000 + (farm.level - 1) * 2000000000;
    const sellPrice = Math.floor(baseValue * 0.5);
    
    if (confirm(`Продать ферму за ${formatMoney(sellPrice)}💰?`)) {
        gameState.miningFarms.splice(index, 1);
        if (taxItem) {
            const taxIndex = gameState.taxes.findIndex(t => t.type === 'mining' && t.id === farm.id);
            if (taxIndex !== -1) gameState.taxes.splice(taxIndex, 1);
        }
        gameState.balance += sellPrice;
        
        saveGame();
        updateUI();
        renderMining();
    }
}

function startUpgrade(index) {
    const business = gameState.myBusinesses[index];
    if (!business) return;
    
    const t = businessTemplates[business.templateId];
    if (!t) return;
    
    if ((business.level || 1) >= t.maxLevel) {
        alert('❌ МАКСИМАЛЬНЫЙ УРОВЕНЬ!');
        return;
    }
    
    if (business.upgradeEnd && business.upgradeEnd > Date.now()) {
        alert('⏱️ УЛУЧШЕНИЕ УЖЕ ИДЕТ!');
        return;
    }
    
    if ((gameState.balance || 0) < (business.upgradeCost || 0)) {
        alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
        return;
    }
    
    gameState.balance -= (business.upgradeCost || 0);
    
    business.upgradeEnd = Date.now() + ((business.upgradeTime || t.upgradeTime) * 1000);
    
    saveGame();
    updateUI();
    renderBusiness();
    
    alert(`✅ Улучшение запущено на ${business.upgradeTime || t.upgradeTime} сек.`);
}

function completeUpgrade(index) {
    const business = gameState.myBusinesses[index];
    if (!business) return;
    
    const t = businessTemplates[business.templateId];
    if (!t) return;
    
    business.level++;
    business.income = Math.floor(t.baseIncome * Math.pow(t.incomeMultiplier, business.level - 1));
    business.upgradeCost = Math.floor(t.baseUpgradeCost * Math.pow(t.costMultiplier, business.level - 1));
    business.upgradeTime = Math.floor((business.upgradeTime || t.upgradeTime) * 1.3);
    business.upgradeEnd = 0;
    
    const taxItem = gameState.taxes.find(tax => tax.type === 'business' && tax.id === business.id);
    if (taxItem) {
        taxItem.value += (business.upgradeCost || 0) / (t.costMultiplier);
        taxItem.totalAmount = Math.floor(taxItem.value * TAX_RATE);
        taxItem.hourlyRate = taxItem.totalAmount / 72;
        taxItem.paid = false;
        taxItem.accrued = 0;
        taxItem.dueDate = Date.now() + TAX_PERIOD;
    }
    
    saveGame();
    updateUI();
    renderBusiness();
}

function executeTrade(cryptoId, type) {
    const crypto = cryptoCurrencies.find(c => c.id === cryptoId);
    const userCrypto = gameState.crypto.find(c => c.id === cryptoId);
    const currentPrice = cryptoPrices[cryptoId] || crypto.basePrice;
    const amount = parseInt(document.getElementById('tradeAmount')?.value);
    
    if (!amount || amount <= 0) {
        alert('❌ Введите количество!');
        return;
    }
    
    if (type === 'buy') {
        const maxBuy = crypto.maxBuy - userCrypto.owned;
        if (amount > maxBuy) {
            alert(`❌ Можно купить только ${formatFullNumber(maxBuy)}!`);
            return;
        }
        
        const totalPrice = currentPrice * amount;
        if (gameState.balance < totalPrice) {
            alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
            return;
        }
        
        gameState.balance -= totalPrice;
        userCrypto.owned += amount;
        
        const taxItem = gameState.taxes.find(t => t.type === 'crypto' && t.id === cryptoId);
        if (taxItem) {
            taxItem.value += totalPrice;
            taxItem.totalAmount = Math.floor(taxItem.value * TAX_RATE);
            taxItem.hourlyRate = taxItem.totalAmount / 72;
            taxItem.paid = false;
            taxItem.accrued = 0;
            taxItem.dueDate = Date.now() + TAX_PERIOD;
        } else {
            addTaxItem('crypto', cryptoId, totalPrice);
        }
        
        saveGame();
        updateUI();
        closeModal('modal');
        alert(`✅ Куплено ${amount} ${crypto.name} за ${formatMoney(totalPrice)}`);
        
    } else {
        if (amount > userCrypto.owned) {
            alert(`❌ У вас только ${formatFullNumber(userCrypto.owned)}!`);
            return;
        }
        
        const totalPrice = currentPrice * amount;
        gameState.balance += totalPrice;
        userCrypto.owned -= amount;
        
        if (userCrypto.owned === 0) {
            const taxIndex = gameState.taxes.findIndex(t => t.type === 'crypto' && t.id === cryptoId);
            if (taxIndex !== -1) gameState.taxes.splice(taxIndex, 1);
        }
        
        saveGame();
        updateUI();
        closeModal('modal');
        alert(`✅ Продано ${amount} ${crypto.name} за ${formatMoney(totalPrice)}`);
    }
}

function checkBattlePassLevel() {
    if (!gameState.battlePass) {
        gameState.battlePass = { level: 1, exp: 0, claimed: [], lastReset: Date.now() };
    }
    
    if (gameState.battlePass.level >= 200) return;
    
    const expNeeded = 10000 * gameState.battlePass.level;
    
    while (gameState.battlePass.exp >= expNeeded && gameState.battlePass.level < 200) {
        gameState.battlePass.exp -= expNeeded;
        gameState.battlePass.level++;
    }
}

function getTimeUntilNextPass() {
    const now = Date.now();
    const lastReset = gameState.battlePass?.lastReset || now;
    const oneWeek = 7 * 24 * 60 * 60 * 1000;
    const timeLeft = oneWeek - (now - lastReset);
    
    if (timeLeft <= 0) return "Обновляется...";
    
    const days = Math.floor(timeLeft / (24 * 60 * 60 * 1000));
    const hours = Math.floor((timeLeft % (24 * 60 * 60 * 1000)) / (60 * 60 * 1000));
    const minutes = Math.floor((timeLeft % (60 * 60 * 1000)) / (60 * 1000));
    
    return `${days}д ${hours}ч ${minutes}м`;
}

function claimBattlePassReward(level) {
    if (!gameState.battlePass) return;
    if (gameState.battlePass.claimed.includes(level)) return;
    if (level > gameState.battlePass.level) return;
    
    let moneyReward = level * 10000;
    gameState.balance += moneyReward;
    
    if (level % 5 === 0) {
        gameState.diamonds += 10;
    }
    
    if (level % 10 === 0) {
        const randomCrypto = cryptoCurrencies[Math.floor(Math.random() * cryptoCurrencies.length)];
        const userCrypto = gameState.crypto.find(c => c.id === randomCrypto.id);
        userCrypto.owned += 100000;
        alert(`🎉 Вы получили 100,000 ${randomCrypto.name}!`);
    }
    
    if (level === 200) {
        gameState.businessSlots = (gameState.businessSlots || MAX_BUSINESSES) + 1;
        alert('🎉 ПОЗДРАВЛЯЕМ! Вы получили +1 слот для бизнеса!');
    }
    
    gameState.battlePass.claimed.push(level);
    saveGame();
    updateUI();
    renderProfile();
    alert(`✅ Получено ${formatMoney(moneyReward)} за ${level} уровень пропуска!`);
}

function getPlayerRank() {
    const allWealth = [];
    
    for (let i = 0; i < forbesTop100.length; i++) {
        allWealth.push({
            name: forbesTop100[i],
            money: (100 - i) * 1000000000000,
            isPlayer: false
        });
    }
    
    const playerMoney = gameState.totalEarned || 0;
    allWealth.push({
        name: currentUser,
        money: playerMoney,
        isPlayer: true
    });
    
    allWealth.sort((a, b) => b.money - a.money);
    
    const playerIndex = allWealth.findIndex(item => item.isPlayer);
    
    return {
        rank: playerIndex + 1,
        list: allWealth.slice(0, 100)
    };
}

function renderCalendar() {
    const now = Date.now();
    const daysPassed = Math.floor((now - calendarStartDate) / (24 * 60 * 60 * 1000));
    const currentDay = Math.min(daysPassed, CALENDAR_DAYS);
    
    if (gameState.calendar && gameState.calendar.currentDay < currentDay) {
        gameState.calendar.currentDay = currentDay;
    }
    
    let html = `
        <div class="calendar-container">
            <div class="calendar-header">
                <div class="calendar-day-info">
                    <div class="calendar-day-number">${gameState.calendar?.currentDay || 1}</div>
                    <div class="calendar-day-label">ТЕКУЩИЙ ДЕНЬ</div>
                </div>
                <div class="calendar-progress">
                    <div class="calendar-progress-fill" style="width: ${((gameState.calendar?.currentDay || 1) / CALENDAR_DAYS) * 100}%"></div>
                </div>
                <div class="calendar-day-info">
                    <div class="calendar-day-number">${CALENDAR_DAYS}</div>
                    <div class="calendar-day-label">ВСЕГО</div>
                </div>
            </div>
            
            <div style="display:flex; justify-content:space-between; margin:10px 0;">
                <span>📊 Получено: ${gameState.calendar?.claimedDays?.length || 0}/${CALENDAR_DAYS}</span>
                <span>💎 Алмазов: ${gameState.calendar?.totalDiamonds || 0}</span>
                <span>🔥 Стрик: ${gameState.calendar?.streak || 0}</span>
            </div>
            
            <div class="calendar-grid">
    `;
    
    const startDay = Math.max(1, (gameState.calendar?.currentDay || 1) - 5);
    const endDay = Math.min(CALENDAR_DAYS, startDay + 14);
    
    for (let day = startDay; day <= endDay; day++) {
        const reward = getRewardForDay(day);
        const isClaimed = gameState.calendar?.claimedDays?.includes(day);
        const isAvailable = day <= (gameState.calendar?.currentDay || 1) && !isClaimed;
        
        let cardClass = 'calendar-day-card';
        if (reward.type === 'special-10') cardClass += ' special-10';
        if (reward.type === 'special-100' || reward.type === 'mega') cardClass += ' special-100';
        if (isClaimed) cardClass += ' claimed';
        
        html += `
            <div class="${cardClass}">
                <div class="calendar-day">День ${day}</div>
                <div class="calendar-reward">${reward.diamonds}💎</div>
                ${isAvailable ? 
                    `<button class="calendar-claim-btn" onclick="claimCalendarDay(${day})">Забрать</button>` :
                    `<button class="calendar-claim-btn disabled" disabled>${isClaimed ? 'Получено' : 'Закрыто'}</button>`
                }
            </div>
        `;
    }
    
    html += `
            </div>
        </div>
    `;
    
    document.getElementById('content').innerHTML = html;
}

function claimCalendarDay(day) {
    if (!gameState.calendar) return;
    
    if (gameState.calendar.claimedDays.includes(day)) {
        alert('❌ НАГРАДА УЖЕ ПОЛУЧЕНА!');
        return;
    }
    
    if (day > gameState.calendar.currentDay) {
        alert('❌ ЭТОТ ДЕНЬ ЕЩЕ НЕ НАСТУПИЛ!');
        return;
    }
    
    const reward = getRewardForDay(day);
    gameState.calendar.claimedDays.push(day);
    gameState.calendar.totalDiamonds += reward.diamonds;
    gameState.diamonds = (gameState.diamonds || 0) + reward.diamonds;
    gameState.balance += reward.money;
    
    if (day === gameState.calendar.currentDay) {
        gameState.calendar.streak++;
    }
    
    checkAchievements();
    saveGame();
    updateUI();
    renderCalendar();
    alert(`✅ ПОЛУЧЕНО: ${reward.diamonds}💎 + ${formatMoney(reward.money)}`);
}

// ========== ФУНКЦИИ ДЛЯ РАКЕТЫ ==========
function launchRocket() {
    if (!gameState.space) return;
    
    const launchCost = 10000000000000; // 10 триллионов
    
    if (gameState.balance < launchCost) {
        alert(`❌ НЕДОСТАТОЧНО МОНЕТ! Нужно ${formatMoney(launchCost)}`);
        return;
    }
    
    if (rocketLaunchEnd && rocketLaunchEnd > Date.now()) {
        alert('⏱️ РАКЕТА УЖЕ В ПОЛЕТЕ!');
        return;
    }
    
    gameState.balance -= launchCost;
    
    // Рандомное время от 1 часа до 3 дней
    const minTime = 60 * 60 * 1000; // 1 час
    const maxTime = 3 * 24 * 60 * 60 * 1000; // 3 дня
    const launchTime = minTime + Math.random() * (maxTime - minTime);
    
    rocketLaunchEnd = Date.now() + launchTime;
    
    // Шанс успеха (чем дольше полет, тем выше шанс на редкие ништяки)
    const successChance = 0.3 + (launchTime / maxTime) * 0.4; // от 30% до 70%
    
    gameState.space.lastLaunch = {
        startTime: Date.now(),
        endTime: rocketLaunchEnd,
        successChance: successChance,
        cost: launchCost
    };
    
    if (!gameState.rocketLaunches) gameState.rocketLaunches = [];
    gameState.rocketLaunches.push({
        time: Date.now(),
        duration: launchTime,
        chance: successChance
    });
    
    launchSpaceRocket();
    
    if (rocketInterval) clearInterval(rocketInterval);
    rocketInterval = setInterval(checkRocketLaunch, 1000);
    
    saveGame();
    updateUI();
    renderSpace();
    alert(`🚀 РАКЕТА ЗАПУЩЕНА!\n\nВремя полета: ${formatTime(launchTime)}\nШанс успеха: ${Math.floor(successChance * 100)}%`);
}

function checkRocketLaunch() {
    if (!rocketLaunchEnd || rocketLaunchEnd <= Date.now()) {
        if (rocketLaunchEnd) {
            completeRocketLaunch();
        }
        if (rocketInterval) {
            clearInterval(rocketInterval);
            rocketInterval = null;
        }
    }
    if (document.querySelector('.nav-item.active')?.innerText.includes('Космос')) {
        renderSpace();
    }
}

function completeRocketLaunch() {
    if (!gameState.space?.lastLaunch) return;
    
    const launch = gameState.space.lastLaunch;
    const random = Math.random();
    const success = random < launch.successChance;
    
    let rewards = [];
    let message = '';
    
    if (success) {
        const rarity = 1 - launch.successChance;
        
        const moneyReward = Math.floor(launch.cost * (0.5 + rarity * 2));
        gameState.balance += moneyReward;
        rewards.push(`💰 ${formatMoney(moneyReward)}`);
        
        if (rarity > 0.4) {
            const diamondsReward = Math.floor(100 * rarity * 10);
            gameState.diamonds += diamondsReward;
            rewards.push(`💎 ${diamondsReward}`);
        }
        
        if (rarity > 0.5) {
            const randomCrypto = cryptoCurrencies[Math.floor(Math.random() * cryptoCurrencies.length)];
            const cryptoAmount = Math.floor(10000 * rarity);
            const userCrypto = gameState.crypto.find(c => c.id === randomCrypto.id);
            userCrypto.owned += cryptoAmount;
            rewards.push(`${randomCrypto.emoji} ${cryptoAmount} ${randomCrypto.name}`);
        }
        
        if (rarity > 0.6) {
            if (gameState.space.level < SPACE_LEVELS.length) {
                gameState.space.level++;
                gameState.space.unlockedLevels.push(gameState.space.level);
                rewards.push(`🚀 +1 уровень космоса`);
            }
        }
        
        message = '🎉 УСПЕХ! Разведка удалась!';
    } else {
        const refund = Math.floor(launch.cost * 0.3);
        gameState.balance += refund;
        message = '💥 НЕУДАЧА! Ракета потеряна... Но вы получили страховку';
        rewards.push(`💰 ${formatMoney(refund)} (страховка)`);
    }
    
    gameState.space.lastLaunch = null;
    rocketLaunchEnd = null;
    
    saveGame();
    
    alert(`${message}\n\nПолучено:\n${rewards.join('\n')}`);
}

    if (!gameState.space) {

        alert('❌ СНАЧАЛА КУПИТЕ ПРЕДЫДУЩИЕ УРОВНИ!');
        return;
    }
    
    if (levelIndex >= SPACE_LEVELS.length) return;
    
    const levelData = SPACE_LEVELS[levelIndex];
    
    if (gameState.balance < levelData.price) {
        alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
        return;
    }
    
    gameState.balance -= levelData.price;
    gameState.space.level++;
    gameState.space.unlockedLevels.push(gameState.space.level);
    
    launchSpaceRocket();
    checkAchievements();
    saveGame();
    updateUI();
    renderSpace();

function renderAchievementsGrid(category) {
    const grid = document.getElementById('achievementsGrid');
    const pagination = document.getElementById('achievementsPagination');
    if (!grid) return;
    
    const filtered = ACHIEVEMENTS.filter(ach => {
        if (category === 'all') return true;
        if (category === 'easy' && ach.difficulty === 'easy') return true;
        if (category === 'medium' && ach.difficulty === 'medium') return true;
        if (category === 'hard' && ach.difficulty === 'hard') return true;
        if (category === 'epic' && ach.difficulty === 'epic') return true;
        return false;
    });
    
    const totalPages = Math.ceil(filtered.length / ACHIEVEMENTS_PER_PAGE);
    if (achievementsPage > totalPages) achievementsPage = totalPages;
    if (achievementsPage < 1) achievementsPage = 1;
    
    const start = (achievementsPage - 1) * ACHIEVEMENTS_PER_PAGE;
    const paginated = filtered.slice(start, start + ACHIEVEMENTS_PER_PAGE);
    
    let html = '';
    
    paginated.forEach(ach => {
        const isCompleted = gameState.achievements?.includes(ach.id);
        const isClaimed = gameState.claimedAchievements?.includes(ach.id);
        
        let current = 0;
        
        switch (ach.type) {
            case 'clicks': current = gameState.totalClicks || 0; break;
            case 'money': current = gameState.totalEarned || 0; break;
            case 'businessCount': current = gameState.myBusinesses?.length || 0; break;
            case 'cryptoAmount': current = gameState.crypto.reduce((sum, c) => sum + c.owned, 0); break;
            case 'farmCount': current = gameState.miningFarms?.length || 0; break;
            case 'houseCount': current = gameState.houses.filter(h => h.owned).length; break;
            case 'islandCount': current = gameState.islands.filter(i => i.owned).length; break;
            case 'calendarClaims': current = gameState.calendar?.claimedDays?.length || 0; break;
            case 'spaceLevel': current = gameState.space?.level || 0; break;
            case 'achievementCount': current = gameState.claimedAchievements?.length || 0; break;
        }
        
        const progress = Math.min(100, (current / ach.target) * 100);
        
        let difficultyClass = '';
        if (ach.difficulty === 'easy') difficultyClass = 'difficulty-easy';
        if (ach.difficulty === 'medium') difficultyClass = 'difficulty-medium';
        if (ach.difficulty === 'hard') difficultyClass = 'difficulty-hard';
        if (ach.difficulty === 'epic') difficultyClass = 'difficulty-epic';
        
        html += `
            <div class="achievement-card ${isClaimed ? 'completed' : ''}">
                <div class="difficulty-badge ${difficultyClass}">${ach.difficulty.toUpperCase()}</div>
                <div class="achievement-icon">${ach.icon}</div>
                <div class="achievement-name">${ach.name}</div>
                <div class="achievement-progress">${formatNumber(current)} / ${formatNumber(ach.target)}</div>
                <div style="height:3px; background:#2a2c36; border-radius:2px; margin:5px 0;">
                    <div style="height:100%; width:${progress}%; background:${progress >= 100 ? '#4caf50' : '#ffd700'}; border-radius:2px;"></div>
                </div>
                <div class="achievement-reward">💰 +${formatMoney(ach.reward * 1000000)} 💎 +${ach.reward}</div>
                ${progress >= 100 && !isClaimed ? 
                    `<button class="achievement-claim" onclick="claimAchievement(${ach.id})">ПОЛУЧИТЬ</button>` : 
                    isClaimed ? '<span style="color:#4caf50; font-size:9px;">✓ ПОЛУЧЕНО</span>' : ''
                }
            </div>
        `;
    });
    
    grid.innerHTML = html;
    
    if (pagination) {
        let paginationHtml = '';
        paginationHtml += `<button class="pagination-btn" onclick="changeAchievementsPage(-1)" ${achievementsPage <= 1 ? 'disabled' : ''}>◀</button>`;
        paginationHtml += `<span class="pagination-info">${achievementsPage}/${totalPages}</span>`;
        paginationHtml += `<button class="pagination-btn" onclick="changeAchievementsPage(1)" ${achievementsPage >= totalPages ? 'disabled' : ''}>▶</button>`;
        pagination.innerHTML = paginationHtml;
    }
}

function changeAchievementsPage(direction) {
    achievementsPage += direction;
    const category = document.querySelector('.achievements-category.active')?.dataset.cat || 'all';
    renderAchievementsGrid(category);
}

function checkAchievements() {
    if (!gameState.achievements) gameState.achievements = [];
    
    ACHIEVEMENTS.forEach(ach => {
        if (gameState.achievements.includes(ach.id)) return;
        
        let completed = false;
        
        switch (ach.type) {
            case 'clicks':
                completed = (gameState.totalClicks || 0) >= ach.target;
                break;
            case 'money':
                completed = (gameState.totalEarned || 0) >= ach.target;
                break;
            case 'businessCount':
                completed = (gameState.myBusinesses?.length || 0) >= ach.target;
                break;
            case 'cryptoAmount':
                const total = gameState.crypto.reduce((sum, c) => sum + c.owned, 0);
                completed = total >= ach.target;
                break;
            case 'farmCount':
                completed = (gameState.miningFarms?.length || 0) >= ach.target;
                break;
            case 'houseCount':
                completed = (gameState.houses?.filter(h => h.owned).length || 0) >= ach.target;
                break;
            case 'islandCount':
                completed = (gameState.islands?.filter(i => i.owned).length || 0) >= ach.target;
                break;
            case 'calendarClaims':
                completed = (gameState.calendar?.claimedDays?.length || 0) >= ach.target;
                break;
            case 'spaceLevel':
                completed = (gameState.space?.level || 0) >= ach.target;
                break;
            case 'achievementCount':
                completed = (gameState.claimedAchievements?.length || 0) >= ach.target;
                break;
        }
        
        if (completed) {
            gameState.achievements.push(ach.id);
        }
    });
}

        function renderEarn() {
            let businessIncome = 0;
            if (gameState.myBusinesses && gameState.myBusinesses.length > 0) {
                gameState.myBusinesses.forEach(b => {
                    const taxItem = gameState.taxes.find(t => t.type === 'business' && t.id === b.id);
                    if (!taxItem || !taxItem.paid) {
                        let inc = b.income || 0;
                        if (b.manager) {
                            inc *= (1 + b.manager.level * 0.1);
                        }
                        if (gameState.businessPassUpgraded) {
                            inc *= 1.5;
                        }
                        businessIncome += inc;
                    }
                });
            }
            
            let cryptoIncome = 0;
            gameState.crypto.forEach(c => {
                const taxItem = gameState.taxes.find(t => t.type === 'crypto' && t.id === c.id);
                if ((!taxItem || !taxItem.paid) && c.owned > 0) {
                    const cryptoData = cryptoCurrencies.find(cr => cr.id === c.id);
                    if (cryptoData) {
                        cryptoIncome += cryptoData.incomePerCoin * c.owned;
                    }
                }
            });
            
            let miningIncome = 0;
            if (gameState.miningFarms) {
                gameState.miningFarms.forEach(farm => {
                    const taxItem = gameState.taxes.find(t => t.type === 'mining' && t.id === farm.id);
                    if (!taxItem || !taxItem.paid) {
                        miningIncome += farm.crypto.basePrice * farm.level * 10 / 60;
                    }
                });
            }
            
            let houseIncome = 0;
            if (gameState.houses) {
                gameState.houses.forEach(h => {
                    if (h.owned) {
                        const taxItem = gameState.taxes.find(t => t.type === 'house' && t.id === h.id);
                        if (!taxItem || !taxItem.paid) {
                            let inc = h.baseIncome;
                            const upgradeCount = Object.values(h.upgrades).reduce((a, b) => a + b, 0);
                            inc *= (1 + upgradeCount);
                            houseIncome += inc;
                        }
                    }
                });
            }
            
            let islandIncome = 0;
            if (gameState.islands) {
                gameState.islands.forEach(i => {
                    if (i.owned) {
                        const taxItem = gameState.taxes.find(t => t.type === 'island' && t.id === i.id);
                        if (!taxItem || !taxItem.paid) {
                            islandIncome += i.income;
                        }
