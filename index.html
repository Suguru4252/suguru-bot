<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ТЕСТ АЧИВОК</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0b0e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .test-container {
            max-width: 800px;
            width: 100%;
            background: #0f1117;
            border-radius: 30px;
            padding: 30px;
            border: 2px solid #ffd700;
            color: white;
        }
        
        h1 {
            color: #ffd700;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .stats-panel {
            display: flex;
            justify-content: space-between;
            background: #1a1c24;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #2a2c36;
            margin-bottom: 30px;
        }
        
        .stat-item {
            text-align: center;
            flex: 1;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .stat-label {
            font-size: 12px;
            color: #8e8e98;
            margin-top: 5px;
        }
        
        .progress-bar {
            height: 10px;
            background: #2a2c36;
            border-radius: 5px;
            margin: 10px 0;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffaa00);
            width: 0%;
            border-radius: 5px;
            transition: width 0.3s;
        }
        
        .categories {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 10px;
        }
        
        .category {
            flex: 0 0 auto;
            padding: 10px 20px;
            background: #1a1c24;
            border-radius: 30px;
            border: 1px solid #2a2c36;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .category.active {
            background: #ffd700;
            color: black;
            border-color: #ffd700;
        }
        
        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 10px;
        }
        
        .achievement-card {
            background: #1a1c24;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #2a2c36;
            position: relative;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .achievement-card:hover {
            transform: translateY(-2px);
            border-color: #ffd700;
        }
        
        .achievement-card.completed {
            border-color: #4caf50;
            background: rgba(76, 175, 80, 0.1);
        }
        
        .achievement-card.completed::after {
            content: "✓";
            position: absolute;
            top: 10px;
            right: 10px;
            color: #4caf50;
            font-size: 24px;
            font-weight: bold;
        }
        
        .achievement-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        
        .achievement-title {
            font-size: 18px;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 5px;
        }
        
        .achievement-desc {
            font-size: 13px;
            color: #8e8e98;
            margin-bottom: 10px;
        }
        
        .achievement-progress {
            font-size: 12px;
            color: #4caf50;
            margin-bottom: 5px;
        }
        
        .achievement-reward {
            display: inline-block;
            background: rgba(255, 215, 0, 0.2);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            color: #ffd700;
        }
        
        .difficulty-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: bold;
        }
        
        .difficulty-easy {
            background: #4caf50;
            color: white;
        }
        
        .difficulty-medium {
            background: #ff9800;
            color: white;
        }
        
        .difficulty-hard {
            background: #f44336;
            color: white;
        }
        
        .difficulty-epic {
            background: #9c27b0;
            color: white;
        }
        
        .claim-btn {
            background: #ffd700;
            border: none;
            color: black;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: transform 0.1s;
        }
        
        .claim-btn:active {
            transform: scale(0.95);
        }
        
        .claim-btn.disabled {
            background: #2a2c36;
            color: #8e8e98;
            cursor: not-allowed;
        }
        
        .test-controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .test-btn {
            flex: 1;
            background: #2a2c36;
            border: 1px solid #ffd700;
            color: white;
            padding: 15px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
        }
        
        .test-btn:active {
            background: #3a3c46;
        }
        
        .reset-btn {
            background: #f44336;
            border: none;
            color: white;
            padding: 10px;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
    </style>
</head>
<body>

        // ========== ФОРМАТИРОВАНИЕ ==========
        function formatNumber(num) {
            if (num >= 1e15) return (num / 1e15).toFixed(1) + 'Q';
            if (num >= 1e12) return (num / 1e12).toFixed(1) + 'T';
            if (num >= 1e9) return (num / 1e9).toFixed(1) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(1) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(1) + 'K';
            return num.toString();
        }
        
        // ========== ПРОВЕРКА АЧИВОК ==========
        function checkAchievements() {
            const now = Date.now();
            
            achievements.forEach(ach => {
                if (gameState.achievements.includes(ach.id)) return;
                
                let completed = false;
                let progress = 0;
                
                switch (ach.type) {
                    case 'clicks':
                        progress = gameState.clicks;
                        completed = gameState.clicks >= ach.target;
                        break;
                    case 'money':
                        progress = gameState.money;
                        completed = gameState.money >= ach.target;
                        break;
                    case 'level':
                        progress = gameState.level;
                        completed = gameState.level >= ach.target;
                        break;
                    case 'businesses':
                        progress = gameState.businesses;
                        completed = gameState.businesses >= ach.target;
                        break;
                    case 'crypto':
                        progress = gameState.crypto;
                        completed = gameState.crypto >= ach.target;
                        break;
                    case 'miningFarms':
                        progress = gameState.miningFarms;
                        completed = gameState.miningFarms >= ach.target;
                        break;
                    case 'houses':
                        progress = gameState.houses;
                        completed = gameState.houses >= ach.target;
                        break;
                    case 'islands':
                        progress = gameState.islands;
                        completed = gameState.islands >= ach.target;
                        break;
                    case 'collection':
                        progress = gameState.collection;
                        completed = gameState.collection >= ach.target;
                        break;
                    case 'achievements':
                        progress = gameState.claimedAchievements.length;
                        completed = progress >= ach.target;
                        break;
                }
                
                if (completed && !gameState.achievements.includes(ach.id)) {
                    gameState.achievements.push(ach.id);
                }
            });
            
            renderAchievements();
        }
        
        // ========== ПОЛУЧЕНИЕ НАГРАДЫ ==========
        function claimAchievement(id) {
            if (gameState.claimedAchievements.includes(id)) return;
            
            const ach = achievements.find(a => a.id === id);
            if (!ach) return;
            
            if (!gameState.achievements.includes(id)) {
                alert('❌ СНАЧАЛА ВЫПОЛНИ АЧИВКУ!');
                return;
            }
            
            gameState.claimedAchievements.push(id);
            gameState.money += ach.reward * 1000000; // Добавляем деньги за награду
            
            renderAchievements();
            updateStats();
        }
        
        // ========== РЕНДЕР ==========
        function renderAchievements() {
            const grid = document.getElementById('achievementsGrid');
            const filteredAchs = achievements.filter(ach => {
                if (currentCategory === 'all') return true;
                if (currentCategory === 'easy' && ach.difficulty === 'easy') return true;
                if (currentCategory === 'medium' && ach.difficulty === 'medium') return true;
                if (currentCategory === 'hard' && ach.difficulty === 'hard') return true;
                if (currentCategory === 'epic' && ach.difficulty === 'epic') return true;
                if (ach.category === currentCategory) return true;
                return false;
            });
            
            let html = '';
            
            filteredAchs.forEach(ach => {
                const isCompleted = gameState.achievements.includes(ach.id);
                const isClaimed = gameState.claimedAchievements.includes(ach.id);
                
                let progress = 0;
                let current = 0;
                
                switch (ach.type) {
                    case 'clicks': current = gameState.clicks; break;
                    case 'money': current = gameState.money; break;
                    case 'level': current = gameState.level; break;
                    case 'businesses': current = gameState.businesses; break;
                    case 'crypto': current = gameState.crypto; break;
                    case 'miningFarms': current = gameState.miningFarms; break;
                    case 'houses': current = gameState.houses; break;
                    case 'islands': current = gameState.islands; break;
                    case 'collection': current = gameState.collection; break;
                    case 'achievements': current = gameState.claimedAchievements.length; break;
                }
                
                progress = Math.min(100, (current / ach.target) * 100);
                
                let difficultyClass = '';
                if (ach.difficulty === 'easy') difficultyClass = 'difficulty-easy';
                if (ach.difficulty === 'medium') difficultyClass = 'difficulty-medium';
                if (ach.difficulty === 'hard') difficultyClass = 'difficulty-hard';
                if (ach.difficulty === 'epic') difficultyClass = 'difficulty-epic';
                
                html += `
                    <div class="achievement-card ${isClaimed ? 'completed' : ''}">
                        <div class="difficulty-badge ${difficultyClass}">${ach.difficulty.toUpperCase()}</div>
                        <div class="achievement-icon">${ach.icon}</div>
                        <div class="achievement-title">${ach.name}</div>
                        <div class="achievement-desc">${ach.desc}</div>
                        <div class="achievement-progress">
                            ${formatNumber(current)} / ${formatNumber(ach.target)} (${Math.floor(progress)}%)
                        </div>
                        <div class="progress-bar" style="height: 5px; margin: 5px 0;">
                            <div class="progress-fill" style="width: ${progress}%; background: ${isCompleted ? '#4caf50' : '#ffd700'};"></div>
                        </div>
                        <div class="achievement-reward">💰 +${formatNumber(ach.reward * 1000000)} 💎 +${ach.reward}</div>
                        ${isCompleted && !isClaimed ? 
                            `<button class="claim-btn" onclick="claimAchievement(${ach.id})">ПОЛУЧИТЬ</button>` : 
                            isClaimed ? 
                            '<button class="claim-btn disabled" disabled>ПОЛУЧЕНО</button>' : 
                            '<button class="claim-btn disabled" disabled>ВЫПОЛНИТЕ</button>'
                        }
                    </div>
                `;
            });
            
            grid.innerHTML = html;
            updateStats();
        }
        
        function updateStats() {
            const totalAchievements = document.getElementById('totalAchievements');
            const totalPoints = document.getElementById('totalPoints');
            const totalDiamonds = document.getElementById('totalDiamonds');
            const progressBar = document.getElementById('progressBar');
            
            const completed = gameState.claimedAchievements.length;
            totalAchievements.textContent = `${completed}/${achievements.length}`;
            totalPoints.textContent = completed * 10;
            totalDiamonds.textContent = gameState.claimedAchievements.reduce((sum, id) => {
                const ach = achievements.find(a => a.id === id);
                return sum + (ach ? ach.reward : 0);
            }, 0);
            progressBar.style.width = (completed / achievements.length) * 100 + '%';
        }
        
        // ========== ТЕСТОВЫЕ ФУНКЦИИ ==========
        function addClicks(amount) {
            gameState.clicks += amount;
            checkAchievements();
        }
        
        function addMoney(amount) {
            gameState.money += amount;
            checkAchievements();
        }
        
        function addLevel() {
            gameState.level++;
            checkAchievements();
        }
        
        function resetTest() {
            gameState = {
                clicks: 0,
                money: 0,
                level: 1,
                businesses: 0,
                crypto: 0,
                miningFarms: 0,
                houses: 0,
                islands: 0,
                collection: 0,
                achievements: [],
                claimedAchievements: []
            };
            renderAchievements();
        }
        
        // ========== КАТЕГОРИИ ==========
        document.querySelectorAll('.category').forEach(cat => {
            cat.addEventListener('click', function() {
                document.querySelectorAll('.category').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                currentCategory = this.dataset.cat;
                renderAchievements();
            });
        });
        
        // ========== ЗАПУСК ==========
        window.onload = function() {
            renderAchievements();
            
            window.addClicks = addClicks;
            window.addMoney = addMoney;
            window.addLevel = addLevel;
            window.resetTest = resetTest;
            window.claimAchievement = claimAchievement;
        };
    </script>
</body>
</html>
