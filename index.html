        // ========== ЗАГРУЗКА/СОХРАНЕНИЕ ==========
        function loadGame() {
            const saved = localStorage.getItem('imperiaClickerSave_' + currentUserId);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    gameState = data.gameState;
                    settings = data.settings || { soundEnabled: true, effectsEnabled: true };
                    currentUser = data.nickname || "ИГРОК";
                    
                    if (!gameState.houses) gameState.houses = houses.map(h => ({ ...h }));
                    if (!gameState.islands) gameState.islands = islands.map(i => ({ ...i }));
                    if (!gameState.garages) gameState.garages = { cars: [], planes: [], ships: [] };
                    if (!gameState.crypto) gameState.crypto = cryptoCurrencies.map(c => ({ id: c.id, owned: 0 }));
                    if (!gameState.cryptoPrices) {
                        cryptoPrices = cryptoCurrencies.map(c => c.basePrice);
                        gameState.cryptoPrices = cryptoPrices;
                    } else {
                        cryptoPrices = gameState.cryptoPrices;
                    }
                    if (!gameState.myBusinesses) gameState.myBusinesses = [];
                    if (!gameState.miningFarms) gameState.miningFarms = [];
                    if (!gameState.battlePass) gameState.battlePass = { level: 1, exp: 0, claimed: [], lastReset: Date.now() };
                    if (!gameState.businessPassUpgraded) gameState.businessPassUpgraded = false;
                    if (!gameState.taxes) gameState.taxes = [];
                    if (!gameState.calendar) {
                        gameState.calendar = {
                            currentDay: 1,
                            lastClaimTime: Date.now() - 24 * 60 * 60 * 1000,
                            claimedDays: [],
                            totalDiamonds: 0,
                            streak: 0
                        };
                    }
                    if (!gameState.space) {
                        gameState.space = {
                            level: 0,
                            unlockedLevels: [0],
                            lastLaunchTime: null
                        };
                    }
                    if (!gameState.achievements) {
                        gameState.achievements = [];
                        gameState.claimedAchievements = [];
                    }
                    if (!gameState.rocketLaunches) gameState.rocketLaunches = [];
                    
                    if (gameState.specialItem === undefined) {
                        gameState.specialItem = { owned: false, revealed: false };
                    } else {
                        specialItem.owned = gameState.specialItem.owned;
                        specialItem.revealed = gameState.specialItem.revealed;
                    }
                    
                    const now = Date.now();
                    const oneWeek = 7 * 24 * 60 * 60 * 1000;
                    if (now - (gameState.battlePass.lastReset || 0) > oneWeek) {
                        gameState.battlePass = { level: 1, exp: 0, claimed: [], lastReset: now };
                    }
                    
                    const lastOnline = gameState.lastOnlineTime || now;
                    const secondsPassed = Math.floor((now - lastOnline) / 1000);
                    
                    if (secondsPassed > 10) {
                        calculateOfflineEarnings(secondsPassed);
                    }
                    
                    gameState.lastOnlineTime = now;
                    
                    return true;
                } catch(e) {
                    console.error('Load error', e);
                    return false;
                }
            }
            return false;
        }

        function saveGame() {
            if (gameState) {
                gameState.lastOnlineTime = Date.now();
                gameState.cryptoPrices = cryptoPrices;
                gameState.specialItem = { owned: specialItem.owned, revealed: specialItem.revealed };
                const saveData = {
                    gameState: gameState,
                    settings: settings,
                    nickname: currentUser
                };
                localStorage.setItem('imperiaClickerSave_' + currentUserId, JSON.stringify(saveData));
            }
        }

        function calculateOfflineEarnings(seconds) {
            const minutes = seconds / 60;
            let income = 0;
            
            if (gameState.myBusinesses && gameState.myBusinesses.length > 0) {
                gameState.myBusinesses.forEach(b => {
                    const taxItem = gameState.taxes.find(t => t.type === 'business' && t.id === b.id);
                    if (!taxItem || !taxItem.paid) {
                        let inc = (b.income || 0) * minutes;
                        if (b.manager) inc *= (1 + b.manager.level * 0.1);
                        if (gameState.businessPassUpgraded) inc *= 1.5;
                        income += inc;
                        b.totalEarned = (b.totalEarned || 0) + inc;
                    }
                });
            }
            
            if (gameState.crypto && cryptoPrices) {
                gameState.crypto.forEach(c => {
                    const taxItem = gameState.taxes.find(t => t.type === 'crypto' && t.id === c.id);
                    if ((!taxItem || !taxItem.paid) && c.owned > 0) {
                        const cryptoData = cryptoCurrencies.find(cr => cr.id === c.id);
                        if (cryptoData) {
                            income += cryptoData.incomePerCoin * c.owned * minutes;
                        }
                    }
                });
            }
            
            if (gameState.miningFarms) {
                gameState.miningFarms.forEach(farm => {
                    const taxItem = gameState.taxes.find(t => t.type === 'mining' && t.id === farm.id);
                    if (!taxItem || !taxItem.paid) {
                        income += farm.crypto.basePrice * farm.level * 10 / 60 * minutes;
                    }
                });
            }
            
            if (gameState.houses) {
                gameState.houses.forEach(h => {
                    if (h.owned) {
                        const taxItem = gameState.taxes.find(t => t.type === 'house' && t.id === h.id);
                        if (!taxItem || !taxItem.paid) {
                            let houseIncome = h.baseIncome;
                            const upgradeCount = Object.values(h.upgrades).reduce((a, b) => a + b, 0);
                            houseIncome *= (1 + upgradeCount);
                            income += houseIncome * minutes;
                        }
                    }
                });
            }
            
            if (gameState.islands) {
                gameState.islands.forEach(i => {
                    if (i.owned) {
                        const taxItem = gameState.taxes.find(t => t.type === 'island' && t.id === i.id);
                        if (!taxItem || !taxItem.paid) {
                            income += i.income * minutes;
                        }
                    }
                });
            }
            
            if (specialItem.owned) {
                income += specialItem.income * minutes;
            }
            
            if (income > 0) {
                const earned = Math.floor(income);
                gameState.balance = (gameState.balance || 0) + earned;
                gameState.totalEarned = (gameState.totalEarned || 0) + earned;
            }
        }

        // ========== НАЛОГИ ==========
        function addTaxItem(type, id, value) {
            if (!gameState.taxes) gameState.taxes = [];
            
            const existing = gameState.taxes.find(t => t.type === type && t.id === id);
            const totalAmount = Math.floor(value * TAX_RATE);
            
            if (existing) {
                existing.value = value;
                existing.totalAmount = totalAmount;
                existing.hourlyRate = totalAmount / 72;
                existing.paid = false;
                existing.accrued = 0;
                existing.dueDate = Date.now() + TAX_PERIOD;
                existing.lastUpdate = Date.now();
                existing.overdue = false;
                return;
            }
            
            gameState.taxes.push({
                type: type,
                id: id,
                value: value,
                totalAmount: totalAmount,
                hourlyRate: totalAmount / 72,
                accrued: 0,
                dueDate: Date.now() + TAX_PERIOD,
                paid: false,
                lastUpdate: Date.now(),
                overdue: false
            });
        }

        function updateTaxes() {
            if (!gameState.taxes) return;
            const now = Date.now();
            
            gameState.taxes.forEach(tax => {
                if (!tax.paid) {
                    const timePassed = Math.min(60 * 60 * 1000, now - (tax.lastUpdate || now));
                    tax.accrued += (tax.hourlyRate * timePassed) / (60 * 60 * 1000);
                    if (tax.accrued > tax.totalAmount) tax.accrued = tax.totalAmount;
                    tax.lastUpdate = now;
                    
                    const timeLeft = tax.dueDate - now;
                    tax.overdue = timeLeft < 0;
                }
            });
        }

        function checkOverdueTaxes() {
            if (!gameState.taxes) return;
            const now = Date.now();
            
            gameState.taxes.forEach(tax => {
                if (!tax.paid) {
                    const timeLeft = tax.dueDate - now;
                    tax.overdue = timeLeft < 0;
                }
            });
        }

        function payTax(index) {
            const tax = gameState.taxes[index];
            if (!tax) return false;
            
            const amountToPay = Math.floor(tax.accrued);
            
            if (amountToPay <= 0) {
                alert('❌ НЕТ НАЧИСЛЕННЫХ НАЛОГОВ!');
                return false;
            }
            
            if (gameState.balance < amountToPay) {
                alert('❌ НЕДОСТАТОЧНО МОНЕТ ДЛЯ УПЛАТЫ НАЛОГА!');
                return false;
            }
            
            gameState.balance -= amountToPay;
            
            gameState.taxes.splice(index, 1);
            
            saveGame();
            updateUI();
            renderTax();
            alert(`✅ Налог оплачен: ${formatMoney(amountToPay)}`);
            return true;
        }

        function getTaxStatus(taxItem) {
            if (!taxItem) return 'none';
            if (taxItem.paid) return 'paid';
            if (taxItem.overdue) return 'overdue';
            const timeLeft = taxItem.dueDate - Date.now();
            if (timeLeft < 12 * 60 * 60 * 1000) return 'soon';
            return 'normal';
        }

        function getTaxProgress(taxItem) {
            if (!taxItem) return 0;
            return (taxItem.accrued / taxItem.totalAmount) * 100;
        }

        function getTimeLeft(taxItem) {
            if (!taxItem) return 0;
            const timeLeft = taxItem.dueDate - Date.now();
            if (timeLeft < 0) return 0;
            return timeLeft;
        }

        // ========== КРИПТО-МАЙНИНГ ==========
        function buyMiningFarm() {
            if (gameState.miningFarms.length >= MAX_MINING_FARMS) {
                alert(`❌ МАКСИМУМ ${MAX_MINING_FARMS} ФЕРМ!`);
                return;
            }
            
            const cost = 1000000000;
            if (gameState.balance < cost) {
                alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
                return;
            }
            
            gameState.balance -= cost;
            
            if (!gameState.miningFarms) gameState.miningFarms = [];
            
            const newFarm = {
                id: Date.now(),
                level: 1,
                crypto: miningCryptos[Math.floor(Math.random() * miningCryptos.length)],
                progress: 0,
                maxProgress: 100,
                lastUpdate: Date.now()
            };
            
            gameState.miningFarms.push(newFarm);
            
            addTaxItem('mining', newFarm.id, cost);
            
            checkAchievements();
            saveGame();
            updateUI();
            renderMining();
        }

        function upgradeMiningFarm(index) {
            const farm = gameState.miningFarms[index];
            if (!farm) return;
            
            if (farm.level >= MAX_FARM_LEVEL) {
                alert(`❌ МАКСИМАЛЬНЫЙ УРОВЕНЬ ${MAX_FARM_LEVEL}!`);
                return;
            }
            
            const cost = 2000000000 * farm.level;
            if (gameState.balance < cost) {
                alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
                return;
            }
            
            gameState.balance -= cost;
            farm.level++;
            
            const taxItem = gameState.taxes.find(t => t.type === 'mining' && t.id === farm.id);
            if (taxItem) {
                taxItem.value += cost;
                taxItem.totalAmount = Math.floor(taxItem.value * TAX_RATE);
                taxItem.hourlyRate = taxItem.totalAmount / 72;
                taxItem.paid = false;
                taxItem.accrued = 0;
                taxItem.dueDate = Date.now() + TAX_PERIOD;
            }
            
            saveGame();
            updateUI();
            renderMining();
        }

        function sellMiningFarm(index) {
            const farm = gameState.miningFarms[index];
            if (!farm) return;
            
            const taxItem = gameState.taxes.find(t => t.type === 'mining' && t.id === farm.id);
            const baseValue = taxItem ? taxItem.value : 1000000000 + (farm.level - 1) * 2000000000;
            const sellPrice = Math.floor(baseValue * 0.5);
            
            if (confirm(`Продать ферму за ${formatMoney(sellPrice)}💰?`)) {
                gameState.miningFarms.splice(index, 1);
                if (taxItem) {
                    const taxIndex = gameState.taxes.findIndex(t => t.type === 'mining' && t.id === farm.id);
                    if (taxIndex !== -1) gameState.taxes.splice(taxIndex, 1);
                }
                gameState.balance += sellPrice;
                
                saveGame();
                updateUI();
                renderMining();
            }
        }

        // ========== БИЗНЕСЫ ==========
        function buyBusiness(templateId) {
            const t = businessTemplates.find(t => t.id === templateId);
            if (!t) return;
            
            const totalBusinesses = gameState.myBusinesses ? gameState.myBusinesses.length : 0;
            
            if (totalBusinesses >= MAX_BUSINESSES) {
                alert(`❌ НЕЛЬЗЯ КУПИТЬ БОЛЬШЕ ${MAX_BUSINESSES} БИЗНЕСОВ!`);
                return;
            }
            
            if ((gameState.balance || 0) < t.baseUpgradeCost) {
                alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
                return;
            }
            
            gameState.balance -= t.baseUpgradeCost;
            
            if (!gameState.myBusinesses) gameState.myBusinesses = [];
            
            const newBusiness = {
                id: Date.now() + Math.random(),
                templateId: templateId,
                name: t.name,
                level: 1,
                income: t.baseIncome,
                upgradeCost: Math.floor(t.baseUpgradeCost * t.costMultiplier),
                upgradeTime: t.upgradeTime,
                upgradeEnd: 0,
                manager: null,
                totalEarned: 0,
                incomeMultiplier: t.incomeMultiplier,
                costMultiplier: t.costMultiplier,
                diamondsSpent: 0,
                taxBlocked: false
            };
            
            gameState.myBusinesses.push(newBusiness);
            
            addTaxItem('business', newBusiness.id, t.baseUpgradeCost);
            
            checkAchievements();
            saveGame();
            updateUI();
            renderBusiness();
            alert(`✅ Куплен ${t.name}!`);
        }

        function startUpgrade(index) {
            const business = gameState.myBusinesses[index];
            if (!business) return;
            
            const t = businessTemplates[business.templateId];
            if (!t) return;
            
            const taxItem = gameState.taxes?.find(tax => tax.type === 'business' && tax.id === business.id);
            if (taxItem && taxItem.overdue) {
                alert('❌ СНАЧАЛА ОПЛАТИ НАЛОГ!');
                return;
            }
            
            if ((business.level || 1) >= t.maxLevel) {
                alert('❌ МАКСИМАЛЬНЫЙ УРОВЕНЬ!');
                return;
            }
            
            if (business.upgradeEnd && business.upgradeEnd > Date.now()) {
                alert('⏱️ УЛУЧШЕНИЕ УЖЕ ИДЕТ!');
                return;
            }
            
            if ((gameState.balance || 0) < (business.upgradeCost || 0)) {
                alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
                return;
            }
            
            gameState.balance -= (business.upgradeCost || 0);
            
            business.upgradeEnd = Date.now() + ((business.upgradeTime || t.upgradeTime) * 1000);
            
            saveGame();
            updateUI();
            renderBusiness();
            
            alert(`✅ Улучшение запущено на ${business.upgradeTime || t.upgradeTime} сек.`);
        }

        function completeUpgrade(index) {
            const business = gameState.myBusinesses[index];
            if (!business) return;
            
            const t = businessTemplates[business.templateId];
            if (!t) return;
            
            business.level++;
            business.income = Math.floor(t.baseIncome * Math.pow(t.incomeMultiplier, business.level - 1));
            business.upgradeCost = Math.floor(t.baseUpgradeCost * Math.pow(t.costMultiplier, business.level - 1));
            business.upgradeTime = Math.floor((business.upgradeTime || t.upgradeTime) * 1.3);
            business.upgradeEnd = 0;
            
            const taxItem = gameState.taxes.find(tax => tax.type === 'business' && tax.id === business.id);
            if (taxItem) {
                taxItem.value += (business.upgradeCost || 0) / (t.costMultiplier);
                taxItem.totalAmount = Math.floor(taxItem.value * TAX_RATE);
                taxItem.hourlyRate = taxItem.totalAmount / 72;
                taxItem.paid = false;
                taxItem.accrued = 0;
                taxItem.dueDate = Date.now() + TAX_PERIOD;
            }
            
            saveGame();
            updateUI();
            renderBusiness();
        }

        function hireManager(index) {
            const business = gameState.myBusinesses[index];
            if (!business) return;
            
            const taxItem = gameState.taxes?.find(tax => tax.type === 'business' && tax.id === business.id);
            if (taxItem && taxItem.overdue) {
                alert('❌ СНАЧАЛА ОПЛАТИ НАЛОГ!');
                return;
            }
            
            if (business.manager && business.manager.level >= 10) {
                alert('❌ МАКСИМАЛЬНЫЙ УРОВЕНЬ МЕНЕДЖЕРА!');
                return;
            }
            
            const cost = 50;
            
            if (gameState.diamonds < cost) {
                alert('❌ НУЖНО 50 АЛМАЗОВ!');
                return;
            }
            
            gameState.diamonds -= cost;
            business.diamondsSpent = (business.diamondsSpent || 0) + cost;
            
            if (!business.manager) {
                business.manager = { level: 1 };
            } else {
                business.manager.level++;
            }
            
            saveGame();
            updateUI();
            renderBusiness();
            alert(`✅ Менеджер улучшен до ${business.manager.level} уровня! (+${business.manager.level * 10}% прибыли)`);
        }

        function sellBusiness(index) {
            const business = gameState.myBusinesses[index];
            if (!business) return;
            
            const t = businessTemplates[business.templateId];
            if (!t) return;
            
            const taxItem = gameState.taxes.find(tax => tax.type === 'business' && tax.id === business.id);
            const totalSpent = taxItem ? taxItem.value : t.baseUpgradeCost;
            
            const sellPrice = Math.floor(totalSpent * 0.5);
            const diamondsReturn = Math.floor((business.diamondsSpent || 0) * 0.5);
            
            if (confirm(`Продать ${business.name} за ${formatMoney(sellPrice)} и вернуть ${diamondsReturn}💎?`)) {
                gameState.myBusinesses.splice(index, 1);
                if (taxItem) {
                    const taxIndex = gameState.taxes.findIndex(tax => tax.type === 'business' && tax.id === business.id);
                    if (taxIndex !== -1) gameState.taxes.splice(taxIndex, 1);
                }
                gameState.balance += sellPrice;
                gameState.diamonds += diamondsReturn;
                
                saveGame();
                updateUI();
                renderBusiness();
                alert(`✅ Продано! +${formatMoney(sellPrice)} и +${diamondsReturn}💎`);
            }
        }

        function upgradeBusinessPass() {
            if (gameState.businessPassUpgraded) {
                alert('❌ ПРОПУСК УЖЕ УЛУЧШЕН!');
                return;
            }
            
            if (gameState.diamonds < 500) {
                alert('❌ НУЖНО 500 АЛМАЗОВ!');
                return;
            }
            
            gameState.diamonds -= 500;
            gameState.businessPassUpgraded = true;
            
            saveGame();
            updateUI();
            renderBusiness();
            alert('✅ БИЗНЕС ПРОПУСК УЛУЧШЕН! Все улучшения бизнесов теперь дают +50% к прибыли');
        }

        function calculateBusinessIncome() {
            let income = 0;
            if (!gameState.myBusinesses) return income;
            
            gameState.myBusinesses.forEach(b => {
                const taxItem = gameState.taxes?.find(t => t.type === 'business' && t.id === b.id);
                if (taxItem && taxItem.overdue) return;
                
                let inc = b.income || 0;
                if (b.manager) inc *= (1 + b.manager.level * 0.1);
                if (gameState.businessPassUpgraded) inc *= 1.5;
                income += inc;
                b.totalEarned = (b.totalEarned || 0) + inc;
            });
            
            return income;
        }

        // ========== КРИПТА ==========
        function updateCryptoPrices() {
            cryptoPrices = cryptoPrices.map((price, i) => {
                const crypto = cryptoCurrencies[i];
                const change = (Math.random() - 0.5) * 2 * crypto.volatility;
                let newPrice = price * (1 + change);
                newPrice = Math.max(newPrice, crypto.basePrice * 0.1);
                newPrice = Math.min(newPrice, crypto.basePrice * 10);
                return Math.floor(newPrice);
            });
        }

        function calculateTotalCryptoPortfolio() {
            if (!gameState || !cryptoPrices) return 0;
            let total = 0;
            gameState.crypto.forEach(c => {
                if (c.owned > 0) {
                    const cryptoData = cryptoCurrencies.find(cr => cr.id === c.id);
                    if (cryptoData) {
                        const price = cryptoPrices[c.id] || cryptoData.basePrice;
                        total += price * c.owned;
                    }
                }
            });
            return total;
        }

        function calculateTotalCryptoIncome() {
            if (!gameState) return 0;
            let total = 0;
            gameState.crypto.forEach(c => {
                if (c.owned > 0) {
                    const cryptoData = cryptoCurrencies.find(cr => cr.id === c.id);
                    if (cryptoData) {
                        total += cryptoData.incomePerCoin * c.owned;
                    }
                }
            });
            return total;
        }

            const input = document.getElementById('tradeAmount');
            if (input) {
                input.value = amount;
                input.dispatchEvent(new Event('input'));
            }
        }

        function quickBuyMaxMoney(cryptoId) {
            const crypto = cryptoCurrencies.find(c => c.id === cryptoId);
            const userCrypto = gameState.crypto.find(c => c.id === cryptoId);
            const currentPrice = cryptoPrices[cryptoId] || crypto.basePrice;
            
            const maxBuy = crypto.maxBuy - userCrypto.owned;
            const maxWithMoney = Math.floor(gameState.balance / currentPrice);
            const maxPossible = Math.min(maxBuy, maxWithMoney);
            
            const input = document.getElementById('tradeAmount');
            if (input) {
                input.value = maxPossible;
                updateTotalPrice(cryptoId, currentPrice);
            }
        }

        function quickSellAll(cryptoId) {
            const crypto = cryptoCurrencies.find(c => c.id === cryptoId);
            const userCrypto = gameState.crypto.find(c => c.id === cryptoId);
            
            const input = document.getElementById('tradeAmount');
            if (input) {
                input.value = userCrypto.owned;
                updateTotalPrice(cryptoId, cryptoPrices[cryptoId] || crypto.basePrice);
            }
        }

        function updateTotalPrice(cryptoId, currentPrice) {
            const amount = parseInt(document.getElementById('tradeAmount')?.value) || 0;
            const totalPriceEl = document.getElementById('totalPrice');
            if (totalPriceEl) {
                totalPriceEl.textContent = formatMoney(currentPrice * amount);
            }
        }

        function executeTrade(cryptoId, type) {
            const crypto = cryptoCurrencies.find(c => c.id === cryptoId);
            const userCrypto = gameState.crypto.find(c => c.id === cryptoId);
            const currentPrice = cryptoPrices[cryptoId] || crypto.basePrice;
            const amount = parseInt(document.getElementById('tradeAmount')?.value);
            
            if (!amount || amount <= 0) {
                alert('❌ Введите количество!');
                return;
            }
            
            if (type === 'buy') {
                const maxBuy = crypto.maxBuy - userCrypto.owned;
                if (amount > maxBuy) {
                    alert(`❌ Можно купить только ${formatFullNumber(maxBuy)}!`);
                    return;
                }
                
                const totalPrice = currentPrice * amount;
                if (gameState.balance < totalPrice) {
                    alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
                    return;
                }
                
                gameState.balance -= totalPrice;
                userCrypto.owned += amount;
                
                const taxItem = gameState.taxes.find(t => t.type === 'crypto' && t.id === cryptoId);
                if (taxItem) {
                    taxItem.value += totalPrice;
                    taxItem.totalAmount = Math.floor(taxItem.value * TAX_RATE);
                    taxItem.hourlyRate = taxItem.totalAmount / 72;
                    taxItem.paid = false;
                    taxItem.accrued = 0;
                    taxItem.dueDate = Date.now() + TAX_PERIOD;
                } else {
                    addTaxItem('crypto', cryptoId, totalPrice);
                }
                
                saveGame();
                updateUI();
                closeModal('modal');
                alert(`✅ Куплено ${amount} ${crypto.name} за ${formatMoney(totalPrice)}`);
                
            } else {
                if (amount > userCrypto.owned) {
                    alert(`❌ У вас только ${formatFullNumber(userCrypto.owned)}!`);
                    return;
                }
                
                const totalPrice = currentPrice * amount;
                gameState.balance += totalPrice;
                userCrypto.owned -= amount;
                
                if (userCrypto.owned === 0) {

        // ========== КАЛЕНДАРЬ ==========
        function getRewardForDay(day) {
            if (day % 10 === 0) {
                const multiplier = day / 10;
                
                if (day === 1000) {
                    return { diamonds: 1000000, money: 1000000000000, title: "ИМПЕРАТОР ВСЕЛЕННОЙ", type: 'mega' };
                }
                if (day === 900) {
                    return { diamonds: 100000, money: 100000000000, title: "КРИСТАЛЛ ВЕЧНОСТИ", type: 'mega' };
                }
                if (day === 800) {
                    return { diamonds: 50000, money: 50000000000, title: "АЛМАЗНЫЙ БИЗНЕС", type: 'mega' };
                }
                if (day === 700) {
                    return { diamonds: 30000, money: 30000000000, title: "СВОЙ ОСТРОВ", type: 'mega' };
                }
                if (day === 600) {
                    return { diamonds: 20000, money: 20000000000, title: "ТЕЛЕПОРТ", type: 'mega' };
                }
                if (day === 500) {
                    return { diamonds: 10000, money: 10000000000, title: "ПОЛОВИНА ПУТИ", type: 'mega' };
                }
                if (day === 400) {
                    return { diamonds: 5000, money: 5000000000, title: "КОСМИЧЕСКАЯ СТАНЦИЯ", type: 'mega' };
                }
                if (day === 300) {
                    return { diamonds: 3000, money: 3000000000, title: "ВЕЧНЫЙ БУСТЕР", type: 'mega' };
                }
                if (day === 200) {
                    return { diamonds: 2000, money: 2000000000, title: "УНИКАЛЬНАЯ ФЕРМА", type: 'mega' };
                }
                if (day === 100) {
                    return { diamonds: 5000, money: 5000000000, title: "ЮБИЛЕЙНЫЙ СУНДУК", type: 'mega' };
                }
                if (day % 100 === 0) {
                    return { diamonds: 1000 * multiplier, money: 1000000000 * multiplier, title: `${day} ДНЕЙ!`, type: 'special-100' };
                }
                return { diamonds: 100 * multiplier, money: 100000000 * multiplier, title: `${day} ДНЕЙ`, type: 'special-10' };
            }
            const baseDiamonds = Math.floor(day / 10) + 5;
            const baseMoney = 10000 * day;
            return { diamonds: baseDiamonds, money: baseMoney, title: `День ${day}`, type: 'normal' };
        }

        function renderCalendar() {
            const now = Date.now();
            const daysPassed = Math.floor((now - calendarStartDate) / (24 * 60 * 60 * 1000));
            const currentDay = Math.min(daysPassed, CALENDAR_DAYS);
            
            if (gameState.calendar && gameState.calendar.currentDay < currentDay) {
                gameState.calendar.currentDay = currentDay;
            }
            
            let html = `
                <div class="calendar-container">
                    <div class="calendar-header">
                        <div class="calendar-day-info">
                            <div class="calendar-day-number">${gameState.calendar?.currentDay || 1}</div>
                            <div class="calendar-day-label">ТЕКУЩИЙ ДЕНЬ</div>
                        </div>
                        <div class="calendar-progress">
                            <div class="calendar-progress-fill" style="width: ${((gameState.calendar?.currentDay || 1) / CALENDAR_DAYS) * 100}%"></div>
                        </div>
                        <div class="calendar-day-info">
                            <div class="calendar-day-number">${CALENDAR_DAYS}</div>
                            <div class="calendar-day-label">ВСЕГО</div>
                        </div>
                    </div>
                    
                    <div style="display:flex; justify-content:space-between; margin:10px 0;">
                        <span>📊 Получено: ${gameState.calendar?.claimedDays?.length || 0}/${CALENDAR_DAYS}</span>

                        <span>🔥 Стрик: ${gameState.calendar?.streak || 0}</span>
                    </div>
                    
                    <div class="calendar-grid">
            `;
            
            const startDay = Math.max(1, (gameState.calendar?.currentDay || 1) - 5);
            const endDay = Math.min(CALENDAR_DAYS, startDay + 14);
            
            for (let day = startDay; day <= endDay; day++) {
                const reward = getRewardForDay(day);
                const isClaimed = gameState.calendar?.claimedDays?.includes(day);
                const isAvailable = day <= (gameState.calendar?.currentDay || 1) && !isClaimed;
                
                let cardClass = 'calendar-day-card';
                if (reward.type === 'special-10') cardClass += ' special-10';
                if (reward.type === 'special-100' || reward.type === 'mega') cardClass += ' special-100';
                if (isClaimed) cardClass += ' claimed';
                
                html += `
                    <div class="${cardClass}">
                        <div class="calendar-day">День ${day}</div>
                        <div class="calendar-reward">${reward.diamonds}💎</div>
                        ${isAvailable ? 
                            `<button class="calendar-claim-btn" onclick="claimCalendarDay(${day})">Забрать</button>` :
                            `<button class="calendar-claim-btn disabled" disabled>${isClaimed ? 'Получено' : 'Закрыто'}</button>`
                        }
                    </div>
                `;
            }
            
            html += `
                    </div>
                </div>
            `;
            
            document.getElementById('content').innerHTML = html;
        }

        function claimCalendarDay(day) {
            if (!gameState.calendar) return;
            
            if (gameState.calendar.claimedDays.includes(day)) {
                alert('❌ НАГРАДА УЖЕ ПОЛУЧЕНА!');
                return;
            }
            
            if (day > gameState.calendar.currentDay) {
                alert('❌ ЭТОТ ДЕНЬ ЕЩЕ НЕ НАСТУПИЛ!');
                return;
            }
            
            const reward = getRewardForDay(day);
            gameState.calendar.claimedDays.push(day);
            gameState.calendar.totalDiamonds += reward.diamonds;
            gameState.diamonds = (gameState.diamonds || 0) + reward.diamonds;
            gameState.balance += reward.money;
            
            if (day === gameState.calendar.currentDay) {
                gameState.calendar.streak++;
            }
            
            checkAchievements();
            saveGame();
            updateUI();
            renderCalendar();
            alert(`✅ ПОЛУЧЕНО: ${reward.diamonds}💎 + ${formatMoney(reward.money)}`);
        }

        function buySpaceLevel(levelIndex) {
            if (!gameState.space) {
                gameState.space = { level: 0, unlockedLevels: [0] };
            }
            
            if (levelIndex !== gameState.space.level) {
                alert('❌ СНАЧАЛА КУПИТЕ ПРЕДЫДУЩИЕ УРОВНИ!');
                return;
            }
            
            if (levelIndex >= SPACE_LEVELS.length) return;
            
            const levelData = SPACE_LEVELS[levelIndex];
            
            if (gameState.balance < levelData.price) {
                alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
                return;
            }
            
            gameState.balance -= levelData.price;
            gameState.space.level++;
            gameState.space.unlockedLevels.push(gameState.space.level);
            
            addTaxItem('space', 'space_level', levelData.price);
            
            launchSpaceRocket();
            checkAchievements();
            saveGame();
            updateUI();
            renderSpace();
            alert(`✅ КУПЛЕН УРОВЕНЬ: ${levelData.name}\nТеперь ваш бонус: +${levelData.bonus}%`);
        }

        function launchSpaceRocket() {
            const rocket = document.getElementById('spaceRocket');
            if (!rocket) return;
            
            rocket.classList.add('launch');
            
            setTimeout(() => {
                rocket.classList.remove('launch');
            }, 3000);
        }

        function launchRocket() {
            if (!gameState.space) return;
            
            const launchCost = 10000000000000;
            
            if (gameState.balance < launchCost) {
                alert(`❌ НЕДОСТАТОЧНО МОНЕТ! Нужно ${formatMoney(launchCost)}`);
                return;
            }
            
            if (rocketLaunchEnd && rocketLaunchEnd > Date.now()) {
                alert('⏱️ РАКЕТА УЖЕ В ПОЛЕТЕ!');
                return;
            }
            
            gameState.balance -= launchCost;
            
            const minTime = 60 * 60 * 1000;
            const maxTime = 3 * 24 * 60 * 60 * 1000;
            const launchTime = minTime + Math.random() * (maxTime - minTime);
            
            rocketLaunchEnd = Date.now() + launchTime;
            
            const successChance = 0.3 + (launchTime / maxTime) * 0.4;
            
            gameState.space.lastLaunch = {
                startTime: Date.now(),
                endTime: rocketLaunchEnd,
                successChance: successChance,
                cost: launchCost
            };
            
            if (!gameState.rocketLaunches) gameState.rocketLaunches = [];
            gameState.rocketLaunches.push({
                time: Date.now(),
                duration: launchTime,
                chance: successChance
            });
            
            launchSpaceRocket();
            
            if (rocketInterval) clearInterval(rocketInterval);
            rocketInterval = setInterval(checkRocketLaunch, 1000);
            
            saveGame();
            updateUI();
            renderSpace();
            alert(`🚀 РАКЕТА ЗАПУЩЕНА!\n\nВремя полета: ${formatTime(launchTime)}\nШанс успеха: ${Math.floor(successChance * 100)}%`);
        }

        function checkRocketLaunch() {
            if (!rocketLaunchEnd || rocketLaunchEnd <= Date.now()) {
                if (rocketLaunchEnd) {
                    completeRocketLaunch();
                }
                if (rocketInterval) {
                    clearInterval(rocketInterval);
                    rocketInterval = null;
                }
            }
        }

        function completeRocketLaunch() {
            if (!gameState.space?.lastLaunch) return;
            
            const launch = gameState.space.lastLaunch;
            const random = Math.random();
            const success = random < launch.successChance;
            
            let rewards = [];
            let message = '';
            
            if (success) {
                const rarity = 1 - launch.successChance;
                
                const moneyReward = Math.floor(launch.cost * (0.5 + rarity * 2));
                gameState.balance += moneyReward;
                rewards.push(`💰 ${formatMoney(moneyReward)}`);
                
                if (rarity > 0.4) {
                    const diamondsReward = Math.floor(100 * rarity * 10);
                    gameState.diamonds += diamondsReward;
                    rewards.push(`💎 ${diamondsReward}`);
                }
                
                if (rarity > 0.5) {
                    const randomCrypto = cryptoCurrencies[Math.floor(Math.random() * cryptoCurrencies.length)];
                    const cryptoAmount = Math.floor(10000 * rarity);
                    const userCrypto = gameState.crypto.find(c => c.id === randomCrypto.id);
                    if (userCrypto) {
                        userCrypto.owned += cryptoAmount;
                        rewards.push(`${randomCrypto.emoji} ${cryptoAmount} ${randomCrypto.name}`);
                    }
                }
                
                if (rarity > 0.6) {
                    if (gameState.space.level < SPACE_LEVELS.length) {
                        gameState.space.level++;
                        gameState.space.unlockedLevels.push(gameState.space.level);
                        rewards.push(`🚀 +1 уровень космоса (бесплатно!)`);
                    }
                }
                
                message = '🎉 УСПЕХ! Разведка удалась!';
            } else {
                const refund = Math.floor(launch.cost * 0.3);
                gameState.balance += refund;
                message = '💥 НЕУДАЧА! Ракета потеряна... Но вы получили страховку';
                rewards.push(`💰 ${formatMoney(refund)} (страховка)`);
            }
            
            gameState.space.lastLaunch = null;
            rocketLaunchEnd = null;
            
            saveGame();
            
            alert(`${message}\n\nПолучено:\n${rewards.join('\n')}`);
        }

        function renderAchievementsGrid(category) {
            const grid = document.getElementById('achievementsGrid');
            const pagination = document.getElementById('achievementsPagination');
            if (!grid) return;
            
            const filtered = ACHIEVEMENTS.filter(ach => {
                if (category === 'all') return true;
                if (category === 'easy' && ach.difficulty === 'easy') return true;
                if (category === 'medium' && ach.difficulty === 'medium') return true;
                if (category === 'hard' && ach.difficulty === 'hard') return true;
                if (category === 'epic' && ach.difficulty === 'epic') return true;
                return false;
            });
            
            const totalPages = Math.ceil(filtered.length / ACHIEVEMENTS_PER_PAGE);
            if (achievementsPage > totalPages) achievementsPage = totalPages;
            if (achievementsPage < 1) achievementsPage = 1;
            
            const start = (achievementsPage - 1) * ACHIEVEMENTS_PER_PAGE;
            const paginated = filtered.slice(start, start + ACHIEVEMENTS_PER_PAGE);
            
            let html = '';
            
            paginated.forEach(ach => {
                const isCompleted = gameState.achievements?.includes(ach.id);
                const isClaimed = gameState.claimedAchievements?.includes(ach.id);
                
                let current = 0;
                
                switch (ach.type) {
                    case 'clicks': current = gameState.totalClicks || 0; break;
                    case 'money': current = gameState.totalEarned || 0; break;
                    case 'businessCount': current = gameState.myBusinesses?.length || 0; break;
                    case 'cryptoAmount': current = gameState.crypto.reduce((sum, c) => sum + c.owned, 0); break;
                    case 'farmCount': current = gameState.miningFarms?.length || 0; break;
                    case 'houseCount': current = gameState.houses.filter(h => h.owned).length; break;
                    case 'islandCount': current = gameState.islands.filter(i => i.owned).length; break;
                    case 'calendarClaims': current = gameState.calendar?.claimedDays?.length || 0; break;
                    case 'spaceLevel': current = gameState.space?.level || 0; break;
                    case 'achievementCount': current = gameState.claimedAchievements?.length || 0; break;
                }
                
                const progress = Math.min(100, (current / ach.target) * 100);
                
                let difficultyClass = '';
                if (ach.difficulty === 'easy') difficultyClass = 'difficulty-easy';
                if (ach.difficulty === 'medium') difficultyClass = 'difficulty-medium';
                if (ach.difficulty === 'hard') difficultyClass = 'difficulty-hard';
                if (ach.difficulty === 'epic') difficultyClass = 'difficulty-epic';
                
                html += `
                    <div class="achievement-card ${isClaimed ? 'completed' : ''}">
                        <div class="difficulty-badge ${difficultyClass}">${ach.difficulty.toUpperCase()}</div>
                        <div class="achievement-icon">${ach.icon}</div>
                        <div class="achievement-name">${ach.name}</div>
                        <div class="achievement-progress">${formatNumber(current)} / ${formatNumber(ach.target)}</div>
                        <div style="height:3px; background:#2a2c36; border-radius:2px; margin:5px 0;">
                            <div style="height:100%; width:${progress}%; background:${progress >= 100 ? '#4caf50' : '#ffd700'}; border-radius:2px;"></div>
                        </div>
                        <div class="achievement-reward">💰 +${formatMoney(ach.reward * 1000000)} 💎 +${ach.reward}</div>
                        ${progress >= 100 && !isClaimed ? 
                            `<button class="achievement-claim" onclick="claimAchievement(${ach.id})">ПОЛУЧИТЬ</button>` : 
                            isClaimed ? '<span style="color:#4caf50; font-size:9px;">✓ ПОЛУЧЕНО</span>' : ''
                        }
                    </div>
                `;
            });
            
            grid.innerHTML = html;
            
            if (pagination) {
                let paginationHtml = '';
                paginationHtml += `<button class="pagination-btn" onclick="changeAchievementsPage(-1)" ${achievementsPage <= 1 ? 'disabled' : ''}>◀</button>`;
                paginationHtml += `<span class="pagination-info">${achievementsPage}/${totalPages}</span>`;
                paginationHtml += `<button class="pagination-btn" onclick="changeAchievementsPage(1)" ${achievementsPage >= totalPages ? 'disabled' : ''}>▶</button>`;
                pagination.innerHTML = paginationHtml;
            }
        }

        function checkAchievements() {
            if (!gameState.achievements) gameState.achievements = [];
            
            ACHIEVEMENTS.forEach(ach => {
                if (gameState.achievements.includes(ach.id)) return;
                
                let completed = false;
                
                switch (ach.type) {
                    case 'clicks':
                        completed = (gameState.totalClicks || 0) >= ach.target;
                        break;
                    case 'money':
                        completed = (gameState.totalEarned || 0) >= ach.target;
                        break;
                    case 'businessCount':
                        completed = (gameState.myBusinesses?.length || 0) >= ach.target;
                        break;
                    case 'cryptoAmount':
                        const total = gameState.crypto.reduce((sum, c) => sum + c.owned, 0);
                        completed = total >= ach.target;
                        break;
                    case 'farmCount':
                        completed = (gameState.miningFarms?.length || 0) >= ach.target;
                        break;
                    case 'houseCount':
                        completed = (gameState.houses?.filter(h => h.owned).length || 0) >= ach.target;
                        break;
                    case 'islandCount':
                        completed = (gameState.islands?.filter(i => i.owned).length || 0) >= ach.target;
                        break;
                    case 'calendarClaims':
                        completed = (gameState.calendar?.claimedDays?.length || 0) >= ach.target;
                        break;
                    case 'spaceLevel':
                        completed = (gameState.space?.level || 0) >= ach.target;
                        break;
                    case 'achievementCount':
                        completed = (gameState.claimedAchievements?.length || 0) >= ach.target;
                        break;
                }
                
                if (completed) {
                    gameState.achievements.push(ach.id);
                }
            });
        }

        function claimAchievement(id) {
            if (!gameState.claimedAchievements) gameState.claimedAchievements = [];
            if (gameState.claimedAchievements.includes(id)) return;
            
            const ach = ACHIEVEMENTS.find(a => a.id === id);
            if (!ach) return;
            
            if (!gameState.achievements?.includes(id)) {
                alert('❌ СНАЧАЛА ВЫПОЛНИ АЧИВКУ!');
                return;
            }
            
            gameState.claimedAchievements.push(id);
            gameState.balance += ach.reward * 1000000;
            gameState.diamonds += ach.reward;
            
            saveGame();
            updateUI();
            
            const activeCategory = document.querySelector('.achievements-category.active')?.dataset.cat || 'all';
            renderAchievementsGrid(activeCategory);
            alert(`✅ ПОЛУЧЕНО: ${ach.reward}💎 + ${formatMoney(ach.reward * 1000000)}`);
        }

                        miningIncome += farm.crypto.basePrice * farm.level * 10 / 60;
                    }
                });

            const modal = document.getElementById('modal');

            let totalIncome = business.income;

        function buySalonItem(category, itemId) {
            const item = salonItems[category].find(i => i.id === itemId);
            if (!item) return;
            
            if (gameState.balance < item.price) {
                alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
                return;
            }
            
            gameState.balance -= item.price;
            
            if (!gameState.garages[category]) {
                gameState.garages[category] = [];
            }
            
            const newItem = {
                id: item.id,
                name: item.name,
                emoji: item.emoji,
                purchasedAt: Date.now()
            };
            
            gameState.garages[category].push(newItem);
            
            saveGame();
            updateUI();
            renderItems();
            alert(`✅ Куплен ${item.name}!`);
        }

        function sellGarageItem(category, itemId) {
            const garage = gameState.garages[category];
            if (!garage || garage.length === 0) return;
            
            const index = garage.findIndex(item => item.id === itemId);
            if (index === -1) return;
            
            const item = garage[index];
            const sellPrice = Math.floor(salonItems[category].find(i => i.id === itemId).price * 0.5);
            
            if (confirm(`Продать ${item.name} за ${formatMoney(sellPrice)}?`)) {
                garage.splice(index, 1);
                gameState.balance += sellPrice;
                
                saveGame();
                updateUI();
                renderItems();
                alert(`✅ Продано! +${formatMoney(sellPrice)}`);
            }
        }

        function getPlayerRank() {
            const allWealth = [];
            
            for (let i = 0; i < forbesTop100.length; i++) {
                allWealth.push({
                    name: forbesTop100[i],
                    money: (100 - i) * 1000000000000,
                    isPlayer: false
                });
            }
            
            const playerMoney = gameState.totalEarned || 0;
            allWealth.push({
                name: currentUser,
                money: playerMoney,
                isPlayer: true
            });
            
            allWealth.sort((a, b) => b.money - a.money);
            
            const playerIndex = allWealth.findIndex(item => item.isPlayer);
            
            return {
                rank: playerIndex + 1,
                list: allWealth.slice(0, 100)
            };
        }

        function changePassPage(direction) {
            passStartLevel += direction * PASS_LEVELS_PER_PAGE;

            showBattlePass();
        }

        function getTimeUntilNextPass() {
            const now = Date.now();
            const lastReset = gameState.battlePass?.lastReset || now;
            const oneWeek = 7 * 24 * 60 * 60 * 1000;
            const timeLeft = oneWeek - (now - lastReset);
            
            if (timeLeft <= 0) return "Обновляется...";
            
            const days = Math.floor(timeLeft / (24 * 60 * 60 * 1000));
            const hours = Math.floor((timeLeft % (24 * 60 * 60 * 1000)) / (60 * 60 * 1000));
            const minutes = Math.floor((timeLeft % (60 * 60 * 1000)) / (60 * 1000));
            
            return `${days}д ${hours}ч ${minutes}м`;
        }

        function claimBattlePassReward(level) {
            if (!gameState.battlePass) return;
            if (gameState.battlePass.claimed.includes(level)) return;
            if (level > gameState.battlePass.level) return;
            
            let moneyReward = level * 10000;
            gameState.balance += moneyReward;
            
            if (level % 5 === 0) {
                gameState.diamonds += 10;
            }
            
            if (level % 10 === 0) {
                const randomCrypto = cryptoCurrencies[Math.floor(Math.random() * cryptoCurrencies.length)];
                const userCrypto = gameState.crypto.find(c => c.id === randomCrypto.id);
                userCrypto.owned += 100000;
                alert(`🎉 Вы получили 100,000 ${randomCrypto.name}!`);
            }
            
            if (level === 200) {
                gameState.businessSlots = (gameState.businessSlots || MAX_BUSINESSES) + 1;
                alert('🎉 ПОЗДРАВЛЯЕМ! Вы получили +1 слот для бизнеса!');
            }
            
            gameState.battlePass.claimed.push(level);
            saveGame();
            updateUI();
            renderProfile();
            alert(`✅ Получено ${formatMoney(moneyReward)} за ${level} уровень пропуска!`);
        }

        function checkBattlePassLevel() {
            if (!gameState.battlePass) {
                gameState.battlePass = { level: 1, exp: 0, claimed: [], lastReset: Date.now() };
            }
            
            if (gameState.battlePass.level >= 200) return;
            
            const expNeeded = 10000 * gameState.battlePass.level;
            
            while (gameState.battlePass.exp >= expNeeded && gameState.battlePass.level < 200) {
                gameState.battlePass.exp -= expNeeded;
                gameState.battlePass.level++;
            }
        }
