                    <h3>Профиль ${taxSummary}</h3>
                </div>
                
                <div class="stat-box" style="margin-bottom:12px;">
                    <div class="stat-label">Никнейм</div>
                    <div class="stat-value">${currentUser}</div>
                </div>
                
                <div class="stat-box" style="margin-bottom:12px;">
                    <div class="stat-label">Уровень</div>
                    <div class="stat-value">${gameState.level || 1}/${MAX_PLAYER_LEVEL}</div>
                </div>
                
                <div class="level-progress">
                    <div class="level-progress-bar" style="width: ${Math.min(expPercent, 100)}%"></div>
                </div>
                <div style="text-align:center; font-size:12px; color:#8e8e98; margin-top:4px;">
                    ${formatNumber(gameState.exp || 0)} / ${formatNumber(expNeeded)} опыта
                </div>
                
                <div class="stat-box" style="margin-bottom:12px;">
                    <div class="stat-label">Место в топе</div>
                    <div class="stat-value">#${rank}</div>
                </div>
                
                <div class="stat-box" style="margin-bottom:12px;">
                    <div class="stat-label">Алмазы</div>
                    <div class="stat-value">💎 ${gameState.diamonds || 0}</div>
                </div>
                
                <div class="stat-box" style="margin-bottom:12px;">
                    <div class="stat-label">Сила клика</div>
                    <div class="stat-value">${formatMoney(BASE_CLICK_POWER * (gameState.level || 1))}</div>
                </div>
                
                <div class="stat-box" style="margin-bottom:12px;">
                    <div class="stat-label">Всего кликов</div>
                    <div class="stat-value">${formatNumber(gameState.totalClicks || 0)}</div>
                </div>
                
                <div class="stat-box" style="margin-bottom:12px;">
                    <div class="stat-label">Заработано всего</div>
                    <div class="stat-value">${formatMoney(gameState.totalEarned || 0)}</div>
                </div>
                
                <div class="stat-box" style="margin-bottom:12px;">
                    <div class="stat-label">Заработано с бизнесов</div>
                    <div class="stat-value">${formatMoney(businessTotal)}</div>
                </div>
                
                <div class="stat-box" style="margin-bottom:12px;">
                    <div class="stat-label">Заработано с крипты</div>
                    <div class="stat-value">${formatMoney(cryptoTotal)}</div>
                </div>
                
                <div class="stat-box" style="margin-bottom:12px;">
                    <div class="stat-label">Заработано с майнинга</div>
                    <div class="stat-value">${formatMoney(miningTotal)}</div>
                </div>
                
                <div class="stat-box" style="margin-bottom:12px;">
                    <div class="stat-label">Заработано с домов</div>
                    <div class="stat-value">${formatMoney(housesTotal)}</div>
                </div>
                
                <div class="stat-box" style="margin-bottom:12px;">
                    <div class="stat-label">Заработано с островов</div>
                    <div class="stat-value">${formatMoney(islandsTotal)}</div>
                </div>
                
                <div class="stat-box" style="margin-bottom:12px;">
                    <div class="stat-label">Заработано с космоса</div>
                    <div class="stat-value">${formatMoney(spaceTotal)}</div>
                </div>
                
                <div class="battle-pass">
                    <div class="pass-header">
                        <span class="pass-level">Боевой пропуск: ур.${gameState.battlePass?.level || 1}/200</span>
                        <span class="pass-exp">⚡ ${Math.floor(gameState.battlePass?.exp || 0)}/${10000 * (gameState.battlePass?.level || 1)}</span>
                    </div>
                    <div class="pass-progress">
                        <div class="pass-progress-bar" style="width: ${((gameState.battlePass?.exp || 0) / (10000 * (gameState.battlePass?.level || 1))) * 100}%"></div>
                    </div>
                    <div class="pass-timer">⏱️ Следующий пропуск через: ${getTimeUntilNextPass()}</div>
                    <button class="card-btn" style="margin-top:12px;" onclick="showBattlePass()">ПОЛУЧИТЬ НАГРАДЫ</button>
                </div>
                
                <div style="background:#1a1c24; border-radius:12px; padding:16px; margin-bottom:16px;">
                    <h4 style="color:#ffd700; margin-bottom:12px;">⚙️ НАСТРОЙКИ</h4>
                    <div class="settings-item">
                        <span class="settings-label">🔊 Звук клика</span>
                        <div class="settings-switch ${settings.soundEnabled ? 'active' : ''}" onclick="toggleSound()"></div>
                    </div>
                    <div class="settings-item">
                        <span class="settings-label">✨ Визуальные эффекты</span>
                        <div class="settings-switch ${settings.effectsEnabled ? 'active' : ''}" onclick="toggleEffects()"></div>
                    </div>
                </div>
                
                <button class="card-btn" onclick="showTop100()">🏆 ТОП-100 FORBES</button>
                <button class="card-btn" style="margin-top:8px;" onclick="showNicknameModal()">✏️ Изменить ник</button>
                <button class="card-btn" style="margin-top:8px; background:#ff4444;" onclick="resetGame()">🔄 Сбросить прогресс</button>
            `;
        }
        
        // ========== НАВИГАЦИЯ ==========
        function switchTab(tab) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'earn') renderEarn();
            else if (tab === 'calendar') renderCalendar();
            else if (tab === 'space') renderSpace();
            else if (tab === 'achievements') renderAchievements();
            else if (tab === 'investments') renderInvestments();
            else if (tab === 'business') renderBusiness();
            else if (tab === 'mining') renderMining();
            else if (tab === 'tax') renderTax();
            else if (tab === 'items') renderItems();
            else if (tab === 'profile') renderProfile();
        }
        
        // ========== ОБНОВЛЕНИЕ UI ==========
        function updateUI() {
            document.getElementById('balance').textContent = formatMoney(gameState.balance || 0);
            document.getElementById('balanceChange').innerHTML = '+ ' + formatMoney(gameState.totalEarned || 0) + ' за все время';
            document.getElementById('clickPower').textContent = formatMoney(BASE_CLICK_POWER * (gameState.level || 1));
        }
        
        // ========== КЛИКЕР ==========
        function handleClick() {
            const earned = BASE_CLICK_POWER * (gameState.level || 1);
            gameState.balance = (gameState.balance || 0) + earned;
            gameState.totalClicks = (gameState.totalClicks || 0) + 1;
            gameState.totalEarned = (gameState.totalEarned || 0) + earned;
            
            gameState.exp = (gameState.exp || 0) + earned / 100;
            const expNeeded = (gameState.level || 1) * 1500;
            while (gameState.exp >= expNeeded && (gameState.level || 1) < MAX_PLAYER_LEVEL) {
                gameState.exp -= expNeeded;
                gameState.level = (gameState.level || 1) + 1;
                gameState.diamonds = (gameState.diamonds || 0) + 5;
            }
            
            if (gameState.battlePass && gameState.battlePass.level < 200) {
                gameState.battlePass.exp += 100;
                checkBattlePassLevel();
            }
            
            playClickSound();
            if (settings.effectsEnabled) {
                createFloatingEffect(event?.clientX || 200, event?.clientY || 200, `+${formatNumber(earned)}💰`);
            }
            
            checkAchievements();
            updateUI();
            saveGame();
        }
        
        function playClickSound() {
            if (!settings.soundEnabled) return;
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.type = 'sine';
                oscillator.frequency.value = 523.25;
                gainNode.gain.value = 0.1;
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.05);
            } catch(e) {}
        }
        
        function createFloatingEffect(x, y, text) {
            const el = document.createElement('div');
            el.className = 'floating-effect';
            el.textContent = text;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }
        
        // ========== НИКНЕЙМ ==========
        function showNicknameModal() {
            document.getElementById('nicknameInput').value = currentUser;
            document.getElementById('nicknameModal').classList.add('active');
        }
        
        function saveNickname() {
            const newNick = document.getElementById('nicknameInput').value.trim();
            if (!newNick) return;
            
            const oldUser = currentUser;
            currentUser = newNick;
            
            if (ADMIN_SECRETS.includes(currentUser) && !ADMIN_SECRETS.includes(oldUser)) {
                showAdminPasswordModal(currentUser);
            } else if (!ADMIN_SECRETS.includes(currentUser) && ADMIN_SECRETS.includes(oldUser)) {
                disableAdminMode();
            }
            
            document.getElementById('username').innerHTML = '👑 ' + currentUser + ' <span class="warning-badge">⚠️ ЛОКАЛЬНО</span>';
            if (specialItem.owned) {
                document.getElementById('username').innerHTML += ' <span class="suguru-badge">💎</span>';
            }
            saveGame();
            closeNicknameModal();
            if (document.querySelector('.nav-item.active')?.innerText.includes('Профиль')) {
                renderProfile();
            }
        }
        
        // ========== АДМИНКА ==========
        function showAdminPasswordModal(user) {
            pendingAdminUser = user;
            document.getElementById('adminPasswordInput').value = '';
            document.getElementById('adminPasswordModal').classList.add('active');
        }
        
        function checkAdminPassword() {
            const password = document.getElementById('adminPasswordInput').value;
            if (password === ADMIN_PASSWORD) {
                enableAdminMode();
                closeAdminPasswordModal();
            } else {
                alert('❌ Неверный пароль!');
            }
        }
        
        function enableAdminMode() {
            isAdmin = true;
            document.body.classList.add('admin-mode');
            document.querySelector('.app-container').classList.add('admin-app');
            document.querySelector('.header').classList.add('admin-header');
            document.getElementById('username').classList.add('admin-username');
            document.querySelector('.bottom-nav').classList.add('admin-nav');
            
            const flash = document.createElement('div');
            flash.style.position = 'fixed';
            flash.style.top = '0';
            flash.style.left = '0';
            flash.style.width = '100%';
            flash.style.height = '100%';
            flash.style.background = 'rgba(255, 0, 0, 0.3)';
            flash.style.zIndex = '9999';
            flash.style.pointerEvents = 'none';
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 1000);
            
            alert('🔥 ВАМ ВЫДАНЫ ПРАВА АДМИНИСТРАТОРА!');
        }
        
        function disableAdminMode() {
            isAdmin = false;
            document.body.classList.remove('admin-mode');
            document.querySelector('.app-container').classList.remove('admin-app');
            document.querySelector('.header').classList.remove('admin-header');
            document.getElementById('username').classList.remove('admin-username');
            document.querySelector('.bottom-nav').classList.remove('admin-nav');
        }
        
        function toggleSound() {
            settings.soundEnabled = !settings.soundEnabled;
            saveGame();
        }
        
        function toggleEffects() {
            settings.effectsEnabled = !settings.effectsEnabled;
            saveGame();
        }
        
        function resetGame() {
            if (confirm('ТОЧНО СБРОСИТЬ ВЕСЬ ПРОГРЕСС? Это действие необратимо!')) {
                localStorage.removeItem('imperiaClickerSave_' + currentUserId);
                localStorage.removeItem('deviceId');
                location.reload();
            }
        }
        
        // ========== АВТОМАТИЧЕСКИЙ ДОХОД (每分钟) ==========
        setInterval(() => {
            if (!gameState) return;
            
            let income = 0;
            
            if (gameState.autoClickerLevel > 0) {
                income += gameState.autoClickerLevel;
            }
            
            if (gameState.myBusinesses && gameState.myBusinesses.length > 0) {
                gameState.myBusinesses.forEach(b => {
                    const taxItem = gameState.taxes.find(t => t.type === 'business' && t.id === b.id);
                    if (!taxItem || !taxItem.paid) {
                        let inc = b.income || 0;
                        if (b.manager) {
                            inc *= (1 + b.manager.level * 0.1);
                        }
                        if (gameState.businessPassUpgraded) {
                            inc *= 1.5;
                        }
                        income += inc;
                        b.totalEarned = (b.totalEarned || 0) + inc;
                    }
                });
            }
            
            if (gameState.crypto && cryptoPrices) {
                gameState.crypto.forEach(c => {
                    const taxItem = gameState.taxes.find(t => t.type === 'crypto' && t.id === c.id);
                    if ((!taxItem || !taxItem.paid) && c.owned > 0) {
                        const cryptoData = cryptoCurrencies.find(cr => cr.id === c.id);
                        if (cryptoData) {
                            income += cryptoData.incomePerCoin * c.owned;
                        }
                    }
                });
            }
            
            if (gameState.miningFarms) {
                gameState.miningFarms.forEach(farm => {
                    const taxItem = gameState.taxes.find(t => t.type === 'mining' && t.id === farm.id);
                    if (!taxItem || !taxItem.paid) {
                        income += farm.crypto.basePrice * farm.level * 10 / 60;
                    }
                });
            }
            
            if (gameState.houses) {
                gameState.houses.forEach(h => {
                    if (h.owned) {
                        const taxItem = gameState.taxes.find(t => t.type === 'house' && t.id === h.id);
                        if (!taxItem || !taxItem.paid) {
                            let houseIncome = h.baseIncome;
                            const upgradeCount = Object.values(h.upgrades).reduce((a, b) => a + b, 0);
                            houseIncome *= (1 + upgradeCount);
                            income += houseIncome;
                        }
                    }
                });
            }
            
            if (gameState.islands) {
                gameState.islands.forEach(i => {
                    if (i.owned) {
                        const taxItem = gameState.taxes.find(t => t.type === 'island' && t.id === i.id);
                        if (!taxItem || !taxItem.paid) {
                            income += i.income;
                        }
                    }
                });
            }
            
            if (specialItem.owned) {
                income += specialItem.income;
            }
            
            let spaceBonus = 0;
            if (gameState.space) {
                spaceBonus = SPACE_LEVELS.slice(0, gameState.space.level).reduce((sum, l) => sum + l.bonus, 0);
                income *= (1 + spaceBonus / 100);
            }
            
            if (income > 0) {
                gameState.balance = (gameState.balance || 0) + Math.floor(income);
                gameState.totalEarned = (gameState.totalEarned || 0) + Math.floor(income);
            }
            
            updateTaxes();
            checkBattlePassLevel();
            checkAchievements();
            
            updateUI();
            saveGame();
            
            const activeTab = document.querySelector('.nav-item.active')?.innerText || '';
            if (activeTab.includes('Заработок')) renderEarn();
            if (activeTab.includes('Налоги')) renderTax();
        }, 60000);
        
        setInterval(() => {
            if (gameState) {
                updateCryptoPrices();
                const activeTab = document.querySelector('.nav-item.active')?.innerText || '';
                if (activeTab.includes('Инвестиции')) {
                    renderInvestments();
                }
            }
        }, 300000);
        
        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        window.onload = function() {
            if (!loadGame()) {
                gameState = {
                    balance: 1000000,
                    diamonds: 1000,
                    exp: 0,
                    level: 1,
                    totalClicks: 0,
                    totalEarned: 1000000,
                    lastOnlineTime: Date.now(),
                    myBusinesses: [],
                    miningFarms: [],
                    battlePass: { level: 1, exp: 0, claimed: [], lastReset: Date.now() },
                    businessSlots: MAX_BUSINESSES,
                    businessPassUpgraded: false,
                    houses: houses.map(h => ({ ...h })),
                    islands: islands.map(i => ({ ...i })),
                    garages: { cars: [], planes: [], ships: [] },
                    crypto: cryptoCurrencies.map(c => ({ id: c.id, owned: 0 })),
                    cryptoPrices: cryptoCurrencies.map(c => c.basePrice),
                    taxes: [],
                    calendar: {
                        currentDay: 1,
                        lastClaimTime: Date.now() - 24 * 60 * 60 * 1000,
                        claimedDays: [],
                        totalDiamonds: 0,
                        streak: 0
                    },
                    space: {
                        level: 0,
                        unlockedLevels: [0],
                        lastLaunch: null
                    },
                    achievements: [],
                    claimedAchievements: [],
                    rocketLaunches: []
                };
                
                cryptoPrices = gameState.cryptoPrices;
            }
            
            if (ADMIN_SECRETS.includes(currentUser)) {
                enableAdminMode();
            }
            
            document.getElementById('username').innerHTML = '👑 ' + currentUser + ' <span class="warning-badge">⚠️ ЛОКАЛЬНО</span>';
            if (specialItem.owned) {
                document.getElementById('username').innerHTML += ' <span class="suguru-badge">💎</span>';
            }
            
            updateUI();
            renderEarn();
            
            // Глобальные функции
            window.handleClick = handleClick;
            window.switchTab = switchTab;
            window.showNicknameModal = showNicknameModal;
            window.saveNickname = saveNickname;
            window.closeNicknameModal = closeNicknameModal;
            window.closeAdminPasswordModal = closeAdminPasswordModal;
            window.checkAdminPassword = checkAdminPassword;
            window.buyBusiness = buyBusiness;
            window.buyMiningFarm = buyMiningFarm;
            window.upgradeMiningFarm = upgradeMiningFarm;
            window.sellMiningFarm = sellMiningFarm;
            window.buySalonItem = buySalonItem;
            window.sellGarageItem = sellGarageItem;
            window.showSalon = showSalon;
            window.showGarage = showGarage;
            window.buyHouse = buyHouse;
            window.sellHouse = sellHouse;
            window.upgradeHouse = upgradeHouse;
            window.openHouseModal = openHouseModal;
            window.showAllHouses = showAllHouses;
            window.closeHousesModal = closeHousesModal;
            window.buyIsland = buyIsland;
            window.showMyIslands = showMyIslands;
            window.showAllIslands = showAllIslands;
            window.closeIslandsModal = closeIslandsModal;
            window.openTradeModal = openTradeModal;
            window.setTradeAmount = setTradeAmount;
            window.quickBuyMaxMoney = quickBuyMaxMoney;
            window.quickSellAll = quickSellAll;
            window.executeTrade = executeTrade;
            window.showCryptoPortfolio = showCryptoPortfolio;
            window.buySpecialItem = buySpecialItem;
            window.showBattlePass = showBattlePass;
            window.claimBattlePassReward = claimBattlePassReward;
            window.changePassPage = changePassPage;
            window.showTop100 = showTop100;
            window.closeTopModal = closeTopModal;
            window.payTaxByIndex = payTaxByIndex;
            window.startUpgrade = startUpgrade;
            window.hireManager = hireManager;
            window.sellBusiness = sellBusiness;
            window.upgradeBusinessPass = upgradeBusinessPass;
            window.showBuyBusinessModal = showBuyBusinessModal;
            window.openBusinessModal = openBusinessModal;
            window.claimAchievement = claimAchievement;
            window.changeAchievementsPage = changeAchievementsPage;
            window.claimCalendarDay = claimCalendarDay;
            window.buySpaceLevel = buySpaceLevel;
            window.launchRocket = launchRocket;
            window.closeModal = closeModal;
            window.toggleSound = toggleSound;
            window.toggleEffects = toggleEffects;
            window.resetGame = resetGame;
        };
    </script>
