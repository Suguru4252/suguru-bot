<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>IMPERIA CLICKER 2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            overscroll-behavior: none;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            touch-action: pan-y pinch-zoom;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a050f 0%, #1a1025 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5px;
        }
        
        .app-container {
            width: 100%;
            max-width: 400px;
            height: 98vh;
            background: rgba(10, 5, 20, 0.97);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            border: 2px solid #ffd700;
            overscroll-behavior: contain;
        }
        
        .header {
            background: linear-gradient(135deg, #2a1b3d 0%, #1a0f2a 100%);
            color: white;
            padding: 12px;
            text-align: center;
            border-bottom: 2px solid #ffd700;
            flex-shrink: 0;
        }
        
        .username {
            font-size: 15px;
            color: #ffd700;
            font-weight: bold;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            background: rgba(0,0,0,0.3);
            cursor: pointer;
        }
        
        .badge {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: black;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            margin-left: 5px;
            display: inline-block;
        }
        
        .warning-badge {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff3333;
            border-radius: 30px;
            padding: 4px 8px;
            font-size: 10px;
            display: inline-block;
            color: #ff3333;
            margin-left: 8px;
        }
        
        .balance-container {
            display: flex;
            justify-content: space-between;
            gap: 5px;
            margin: 12px 0;
        }
        
        .balance-box {
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 3px;
            border-radius: 12px;
            flex: 1;
            border: 1px solid rgba(255, 215, 0, 0.5);
        }
        
        .balance-label {
            font-size: 10px;
            opacity: 0.9;
        }
        
        .balance-value {
            font-size: 14px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .level-bar {
            background: rgba(255, 255, 255, 0.15);
            height: 6px;
            border-radius: 3px;
            margin: 8px 0;
            overflow: hidden;
        }
        
        .level-progress {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffaa00);
            width: 0%;
            border-radius: 3px;
        }
        
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            color: white;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        
        .content::-webkit-scrollbar {
            display: none;
        }
        
        .click-btn {
            background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b);
            border: none;
            border-radius: 50%;
            width: 180px;
            height: 180px;
            font-size: 50px;
            color: white;
            margin: 15px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 3px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.5);
            cursor: pointer;
            transition: transform 0.05s;
        }
        
        .click-btn:active {
            transform: scale(0.97);
        }
        
        .click-btn span {
            font-size: 18px;
            margin-top: 8px;
        }
        
        .per-second {
            color: #4CAF50;
            font-size: 16px;
            margin: 8px 0;
            font-weight: bold;
            text-align: center;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        
        .card-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 16px;
            color: #ffd700;
            text-align: center;
            border-bottom: 1px solid #ffd700;
            padding-bottom: 8px;
        }
        
        .btn {
            background: linear-gradient(135deg, #3a2a4d 0%, #2a1a3d 100%);
            border: 1px solid #ffd700;
            color: white;
            padding: 12px 16px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin: 8px 0;
            font-size: 14px;
            transition: transform 0.05s;
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .btn-gold {
            background: linear-gradient(135deg, #ffd700 0%, #b8860b 100%);
            color: black;
        }
        
        .btn-green {
            background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%);
        }
        
        .btn-purple {
            background: linear-gradient(135deg, #7b1fa2 0%, #4a0072 100%);
        }
        
        .bottom-nav {
            display: flex;
            background: rgba(0, 0, 0, 0.95);
            padding: 8px 3px;
            gap: 2px;
            border-top: 2px solid #ffd700;
            overflow-x: auto;
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        .bottom-nav::-webkit-scrollbar {
            display: none;
        }
        
        .nav-item {
            flex: 0 0 auto;
            text-align: center;
            padding: 8px 10px;
            color: rgba(255, 255, 255, 0.6);
            border-radius: 12px;
            cursor: pointer;
            font-size: 10px;
            min-width: 60px;
        }
        
        .nav-item span {
            font-size: 18px;
            display: block;
            margin-bottom: 3px;
        }
        
        .nav-item.active {
            color: #ffd700;
            background: rgba(255, 215, 0, 0.15);
            border: 1px solid #ffd700;
        }
        
        .business-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        
        .business-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .business-name {
            font-weight: bold;
            color: #ffd700;
            font-size: 16px;
        }
        
        .business-level {
            color: #4CAF50;
            font-size: 13px;
        }
        
        .business-stats {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin: 5px 0;
        }
        
        .manager-badge {
            background: rgba(123, 31, 162, 0.3);
            border: 1px solid #7b1fa2;
            border-radius: 20px;
            padding: 4px 8px;
            font-size: 11px;
            color: #b39ddb;
            display: inline-block;
        }
        
        .mining-farm {
            background: rgba(0, 200, 83, 0.1);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #00c853;
        }
        
        .farm-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .farm-name {
            font-weight: bold;
            color: #00c853;
            font-size: 16px;
        }
        
        .farm-level {
            color: #ffd700;
            font-size: 13px;
        }
        
        .farm-progress {
            background: rgba(255,255,255,0.1);
            height: 4px;
            border-radius: 2px;
            margin: 8px 0;
            overflow: hidden;
        }
        
        .farm-progress-bar {
            height: 100%;
            background: #00c853;
            width: 0%;
        }
        
        .battle-pass {
            background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(255,0,255,0.1));
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }
        
        .pass-level {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
        }
        
        .pass-level-number {
            width: 30px;
            height: 30px;
            background: #ffd700;
            color: black;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        .pass-level-reward {
            flex: 1;
            background: rgba(255,255,255,0.05);
            padding: 8px;
            border-radius: 8px;
        }
        
        .pass-level.completed {
            opacity: 0.5;
        }
        
        .pass-level.completed .pass-level-number {
            background: #4CAF50;
        }
        
        .daily-business {
            background: rgba(255, 152, 0, 0.1);
            border: 2px solid #ff9800;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { border-color: #ff9800; }
            50% { border-color: #ffd700; }
            100% { border-color: #ff9800; }
        }
        
        .timer {
            color: #ff9800;
            font-size: 12px;
            text-align: center;
            margin: 5px 0;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #1a1025;
            border-radius: 24px;
            padding: 24px;
            max-width: 340px;
            width: 90%;
            color: white;
            border: 2px solid #ffd700;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 16px;
            color: #ffd700;
            text-align: center;
        }
        
        .close-btn {
            background: #f44336;
            color: white;
            padding: 10px 16px;
            border-radius: 30px;
            text-align: center;
            margin-top: 12px;
            cursor: pointer;
            font-size: 14px;
            border: 1px solid #ffd700;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header" id="header">
            <div class="username" id="username" onclick="showNicknameModal()">
                👑 ИГРОК
                <span class="warning-badge">⚠️ ЛОКАЛЬНО</span>
            </div>
            
            <div class="balance-container">
                <div class="balance-box">
                    <div class="balance-label">💰 МОНЕТЫ</div>
                    <div class="balance-value" id="balance">0</div>
                </div>
                <div class="balance-box">
                    <div class="balance-label">💎 АЛМАЗЫ</div>
                    <div class="balance-value" id="diamonds">100</div>
                </div>
                <div class="balance-box">
                    <div class="balance-label">📊 УРОВЕНЬ</div>
                    <div class="balance-value" id="level">1</div>
                </div>
            </div>
            
            <div class="level-bar">
                <div class="level-progress" id="levelProgress"></div>
            </div>
        </div>
        
        <div class="content" id="content"></div>
        
        <div class="bottom-nav" id="bottomNav">
            <div class="nav-item active" data-tab="home"><span>🏠</span>ГЛАВНАЯ</div>
            <div class="nav-item" data-tab="business"><span>💼</span>БИЗНЕС</div>
            <div class="nav-item" data-tab="mining"><span>⛏️</span>МАЙНИНГ</div>
            <div class="nav-item" data-tab="pass"><span>🎫</span>ПРОПУСК</div>
            <div class="nav-item" data-tab="daily"><span>📅</span>ЕЖЕДН.</div>
            <div class="nav-item" data-tab="stats"><span>📊</span>СТАТИС.</div>
        </div>
    </div>
    
    <div class="modal" id="managerModal">
        <div class="modal-content" id="managerModalContent"></div>
    </div>
    
    <div class="modal" id="buyFarmModal">
        <div class="modal-content" id="buyFarmModalContent"></div>
    </div>
    
    <div class="modal" id="nicknameModal">
        <div class="modal-content">
            <div class="modal-title">✏️ ИЗМЕНИТЬ НИК</div>
            <input type="text" class="input-field" id="nicknameInput" placeholder="Введите новый ник" maxlength="20" style="background:rgba(255,255,255,0.1); border:1px solid #ffd700; border-radius:30px; padding:12px; width:100%; margin:10px 0; color:white;">
            <div class="btn btn-gold" onclick="saveNickname()">СОХРАНИТЬ</div>
            <div class="close-btn" onclick="closeNicknameModal()">ОТМЕНА</div>
        </div>
    </div>
    
    <script>
        // ========== НАСТРОЙКИ ==========
        const APP_VERSION = '3.0.0';
        let currentUser = "ИГРОК";
        let currentUserId = 'device_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        let gameState = null;
        
        // ========== ШАБЛОНЫ БИЗНЕСОВ ==========
        const businessTemplates = [
            { id: 0, name: "🚕 ТАКСОПАРК", baseIncome: 1, baseUpgradeCost: 100, maxLevel: 20 },
            { id: 1, name: "🍔 РЕСТОРАН", baseIncome: 2, baseUpgradeCost: 500, maxLevel: 20 },
            { id: 2, name: "⛽ ЗАПРАВКА", baseIncome: 5, baseUpgradeCost: 2500, maxLevel: 20 },
            { id: 3, name: "🏭 ЗАВОД", baseIncome: 10, baseUpgradeCost: 10000, maxLevel: 20 },
            { id: 4, name: "🏨 ОТЕЛЬ", baseIncome: 20, baseUpgradeCost: 50000, maxLevel: 20 }
        ];
        
        // ========== КРИПТОВАЛЮТЫ ==========
        const cryptoCurrencies = [
            { id: 0, name: "BITCOIN", emoji: "₿", basePrice: 1000, volatility: 0.2 },
            { id: 1, name: "ETHEREUM", emoji: "Ξ", basePrice: 500, volatility: 0.25 },
            { id: 2, name: "DOGECOIN", emoji: "🐶", basePrice: 100, volatility: 0.3 }
        ];
        
        // ========== БОЕВОЙ ПРОПУСК ==========
        const battlePassLevels = [
            { level: 1, reward: 100, type: 'money' },
            { level: 2, reward: 200, type: 'money' },
            { level: 3, reward: 5, type: 'diamond' },
            { level: 4, reward: 300, type: 'money' },
            { level: 5, reward: 10, type: 'diamond' },
            { level: 6, reward: 400, type: 'money' },
            { level: 7, reward: 500, type: 'money' },
            { level: 8, reward: 15, type: 'diamond' },
            { level: 9, reward: 600, type: 'money' },
            { level: 10, reward: 20, type: 'diamond' },
            { level: 11, reward: 700, type: 'money' },
            { level: 12, reward: 800, type: 'money' },
            { level: 13, reward: 25, type: 'diamond' },
            { level: 14, reward: 900, type: 'money' },
            { level: 15, reward: 30, type: 'diamond' },
            { level: 16, reward: 1000, type: 'money' },
            { level: 17, reward: 35, type: 'diamond' },
            { level: 18, reward: 40, type: 'diamond' },
            { level: 19, reward: 1500, type: 'money' },
            { level: 20, reward: 100, type: 'diamond' }
        ];
        
        // ========== ФОРМАТИРОВАНИЕ ==========
        function formatNumber(num) {
            if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(2) + 'K';
            return Math.floor(num).toString();
        }
        
        function formatFullNumber(num) {
            return Math.floor(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }
        
        // ========== ЗАГРУЗКА/СОХРАНЕНИЕ ==========
        function loadGame() {
            const saved = localStorage.getItem('imperiaSave');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    gameState = data;
                    currentUser = data.nickname || "ИГРОК";
                    
                    // Проверка ежедневных бизнесов
                    const now = Date.now();
                    if (now - (gameState.lastDailyUpdate || 0) > 86400000) {
                        generateDailyBusinesses();
                        gameState.lastDailyUpdate = now;
                    }
                    
                    return true;
                } catch(e) {
                    return false;
                }
            }
            return false;
        }
        
        function saveGame() {
            if (gameState) {
                gameState.lastSave = Date.now();
                localStorage.setItem('imperiaSave', JSON.stringify(gameState));
            }
        }
        
        // ========== НОВАЯ ИГРА ==========
        function startNewGame() {
            const randomNum = Math.floor(Math.random() * 900 + 100);
            currentUser = `ИГРОК${randomNum}`;
            
            gameState = {
                nickname: currentUser,
                balance: 1000,
                diamonds: 100,
                exp: 0,
                level: 1,
                clickPower: 1,
                totalEarned: 0,
                businesses: [],
                miningFarms: [],
                battlePass: {
                    level: 1,
                    exp: 0,
                    claimed: []
                },
                dailyBusinesses: [],
                lastDailyUpdate: Date.now(),
                lastSave: Date.now()
            };
            
            generateDailyBusinesses();
            saveGame();
            updateUI();
            renderTab('home');
        }
        
        // ========== ГЕНЕРАЦИЯ ЕЖЕДНЕВНЫХ БИЗНЕСОВ ==========
        function generateDailyBusinesses() {
            const types = [
                { name: "🎪 ЯРМАРКА", income: 50, duration: 86400 },
                { name: "🎄 НОВОГОДНИЙ БАЗАР", income: 75, duration: 86400 },
                { name: "🏪 ФЕРМЕРСКИЙ РЫНОК", income: 100, duration: 86400 },
                { name: "🎭 ТЕАТР", income: 125, duration: 86400 },
                { name: "🎡 ПАРК АТТРАКЦИОНОВ", income: 150, duration: 86400 }
            ];
            
            gameState.dailyBusinesses = [];
            for (let i = 0; i < 3; i++) {
                const type = types[Math.floor(Math.random() * types.length)];
                gameState.dailyBusinesses.push({
                    id: Date.now() + i,
                    name: type.name,
                    income: type.income,
                    duration: type.duration,
                    endTime: Date.now() + (type.duration * 1000),
                    purchased: false
                });
            }
        }
        
        // ========== ОБНОВЛЕНИЕ ИНТЕРФЕЙСА ==========
        function updateUI() {
            if (!gameState) return;
            
            document.getElementById('balance').textContent = formatFullNumber(gameState.balance || 0);
            document.getElementById('diamonds').textContent = gameState.diamonds || 0;
            document.getElementById('level').textContent = gameState.level || 1;
            
            const expNeeded = (gameState.level || 1) * 1000;
            const expPercent = ((gameState.exp || 0) / expNeeded) * 100;
            document.getElementById('levelProgress').style.width = Math.min(expPercent, 100) + '%';
            
            document.getElementById('username').innerHTML = `👑 ${currentUser} <span class="warning-badge">⚠️ ЛОКАЛЬНО</span>`;
        }
        
        // ========== КЛИК ==========
        function handleClick() {
            if (!gameState) return;
            
            const earned = gameState.clickPower || 1;
            gameState.balance += earned;
            gameState.totalEarned += earned;
            gameState.exp += earned / 100;
            
            // Проверка уровня
            while (gameState.exp >= (gameState.level * 1000)) {
                gameState.exp -= (gameState.level * 1000);
                gameState.level++;
                gameState.diamonds += gameState.level * 5;
                
                // Опыт боевого пропуска
                gameState.battlePass.exp += 10;
                checkBattlePassLevel();
            }
            
            updateUI();
            saveGame();
        }
        
        // ========== БОЕВОЙ ПРОПУСК ==========
        function checkBattlePassLevel() {
            while (gameState.battlePass.exp >= 100 && gameState.battlePass.level < 20) {
                gameState.battlePass.exp -= 100;
                gameState.battlePass.level++;
            }
        }
        
        function claimBattlePassReward(level) {
            if (gameState.battlePass.claimed.includes(level)) return;
            if (level > gameState.battlePass.level) return;
            
            const reward = battlePassLevels.find(l => l.level === level);
            if (!reward) return;
            
            if (reward.type === 'money') {
                gameState.balance += reward.reward;
            } else {
                gameState.diamonds += reward.reward;
            }
            
            gameState.battlePass.claimed.push(level);
            saveGame();
            updateUI();
            renderTab('pass');
        }
        
        // ========== МАЙНИНГ ==========
        function buyMiningFarm() {
            const cost = 1000;
            if (gameState.balance < cost) {
                alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
                return;
            }
            
            gameState.balance -= cost;
            gameState.miningFarms.push({
                id: Date.now(),
                level: 1,
                crypto: cryptoCurrencies[Math.floor(Math.random() * cryptoCurrencies.length)],
                progress: 0,
                maxProgress: 100,
                lastUpdate: Date.now()
            });
            
            saveGame();
            updateUI();
            renderTab('mining');
        }
        
        function upgradeMiningFarm(index) {
            const farm = gameState.miningFarms[index];
            if (!farm) return;
            
            const cost = farm.level * 500;
            if (gameState.balance < cost) {
                alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
                return;
            }
            
            gameState.balance -= cost;
            farm.level++;
            
            saveGame();
            updateUI();
            renderTab('mining');
        }
        
        // ========== МЕНЕДЖЕРЫ ==========
        function hireManager(businessIndex) {
            const business = gameState.businesses[businessIndex];
            if (!business) return;
            
            if (business.manager) {
                alert('❌ УЖЕ ЕСТЬ МЕНЕДЖЕР!');
                return;
            }
            
            if (gameState.diamonds < 100) {
                alert('❌ НУЖНО 100 АЛМАЗОВ!');
                return;
            }
            
            gameState.diamonds -= 100;
            business.manager = {
                level: 1,
                autoUpgrade: false
            };
            
            saveGame();
            updateUI();
            renderTab('business');
        }
        
        function toggleAutoUpgrade(businessIndex) {
            const business = gameState.businesses[businessIndex];
            if (!business || !business.manager) return;
            
            business.manager.autoUpgrade = !business.manager.autoUpgrade;
            saveGame();
        }
        
        // ========== ПОКУПКА БИЗНЕСА ==========
        function buyBusiness(templateId) {
            const template = businessTemplates.find(t => t.id === templateId);
            if (!template) return;
            
            if (gameState.balance < template.baseUpgradeCost) {
                alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
                return;
            }
            
            gameState.balance -= template.baseUpgradeCost;
            gameState.businesses.push({
                id: Date.now(),
                templateId: templateId,
                level: 1,
                income: template.baseIncome,
                upgradeCost: template.baseUpgradeCost * 2.5,
                manager: null,
                lastUpgrade: Date.now()
            });
            
            saveGame();
            updateUI();
            renderTab('business');
        }
        
        function upgradeBusiness(index) {
            const business = gameState.businesses[index];
            if (!business) return;
            
            const template = businessTemplates.find(t => t.id === business.templateId);
            if (!template) return;
            
            if (business.level >= template.maxLevel) {
                alert('❌ МАКСИМАЛЬНЫЙ УРОВЕНЬ!');
                return;
            }
            
            if (gameState.balance < business.upgradeCost) {
                alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
                return;
            }
            
            gameState.balance -= business.upgradeCost;
            business.level++;
            business.income = template.baseIncome * business.level;
            business.upgradeCost = Math.floor(business.upgradeCost * 2.5);
            
            saveGame();
            updateUI();
            renderTab('business');
        }
        
        // ========== ПОКУПКА ЕЖЕДНЕВНОГО БИЗНЕСА ==========
        function buyDailyBusiness(index) {
            const daily = gameState.dailyBusinesses[index];
            if (!daily || daily.purchased) return;
            
            if (Date.now() > daily.endTime) {
                alert('❌ ВРЕМЯ ИСТЕКЛО!');
                generateDailyBusinesses();
                renderTab('daily');
                return;
            }
            
            const cost = 500;
            if (gameState.balance < cost) {
                alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
                return;
            }
            
            gameState.balance -= cost;
            daily.purchased = true;
            
            // Добавляем как обычный бизнес
            gameState.businesses.push({
                id: Date.now(),
                name: daily.name,
                level: 1,
                income: daily.income,
                upgradeCost: 1000,
                manager: null,
                isDaily: true,
                dailyEndTime: daily.endTime
            });
            
            saveGame();
            updateUI();
            renderTab('daily');
        }
        
        // ========== АВТОМАТИЧЕСКИЙ ДОХОД ==========
        setInterval(() => {
            if (!gameState) return;
            
            let income = 0;
            
            // Доход от бизнесов
            gameState.businesses.forEach(b => {
                income += b.income || 0;
                
                // Авто-апгрейд от менеджера
                if (b.manager && b.manager.autoUpgrade && b.level < 20) {
                    if (Math.random() < 0.01) { // 1% шанс каждый тик
                        upgradeBusiness(gameState.businesses.indexOf(b));
                    }
                }
            });
            
            // Доход от майнинга
            const now = Date.now();
            gameState.miningFarms.forEach(farm => {
                const timePassed = (now - (farm.lastUpdate || now)) / 1000;
                farm.progress += timePassed * farm.level;
                farm.lastUpdate = now;
                
                while (farm.progress >= farm.maxProgress) {
                    farm.progress -= farm.maxProgress;
                    const earned = farm.crypto.basePrice * farm.level;
                    gameState.balance += earned;
                    gameState.totalEarned += earned;
                }
            });
            
            // Доход от ежедневных бизнесов
            gameState.businesses.forEach(b => {
                if (b.isDaily && Date.now() > b.dailyEndTime) {
                    // Удаляем истекший бизнес
                    const index = gameState.businesses.indexOf(b);
                    if (index > -1) gameState.businesses.splice(index, 1);
                }
            });
            
            if (income > 0) {
                gameState.balance += income;
                gameState.totalEarned += income;
                gameState.exp += income / 100;
                
                while (gameState.exp >= (gameState.level * 1000)) {
                    gameState.exp -= (gameState.level * 1000);
                    gameState.level++;
                    gameState.diamonds += gameState.level * 5;
                    gameState.battlePass.exp += 10;
                    checkBattlePassLevel();
                }
            }
            
            updateUI();
            saveGame();
        }, 1000);
        
        // ========== РЕНДЕР ==========
        function renderTab(tab) {
            if (!gameState) return;
            
            const content = document.getElementById('content');
            
            if (tab === 'home') {
                renderHome(content);
            } else if (tab === 'business') {
                renderBusiness(content);
            } else if (tab === 'mining') {
                renderMining(content);
            } else if (tab === 'pass') {
                renderBattlePass(content);
            } else if (tab === 'daily') {
                renderDaily(content);
            } else if (tab === 'stats') {
                renderStats(content);
            }
        }
        
        function renderHome(content) {
            let totalIncome = 0;
            
            gameState.businesses.forEach(b => {
                totalIncome += b.income || 0;
            });
            
            gameState.miningFarms.forEach(f => {
                totalIncome += f.crypto.basePrice * f.level / 100;
            });
            
            content.innerHTML = `
                <div style="text-align:center;">
                    <div class="per-second">⏱️ ДОХОД/СЕК: ${formatFullNumber(Math.floor(totalIncome))}</div>
                    <div class="click-btn" onclick="handleClick()">
                        👆
                        <span>+${gameState.clickPower}</span>
                    </div>
                    
                    <div class="card">
                        <div class="card-title">📊 БЫСТРЫЙ ДОСТУП</div>
                        <div class="btn btn-gold" onclick="renderTab('business')">💼 БИЗНЕСЫ (${gameState.businesses.length})</div>
                        <div class="btn btn-green" onclick="renderTab('mining')">⛏️ МАЙНИНГ (${gameState.miningFarms.length})</div>
                        <div class="btn btn-purple" onclick="renderTab('pass')">🎫 БОЕВОЙ ПРОПУСК (${gameState.battlePass.level}/20)</div>
                    </div>
                </div>
            `;
        }
        
        function renderBusiness(content) {
            let html = '<div class="card"><div class="card-title">💼 МОИ БИЗНЕСЫ</div>';
            
            if (gameState.businesses.length === 0) {
                html += '<div style="text-align:center; padding:20px;">У ВАС НЕТ БИЗНЕСОВ</div>';
            } else {
                gameState.businesses.forEach((b, index) => {
                    const isDaily = b.isDaily ? ' (ЕЖЕДНЕВНЫЙ)' : '';
                    const timeLeft = b.dailyEndTime ? Math.max(0, Math.floor((b.dailyEndTime - Date.now()) / 1000)) : 0;
                    const hours = Math.floor(timeLeft / 3600);
                    const minutes = Math.floor((timeLeft % 3600) / 60);
                    
                    html += `
                        <div class="business-item">
                            <div class="business-header">
                                <span class="business-name">${b.name || businessTemplates.find(t => t.id === b.templateId)?.name}${isDaily}</span>
                                <span class="business-level">${b.level}/20</span>
                            </div>
                            <div class="business-stats">
                                <span>💰 +${formatFullNumber(b.income)}/сек</span>
                                <span>📈 УЛУЧШИТЬ: ${formatFullNumber(b.upgradeCost)}</span>
                            </div>
                            ${b.manager ? 
                                `<div class="manager-badge" onclick="toggleAutoUpgrade(${index})">
                                    👔 МЕНЕДЖЕР lvl${b.manager.level} ${b.manager.autoUpgrade ? '⚡АВТО' : '💤'}
                                </div>` : 
                                `<div class="btn btn-purple" style="padding:8px;" onclick="hireManager(${index})">👔 НАНЯТЬ (100💎)</div>`
                            }
                            ${!b.manager ? 
                                `<div class="btn btn-gold" style="padding:8px; margin-top:5px;" onclick="upgradeBusiness(${index})">📈 УЛУЧШИТЬ</div>` : 
                                ''
                            }
                            ${b.isDaily && timeLeft > 0 ?
                                `<div class="timer">⏱️ Осталось: ${hours}ч ${minutes}м</div>` : ''
                            }
                        </div>
                    `;
                });
            }
            
            html += '<div class="btn btn-gold" onclick="showBuyBusinessModal()">➕ КУПИТЬ БИЗНЕС</div>';
            html += '</div>';
            content.innerHTML = html;
        }
        
        function renderMining(content) {
            let html = '<div class="card"><div class="card-title">⛏️ КРИПТО-МАЙНИНГ</div>';
            
            if (gameState.miningFarms.length === 0) {
                html += '<div style="text-align:center; padding:20px;">У ВАС НЕТ ФЕРМ</div>';
            } else {
                gameState.miningFarms.forEach((farm, index) => {
                    const progressPercent = (farm.progress / farm.maxProgress) * 100;
                    
                    html += `
                        <div class="mining-farm">
                            <div class="farm-header">
                                <span class="farm-name">${farm.crypto.emoji} ${farm.crypto.name}</span>
                                <span class="farm-level">УРОВЕНЬ ${farm.level}</span>
                            </div>
                            <div class="farm-progress">
                                <div class="farm-progress-bar" style="width: ${progressPercent}%"></div>
                            </div>
                            <div class="business-stats">
                                <span>💰 ДОХОД: +${formatFullNumber(farm.crypto.basePrice * farm.level / 100)}/сек</span>
                                <span>📈 УЛУЧШИТЬ: ${formatFullNumber(farm.level * 500)}</span>
                            </div>
                            <div class="btn btn-gold" style="padding:8px;" onclick="upgradeMiningFarm(${index})">📈 УЛУЧШИТЬ</div>
                        </div>
                    `;
                });
            }
            
            html += '<div class="btn btn-gold" onclick="buyMiningFarm()">➕ КУПИТЬ ФЕРМУ (1000💰)</div>';
            html += '</div>';
            content.innerHTML = html;
        }
        
        function renderBattlePass(content) {
            let html = '<div class="card"><div class="card-title">🎫 БОЕВОЙ ПРОПУСК</div>';
            
            html += `
                <div class="battle-pass">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <span>УРОВЕНЬ: ${gameState.battlePass.level}/20</span>
                        <span>⚡ ОПЫТ: ${gameState.battlePass.exp}/100</span>
                    </div>
                    <div class="level-bar" style="margin:10px 0;">
                        <div class="level-progress" style="width: ${(gameState.battlePass.exp / 100) * 100}%"></div>
                    </div>
                </div>
            `;
            
            battlePassLevels.forEach(level => {
                const isClaimed = gameState.battlePass.claimed.includes(level.level);
                const isAvailable = level.level <= gameState.battlePass.level && !isClaimed;
                
                html += `
                    <div class="pass-level ${isClaimed ? 'completed' : ''}">
                        <div class="pass-level-number">${level.level}</div>
                        <div class="pass-level-reward">
                            ${level.type === 'money' ? '💰' : '💎'} ${formatFullNumber(level.reward)} ${level.type === 'money' ? 'монет' : 'алмазов'}
                        </div>
                        ${isAvailable ? 
                            `<div class="btn btn-gold" style="padding:5px; width:auto;" onclick="claimBattlePassReward(${level.level})">ПОЛУЧИТЬ</div>` : 
                            (isClaimed ? '<span style="color:#4CAF50;">✓ ПОЛУЧЕНО</span>' : '<span style="color:#666;">🔒 ЗАКРЫТО</span>')
                        }
                    </div>
                `;
            });
            
            html += '</div>';
            content.innerHTML = html;
        }
        
        function renderDaily(content) {
            let html = '<div class="card"><div class="card-title">📅 ЕЖЕДНЕВНЫЕ БИЗНЕСЫ</div>';
            
            const now = Date.now();
            
            gameState.dailyBusinesses.forEach((daily, index) => {
                const timeLeft = Math.max(0, Math.floor((daily.endTime - now) / 1000));
                const hours = Math.floor(timeLeft / 3600);
                const minutes = Math.floor((timeLeft % 3600) / 60);
                
                html += `
                    <div class="daily-business">
                        <div style="display:flex; justify-content:space-between;">
                            <span style="font-weight:bold;">${daily.name}</span>
                            <span style="color:#4CAF50;">💰 +${daily.income}/сек</span>
                        </div>
                        <div class="timer">⏱️ ДОСТУПНО: ${hours}ч ${minutes}м</div>
                        ${!daily.purchased ? 
                            `<div class="btn btn-gold" style="padding:8px;" onclick="buyDailyBusiness(${index})">🏪 КУПИТЬ ЗА 500💰</div>` : 
                            '<span style="color:#4CAF50;">✓ КУПЛЕНО</span>'
                        }
                    </div>
                `;
            });
            
            html += '</div>';
            content.innerHTML = html;
        }
        
        function renderStats(content) {
            let totalIncome = 0;
            gameState.businesses.forEach(b => totalIncome += b.income || 0);
            gameState.miningFarms.forEach(f => totalIncome += f.crypto.basePrice * f.level / 100);
            
            html = `
                <div class="card">
                    <div class="card-title">📊 СТАТИСТИКА</div>
                    
                    <div class="business-stats" style="justify-content:space-between; margin:10px 0;">
                        <span>💰 ВСЕГО ЗАРАБОТАНО</span>
                        <span style="color:#ffd700;">${formatFullNumber(gameState.totalEarned || 0)}</span>
                    </div>
                    <div class="business-stats" style="justify-content:space-between; margin:10px 0;">
                        <span>⏱️ ДОХОД/СЕК</span>
                        <span style="color:#ffd700;">${formatFullNumber(Math.floor(totalIncome))}</span>
                    </div>
                    <div class="business-stats" style="justify-content:space-between; margin:10px 0;">
                        <span>💼 БИЗНЕСОВ</span>
                        <span style="color:#ffd700;">${gameState.businesses.length}</span>
                    </div>
                    <div class="business-stats" style="justify-content:space-between; margin:10px 0;">
                        <span>⛏️ МАЙНИНГ ФЕРМ</span>
                        <span style="color:#ffd700;">${gameState.miningFarms.length}</span>
                    </div>
                    <div class="business-stats" style="justify-content:space-between; margin:10px 0;">
                        <span>🎫 БОЕВОЙ ПРОПУСК</span>
                        <span style="color:#ffd700;">${gameState.battlePass.level}/20</span>
                    </div>
                </div>
            `;
            
            content.innerHTML = html;
        }
        
        function showBuyBusinessModal() {
            const modal = document.getElementById('managerModal');
            const content = document.getElementById('managerModalContent');
            
            let html = '<div class="modal-title">🏪 КУПИТЬ БИЗНЕС</div>';
            
            businessTemplates.forEach(t => {
                html += `
                    <div class="business-item" style="cursor:pointer;" onclick="buyBusiness(${t.id}); closeManagerModal();">
                        <div class="business-header">
                            <span class="business-name">${t.name}</span>
                        </div>
                        <div class="business-stats">
                            <span>💰 ДОХОД: +${t.baseIncome}/сек</span>
                            <span style="color:#4CAF50;">💰 ЦЕНА: ${formatFullNumber(t.baseUpgradeCost)}</span>
                        </div>
                    </div>
                `;
            });
            
            html += '<div class="close-btn" onclick="closeManagerModal()">ЗАКРЫТЬ</div>';
            
            content.innerHTML = html;
            modal.classList.add('active');
        }
        
        function closeManagerModal() {
            document.getElementById('managerModal').classList.remove('active');
        }
        
        function showNicknameModal() {
            document.getElementById('nicknameInput').value = currentUser;
            document.getElementById('nicknameModal').classList.add('active');
        }
        
        function closeNicknameModal() {
            document.getElementById('nicknameModal').classList.remove('active');
        }
        
        function saveNickname() {
            const newNick = document.getElementById('nicknameInput').value.trim();
            if (newNick) {
                currentUser = newNick;
                gameState.nickname = newNick;
                updateUI();
                saveGame();
            }
            closeNicknameModal();
        }
        
        // ========== НАВИГАЦИЯ ==========
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                if (!gameState) return;
                
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                this.classList.add('active');
                renderTab(this.dataset.tab);
            });
        });
        
        // ========== ЗАПУСК ==========
        window.onload = function() {
            if (!loadGame()) {
                startNewGame();
            }
            
            document.getElementById('username').innerHTML = `👑 ${currentUser} <span class="warning-badge">⚠️ ЛОКАЛЬНО</span>`;
            updateUI();
            renderTab('home');
            
            // Глобальные функции
            window.handleClick = handleClick;
            window.buyBusiness = buyBusiness;
            window.upgradeBusiness = upgradeBusiness;
            window.hireManager = hireManager;
            window.toggleAutoUpgrade = toggleAutoUpgrade;
            window.buyMiningFarm = buyMiningFarm;
            window.upgradeMiningFarm = upgradeMiningFarm;
            window.claimBattlePassReward = claimBattlePassReward;
            window.buyDailyBusiness = buyDailyBusiness;
            window.showBuyBusinessModal = showBuyBusinessModal;
            window.closeManagerModal = closeManagerModal;
            window.showNicknameModal = showNicknameModal;
            window.closeNicknameModal = closeNicknameModal;
            window.saveNickname = saveNickname;
            window.renderTab = renderTab;
        };
    </script>
</body>
</html>
