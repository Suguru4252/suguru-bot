<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IMPERIA CLICKER 2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a050f 0%, #1a1025 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5px;
        }
        
        .app-container {
            width: 100%;
            max-width: 400px;
            height: 98vh;
            background: rgba(10, 5, 20, 0.97);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            border: 2px solid #ffd700;
        }
        
        .header {
            background: linear-gradient(135deg, #2a1b3d 0%, #1a0f2a 100%);
            color: white;
            padding: 15px;
            text-align: center;
            border-bottom: 3px solid #ffd700;
        }
        
        .username {
            font-size: 14px;
            color: #ffd700;
            font-weight: bold;
            cursor: pointer;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 30px;
            background: rgba(0,0,0,0.3);
        }
        
        .offline-badge {
            background: rgba(255, 215, 0, 0.25);
            border: 2px solid #ffd700;
            border-radius: 30px;
            padding: 8px 15px;
            font-size: 14px;
            display: inline-block;
            color: #ffd700;
            margin: 5px 0;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }
        
        .balance-container {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin: 15px 0;
        }
        
        .balance-box {
            background: rgba(0, 0, 0, 0.6);
            padding: 12px 5px;
            border-radius: 15px;
            flex: 1;
            border: 2px solid rgba(255, 215, 0, 0.5);
        }
        
        .balance-label {
            font-size: 11px;
            opacity: 0.9;
        }
        
        .balance-value {
            font-size: 16px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .level-bar {
            background: rgba(255, 255, 255, 0.2);
            height: 8px;
            border-radius: 4px;
            margin: 10px 0;
            overflow: hidden;
        }
        
        .level-progress {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffaa00);
            width: 0%;
            border-radius: 4px;
        }
        
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            color: white;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        
        .content::-webkit-scrollbar {
            display: none;
        }
        
        #home-content {
            min-height: 100%;
            cursor: pointer;
            padding: 10px 0;
        }
        
        .clicker-area {
            text-align: center;
            cursor: pointer;
        }
        
        .click-btn {
            background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b);
            border: none;
            border-radius: 50%;
            width: 200px;
            height: 200px;
            font-size: 60px;
            color: white;
            margin: 20px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 4px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.6);
            cursor: pointer;
            position: relative;
            z-index: 5;
            pointer-events: auto;
        }
        
        .click-btn:active {
            transform: scale(0.95);
        }
        
        .click-btn span {
            font-size: 20px;
            margin-top: 10px;
        }
        
        .per-second {
            color: #4CAF50;
            font-size: 18px;
            margin: 10px 0;
            font-weight: bold;
            cursor: pointer;
        }
        
        .offline-earnings {
            background: rgba(255, 215, 0, 0.15);
            border: 2px solid #ffd700;
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
            font-size: 16px;
            animation: pulse 2s infinite;
            font-weight: bold;
            cursor: pointer;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }
        
        .card-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #ffd700;
            text-align: center;
            border-bottom: 2px solid #ffd700;
            padding-bottom: 10px;
        }
        
        .btn {
            background: linear-gradient(135deg, #3a2a4d 0%, #2a1a3d 100%);
            border: 2px solid #ffd700;
            color: white;
            padding: 18px 25px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
            font-size: 18px;
            transition: transform 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn:active {
            transform: scale(0.97);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%);
        }
        
        .btn-gold {
            background: linear-gradient(135deg, #ffd700 0%, #b8860b 100%);
            color: black;
            font-weight: bold;
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);
            color: white;
        }
        
        .input-field {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 30px;
            padding: 15px 20px;
            width: 100%;
            margin: 10px 0;
            color: white;
            font-size: 16px;
            outline: none;
        }
        
        .input-field:focus {
            border-color: #ffd700;
        }
        
        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        .auth-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100%;
            padding: 20px;
        }
        
        .auth-title {
            font-size: 32px;
            font-weight: bold;
            color: #ffd700;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .auth-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            border: 2px solid #ffd700;
            margin-bottom: 20px;
        }
        
        .bottom-nav {
            display: flex;
            background: rgba(0, 0, 0, 0.9);
            padding: 10px 5px;
            gap: 5px;
            border-top: 3px solid #ffd700;
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            white-space: nowrap;
        }
        
        .bottom-nav::-webkit-scrollbar {
            display: none;
        }
        
        .nav-item {
            flex: 0 0 auto;
            text-align: center;
            padding: 12px 15px;
            color: rgba(255, 255, 255, 0.6);
            border-radius: 15px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.3s;
            min-width: 70px;
        }
        
        .nav-item span {
            font-size: 22px;
            display: block;
            margin-bottom: 5px;
        }
        
        .nav-item.active {
            color: #ffd700;
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid #ffd700;
        }
        
        .shop-item {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }
        
        .item-info {
            flex: 1;
        }
        
        .item-name {
            font-weight: bold;
            color: #ffd700;
            font-size: 18px;
            margin-bottom: 5px;
        }
        
        .item-price {
            color: #4CAF50;
            font-weight: bold;
            font-size: 16px;
        }
        
        .buy-btn {
            background: linear-gradient(135deg, #4a2a6a 0%, #3a1a5a 100%);
            border: 2px solid #ffd700;
            color: white;
            padding: 15px 25px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .property-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .property-category {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 20px;
            padding: 25px 10px;
            text-align: center;
            cursor: pointer;
            border: 2px solid rgba(255, 215, 0, 0.4);
        }
        
        .property-category span {
            font-size: 48px;
            display: block;
            margin-bottom: 15px;
        }
        
        .category-name {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 5px;
        }
        
        .category-count {
            font-size: 16px;
            color: #ffd700;
            font-weight: bold;
        }
        
        .property-item {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }
        
        .property-emoji {
            font-size: 42px;
            width: 70px;
            text-align: center;
        }
        
        .property-details {
            flex: 1;
        }
        
        .property-title {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 5px;
        }
        
        .property-price {
            color: #ffd700;
            font-size: 16px;
        }
        
        .property-income {
            color: #4CAF50;
            font-size: 14px;
        }
        
        .property-owned {
            background: #2e7d32;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
        }
        
        .business-item {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 15px;
            cursor: pointer;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }
        
        .business-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        
        .business-name {
            font-weight: bold;
            color: #ffd700;
            font-size: 20px;
        }
        
        .business-level {
            color: #4CAF50;
            font-size: 16px;
            font-weight: bold;
        }
        
        .business-stats {
            display: flex;
            justify-content: space-between;
            font-size: 15px;
            margin: 10px 0;
        }
        
        .business-progress {
            background: rgba(255, 255, 255, 0.15);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin: 10px 0;
        }
        
        .business-bar {
            height: 100%;
            background: #ffd700;
            width: 0%;
        }
        
        .upgrade-time {
            font-size: 14px;
            color: #ff9800;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #1a1025;
            border-radius: 30px;
            padding: 30px;
            max-width: 350px;
            width: 90%;
            color: white;
            border: 3px solid #ffd700;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #ffd700;
            text-align: center;
        }
        
        .close-btn {
            background: #f44336;
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            text-align: center;
            margin-top: 15px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            border: 1px solid #ffd700;
        }
        
        .sell-btn {
            background: #ff9800;
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            text-align: center;
            margin-top: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            border: 1px solid #ffd700;
        }
        
        .top-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        
        .top-rank {
            width: 40px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
        }
        
        .top-rank-1 { color: #ffd700; }
        .top-rank-2 { color: #c0c0c0; }
        .top-rank-3 { color: #cd7f32; }
        
        .top-name {
            flex: 1;
            font-size: 16px;
            font-weight: bold;
        }
        
        .top-money {
            font-size: 16px;
            color: #ffd700;
            font-weight: bold;
        }
        
        .hidden {
            display: none !important;
        }
        
        /* Floating effect for click */
        .floating-effect {
            position: fixed;
            color: #ffd700;
            font-weight: bold;
            font-size: 24px;
            pointer-events: none;
            z-index: 9999;
            text-shadow: 0 0 10px #ffaa00;
            animation: floatUp 1s ease-out forwards;
        }
        
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
        }
        
        /* Settings */
        .settings-group {
            margin-bottom: 20px;
        }
        .settings-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            margin-bottom: 10px;
        }
        .settings-label {
            font-size: 16px;
        }
        .settings-switch {
            width: 50px;
            height: 26px;
            background: rgba(255,255,255,0.2);
            border-radius: 30px;
            position: relative;
            cursor: pointer;
            border: 2px solid #ffd700;
        }
        .settings-switch.active {
            background: #ffd700;
        }
        .settings-switch::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            top: 0;
            left: 0;
            transition: 0.2s;
        }
        .settings-switch.active::after {
            left: 24px;
        }
        .info-text {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            text-align: center;
            margin: 10px 0;
        }
        .footer-link {
            color: #ffd700;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
        }
        
        /* Cloud storage */
        .cloud-badge {
            background: rgba(0, 150, 255, 0.2);
            border: 2px solid #0099ff;
            border-radius: 30px;
            padding: 5px 15px;
            font-size: 12px;
            color: #0099ff;
            margin-left: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>

        <div class="content" id="content"></div>
        
        <div class="bottom-nav" id="bottomNav" style="display: none;">
            <div class="nav-item active" data-tab="home"><span>🏠</span>ГЛАВНАЯ</div>
            <div class="nav-item" data-tab="mybusiness"><span>💼</span>БИЗНЕСЫ</div>
            <div class="nav-item" data-tab="property"><span>🏰</span>НЕДВИЖ.</div>
            <div class="nav-item" data-tab="shop"><span>🏪</span>МАГАЗИН</div>

    <div class="modal" id="businessModal">
        <div class="modal-content" id="businessModalContent"></div>

    <div class="modal" id="propertyModal">
        <div class="modal-content" id="propertyModalContent"></div>
    </div>
    
    <div class="modal" id="nicknameModal">
        <div class="modal-content">
            <div class="modal-title">✏️ ИЗМЕНИТЬ НИК</div>
            <input type="text" class="input-field" id="nicknameInput" placeholder="Введите новый ник" maxlength="20">
            <div class="btn btn-gold" onclick="saveNickname()">СОХРАНИТЬ</div>
            <div class="close-btn" onclick="closeNicknameModal()">ОТМЕНА</div>
        </div>
    </div>
    
    <div class="modal" id="authModal">
        <div class="modal-content">
            <div class="modal-title">🔐 РЕГИСТРАЦИЯ</div>
            <div style="text-align:center; margin:20px 0;">
                <div style="font-size:48px;">👤</div>
            </div>
            <input type="text" class="input-field" id="regLogin" placeholder="Придумайте логин" maxlength="20">
            <input type="password" class="input-field" id="regPassword" placeholder="Придумайте пароль" maxlength="30">
            <div class="btn btn-gold" onclick="register()">🔐 ЗАРЕГИСТРИРОВАТЬСЯ</div>
            <div style="margin:15px 0; text-align:center; color:#ffd700;">или</div>
            <input type="text" class="input-field" id="loginLogin" placeholder="Ваш логин">
            <input type="password" class="input-field" id="loginPassword" placeholder="Ваш пароль">
            <div class="btn" onclick="login()">🔑 ВОЙТИ</div>
            <div style="margin-top:15px; font-size:12px; color:rgba(255,255,255,0.5); text-align:center;">
                Ваши данные сохранятся в облаке и не пропадут после переустановки
            </div>
        </div>
    </div>
    
    <script>
        // Telegram
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }
        
        // ========== СИСТЕМА РЕГИСТРАЦИИ ==========
        const APP_VERSION = '1.0.3';
        
        // База данных пользователей
        let usersDatabase = {};
        
        // Загружаем базу пользователей из localStorage
        function loadUsersDatabase() {
            const saved = localStorage.getItem('imperiaUsersDB');
            if (saved) {
                try {
                    usersDatabase = JSON.parse(saved);
                } catch(e) {
                    usersDatabase = {};
                }
            } else {
                usersDatabase = {};
            }
        }
        
        // Сохраняем базу пользователей
        function saveUsersDatabase() {
            localStorage.setItem('imperiaUsersDB', JSON.stringify(usersDatabase));
        }
        
        // Текущий пользователь
        let currentUser = null;
        let currentUserLogin = null;
        let gameState = null;
        let topPlayers = [];
        
        // Настройки
        let settings = {
            soundEnabled: true,
            effectsEnabled: true
        };
        
        // Загрузка игры пользователя по логину
        function loadUserGame(login) {
            if (usersDatabase[login]) {
                gameState = usersDatabase[login].gameState;
                settings = usersDatabase[login].settings || { soundEnabled: true, effectsEnabled: true };
                currentUser = login;
                currentUserLogin = login;
                
                document.getElementById('cloudBadge').style.display = 'inline-block';
                document.getElementById('username').innerHTML = `👑 ${login} <span class="cloud-badge">☁️ ОБЛАКО</span>`;
                return true;
            }
            return false;
        }
        
        // Создание нового пользователя
        function createNewUser(login, password) {
            const newGame = {
                balance: 0,
                diamonds: 10,
                exp: 0,
                level: 1,
                clickPower: 1,
                clickPowerLevel: 0,
                autoClickerLevel: 0,
                critLevel: 0,
                totalClicks: 0,
                totalEarned: 0,
                playTime: 0,
                lastOnlineTime: Date.now(),
                lastWeeklyReward: 0,
                myBusinesses: [],
                houses: [
                    { id: 0, name: "КВАРТИРА", emoji: "🏢", price: 50000, income: 5, owned: false },
                    { id: 1, name: "ДОМ", emoji: "🏠", price: 500000, income: 50, owned: false },
                    { id: 2, name: "ОСОБНЯК", emoji: "🏰", price: 5000000, income: 500, owned: false },
                    { id: 3, name: "ВИЛЛА", emoji: "🏛️", price: 50000000, income: 5000, owned: false }
                ],

        function saveGameToCloud() {
            if (currentUserLogin && usersDatabase[currentUserLogin]) {
                usersDatabase[currentUserLogin].gameState = gameState;
                usersDatabase[currentUserLogin].settings = settings;
                usersDatabase[currentUserLogin].lastOnline = Date.now();
                saveUsersDatabase();
            }
        }
        
        // Сохранение игры
        function saveGame() {
            if (gameState) {
                gameState.lastOnlineTime = Date.now();
                
                // Сохраняем локально для быстрого доступа
                const localSave = {
                    gameState: gameState,
                    settings: settings,
                    login: currentUserLogin
                };
                localStorage.setItem('imperiaClickerLocal', JSON.stringify(localSave));
                
                // Сохраняем в облако
                saveGameToCloud();
            }
        }

                    if (data.login && usersDatabase[data.login]) {
                        gameState = data.gameState;
                        settings = data.settings;
                        currentUser = data.login;
                        currentUserLogin = data.login;
                        document.getElementById('cloudBadge').style.display = 'inline-block';
                        document.getElementById('username').innerHTML = `👑 ${data.login} <span class="cloud-badge">☁️ ОБЛАКО</span>`;

        }

        function register() {

            const password = document.getElementById('regPassword')?.value.trim();

                alert('❌ Введите логин и пароль!');

            }
            
            if (password.length < 4) {
                alert('❌ Пароль должен быть не меньше 4 символов!');
                return;
            }
            
            if (usersDatabase[login]) {
                alert('❌ Пользователь с таким логином уже существует!');
                return;
            }
            
            createNewUser(login, password);
            startGame();

        function login() {

            const password = document.getElementById('loginPassword')?.value.trim();

                alert('❌ Введите логин и пароль!');
                return;
            }

        // Обновление топа (теперь общий для всех)
        function updateTopPlayers() {
            topPlayers = [];
            
            // Собираем всех игроков из базы
            for (let login in usersDatabase) {
                topPlayers.push({
                    nickname: login,
                    totalEarned: usersDatabase[login].gameState.totalEarned || 0
                });
            }
            
            // Сортируем по заработку
            topPlayers.sort((a, b) => b.totalEarned - a.totalEarned);
            
            // Проверка недельной награды для текущего игрока
            if (gameState) {
                const now = Date.now();
                if (now - (gameState.lastWeeklyReward || 0) > 7 * 24 * 60 * 60 * 1000) {
                    giveWeeklyReward();
                }
            }
        }
        
        function giveWeeklyReward() {
            if (!gameState || topPlayers.length === 0) return;
            
            const myIndex = topPlayers.findIndex(p => p.nickname === currentUser);
            
            let reward = 0;
            if (myIndex === 0) reward = 1000;
            else if (myIndex === 1) reward = 500;
            else if (myIndex === 2) reward = 100;
            
            if (reward > 0) {
                gameState.diamonds += reward;
                gameState.lastWeeklyReward = Date.now();
                alert(`🏆 Вы получили недельную награду: ${reward}💎 за ${myIndex+1} место!`);
                saveGame();
                updateUI();
            }
        }

            if (!gameState) return 100;
            const myIndex = topPlayers.findIndex(p => p.nickname === currentUser);
            return myIndex + 1;

        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");

            if (!currentUser || !gameState) return;

            document.getElementById('level').textContent = gameState.level;
            
            const expNeeded = gameState.level * 1000;

            document.getElementById('levelProgress').style.width = Math.min(expPercent, 100) + '%';

        // Звук клика
        function playClickSound() {
            if (!settings.soundEnabled) return;
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = 'sine';
            oscillator.frequency.value = 800;
            gainNode.gain.value = 0.1;
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1);
        }
        
        // Эффект всплывающей монетки
        function createFloatingEffect(x, y, text) {
            if (!settings.effectsEnabled) return;
            const el = document.createElement('div');
            el.className = 'floating-effect';
            el.textContent = text;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }
        
        function handleClick(event) {
            if (!currentUser || !gameState) return;
            
            let power = gameState.clickPower * (1 + gameState.clickPowerLevel * 0.5);
            
            if (Math.random() * 100 < gameState.critLevel * 10) {
                power *= 10;
            }
            
            const earned = Math.floor(power);
            gameState.balance += earned;
            gameState.totalClicks++;
            gameState.totalEarned += earned;
            gameState.exp += earned / 100;
            
            while (gameState.exp >= gameState.level * 1000) {
                gameState.exp -= gameState.level * 1000;
                gameState.level++;
                gameState.diamonds += gameState.level * 5;
            }
            
            playClickSound();
            if (event) {
                createFloatingEffect(event.clientX, event.clientY, `+${earned}💰`);
            }
            
            updateUI();
            saveGame();
            updateTopPlayers(); // Обновляем топ после заработка
            renderCurrentTab();
        }

        function buyBusinessFromModal(templateId) {
            const template = businessTemplates.find(t => t.id === templateId);

            const ownedCount = gameState.myBusinesses.filter(b => b.templateId === templateId).length;
            
            if (ownedCount >= 10) {
                alert('❌ НЕЛЬЗЯ КУПИТЬ БОЛЬШЕ 10 БИЗНЕСОВ ЭТОГО ТИПА!');
                return;
            }
            
            const price = template.baseUpgradeCost;
            
            if (gameState.balance >= price) {

        function calculateBusinessTotalSpent(business, template) {
            let totalSpent = template.baseUpgradeCost;
            
            let currentCost = template.baseUpgradeCost;
            for (let i = 1; i < business.level; i++) {
                currentCost = Math.floor(currentCost * 2.5);
                totalSpent += currentCost;

            return totalSpent;

        function sellBusiness(index) {
            const business = gameState.myBusinesses[index];
            if (!business) return;
            
            const template = businessTemplates[business.templateId];
            const totalSpent = calculateBusinessTotalSpent(business, template);
            const sellPrice = Math.floor(totalSpent * 0.5);
            
            if (confirm(`Продать ${template.name} #${index + 1} за ${formatNumber(sellPrice)}💰?`)) {
                gameState.myBusinesses.splice(index, 1);
                gameState.balance += sellPrice;
                
                saveGame();
                updateUI();
                closeBusinessModal();
                renderCurrentTab();
                alert(`✅ Бизнес продан! Получено ${formatNumber(sellPrice)}💰`);
            }
        }
        
        function startUpgrade(index) {
            const business = gameState.myBusinesses[index];
            if (!business) return;
            
            const template = businessTemplates[business.templateId];
            
            if (business.level >= template.maxLevel) {
                alert('❌ Достигнут максимальный уровень!');
                return;
            }
            
            if (business.upgradeEnd > Date.now()) {
                alert('⏱️ Улучшение уже идет!');
                return;
            }
            
            if (gameState.balance < business.upgradeCost) {
                alert('❌ Недостаточно монет!');
                return;
            }
            
            gameState.balance -= business.upgradeCost;
            
            business.lastUpgrade = Date.now();
            business.upgradeEnd = Date.now() + (business.upgradeTime * 1000);
            
            saveGame();
            updateUI();
            closeBusinessModal();
            renderCurrentTab();
            
            alert(`✅ Улучшение запущено! Бизнес будет улучшен через ${business.upgradeTime} секунд.`);
            
            setTimeout(() => {
                if (business.upgradeEnd > 0 && business.upgradeEnd <= Date.now() && business.level < template.maxLevel) {
                    business.level++;
                    business.upgradeCost = Math.floor(business.upgradeCost * 2.5);
                    business.upgradeTime = Math.floor(business.upgradeTime * 1.3);
                    business.upgradeEnd = 0;
                    
                    saveGame();
                    updateUI();
                    renderCurrentTab();
                    
                    if (business.level < template.maxLevel) {
                        alert(`✅ ${template.name} улучшен до ${business.level} уровня!`);
                    } else {
                        alert(`🎉 ${template.name} достиг максимального (20) уровня!`);
                    }
                }
            }, business.upgradeTime * 1000);
        }

            document.getElementById('businessModal').classList.remove('active');
        }
        
        function checkBusinessUpgrades() {
            const now = Date.now();
            gameState.myBusinesses.forEach(business => {
                const template = businessTemplates[business.templateId];
                if (business.upgradeEnd > 0 && business.upgradeEnd <= now && business.level < template.maxLevel) {
                    business.level++;
                    business.upgradeCost = Math.floor(business.upgradeCost * 2.5);
                    business.upgradeTime = Math.floor(business.upgradeTime * 1.3);
                    business.upgradeEnd = 0;
                    saveGame();
                    renderCurrentTab();
                }
            });
        }

            const level = gameState[type + 'Level'];
            if (level >= 5) return;
            
            const price = upgradePrices[type][level];
            
            if (gameState.balance >= price) {
                gameState.balance -= price;
                gameState[type + 'Level']++;
                saveGame();
                updateUI();
                renderCurrentTab();
                playClickSound();
            } else {
                alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
            }
        }

            if (gameState.diamonds >= 1) {
                gameState.diamonds--;

                saveGame();
                updateUI();
                renderCurrentTab();
                playClickSound();
            } else {
                alert('❌ НЕТ АЛМАЗОВ!');
            }
        }

            document.getElementById('nicknameModal').classList.remove('active');
        }
        
        function saveNickname() {
            const newNick = document.getElementById('nicknameInput').value.trim();
            if (newNick) {
                if (usersDatabase[newNick] && newNick !== currentUser) {
                    alert('❌ Такой логин уже занят!');
                    return;
                }
                
                // Меняем логин в базе
                if (currentUserLogin) {
                    const userData = usersDatabase[currentUserLogin];
                    delete usersDatabase[currentUserLogin];
                    usersDatabase[newNick] = userData;
                    currentUserLogin = newNick;
                    currentUser = newNick;
                    saveUsersDatabase();
                }
                
                document.getElementById('username').innerHTML = `👑 ${newNick} <span class="cloud-badge">☁️ ОБЛАКО</span>`;
                saveGame();
                closeNicknameModal();
                renderCurrentTab();
                updateTopPlayers();
            }
        }
        
        function resetGame() {
            if (confirm('Точно сбросить весь прогресс?')) {
                localStorage.removeItem('imperiaClickerLocal');
                if (currentUserLogin) {
                    // Обнуляем прогресс, но сохраняем аккаунт
                    createNewUser(currentUserLogin, usersDatabase[currentUserLogin].password);
                    startGame();
                } else {
                    location.reload();
                }
            }
        }
        
        // ========== АВТОМАТИЧЕСКИЙ ДОХОД ==========
        
        setInterval(() => {
            if (!currentUser || !gameState) return;
            
            if (gameState.autoClickerLevel > 0) {
                gameState.balance += gameState.autoClickerLevel;
                gameState.totalEarned += gameState.autoClickerLevel;
            }
            
            gameState.myBusinesses.forEach(business => {
                if (business.level > 0) {
                    const template = businessTemplates[business.templateId];
                    const income = template.baseIncome * business.level;
                    gameState.balance += income;
                    gameState.totalEarned += income;
                    business.totalEarned += income;
                }
            });
            
            gameState.playTime++;
            updateUI();
            saveGame();
            updateTopPlayers(); // Обновляем топ
        }, 1000);
        
        // ========== НАВИГАЦИЯ ==========
        
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                if (!currentUser || !gameState) return;
                
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                this.classList.add('active');
                renderTab(this.dataset.tab);
            });
        });
        
        // ========== ЗАПУСК ==========
        
        window.onload = function() {
            loadUsersDatabase();
            
            // Пытаемся загрузить локальное сохранение
            if (loadLocalGame()) {
                startGame();
                updateTopPlayers();
            } else {
                showAuthScreen();

            // Глобальные функции

            window.showMyShips = showMyShips;
            window.buyUpgrade = buyUpgrade;
            window.exchangeDiamonds = exchangeDiamonds;
            window.resetGame = resetGame;
            window.showNicknameModal = showNicknameModal;
            window.closeNicknameModal = closeNicknameModal;
            window.saveNickname = saveNickname;
            window.toggleSound = toggleSound;
            window.toggleEffects = toggleEffects;
            window.handleClick = handleClick;
            window.showPrivacyPolicy = showPrivacyPolicy;
            window.register = register;
            window.login = login;
            window.showAuthScreen = showAuthScreen;
            
            setInterval(checkBusinessUpgrades, 1000);
        };
    </script>
