<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IMPERIA CLICKER 2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a050f 0%, #1a1025 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5px;
        }
        
        .app-container {
            width: 100%;
            max-width: 400px;
            height: 98vh;
            background: rgba(10, 5, 20, 0.97);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            border: 2px solid #ffd700;
        }
        
        .header {
            background: linear-gradient(135deg, #2a1b3d 0%, #1a0f2a 100%);
            color: white;
            padding: 15px;
            text-align: center;
            border-bottom: 3px solid #ffd700;
        }
        
        .username {
            font-size: 14px;
            color: #ffd700;
            font-weight: bold;
            cursor: pointer;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 30px;
            background: rgba(0,0,0,0.3);
        }
        
        .offline-badge {
            background: rgba(255, 215, 0, 0.25);
            border: 2px solid #ffd700;
            border-radius: 30px;
            padding: 8px 15px;
            font-size: 14px;
            display: inline-block;
            color: #ffd700;
            margin: 5px 0;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }
        
        .balance-container {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin: 15px 0;
        }
        
        .balance-box {
            background: rgba(0, 0, 0, 0.6);
            padding: 12px 5px;
            border-radius: 15px;
            flex: 1;
            border: 2px solid rgba(255, 215, 0, 0.5);
        }
        
        .balance-label {
            font-size: 11px;
            opacity: 0.9;
        }
        
        .balance-value {
            font-size: 16px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .level-bar {
            background: rgba(255, 255, 255, 0.2);
            height: 8px;
            border-radius: 4px;
            margin: 10px 0;
            overflow: hidden;
        }
        
        .level-progress {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffaa00);
            width: 0%;
            border-radius: 4px;
        }
        
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            color: white;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        
        .content::-webkit-scrollbar {
            display: none;
        }
        
        #home-content {
            min-height: 100%;
            cursor: pointer;
            padding: 10px 0;
        }
        
        .clicker-area {
            text-align: center;
            cursor: pointer;
        }
        
        .click-btn {
            background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b);
            border: none;
            border-radius: 50%;
            width: 200px;
            height: 200px;
            font-size: 60px;
            color: white;
            margin: 20px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 4px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.6);
            cursor: pointer;
            position: relative;
            z-index: 5;
            pointer-events: auto;
        }
        
        .click-btn:active {
            transform: scale(0.95);
        }
        
        .click-btn span {
            font-size: 20px;
            margin-top: 10px;
        }
        
        .per-second {
            color: #4CAF50;
            font-size: 18px;
            margin: 10px 0;
            font-weight: bold;
            cursor: pointer;
        }
        
        .offline-earnings {
            background: rgba(255, 215, 0, 0.15);
            border: 2px solid #ffd700;
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
            font-size: 16px;
            animation: pulse 2s infinite;
            font-weight: bold;
            cursor: pointer;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }
        
        .card-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #ffd700;
            text-align: center;
            border-bottom: 2px solid #ffd700;
            padding-bottom: 10px;
        }
        
        .btn {
            background: linear-gradient(135deg, #3a2a4d 0%, #2a1a3d 100%);
            border: 2px solid #ffd700;
            color: white;
            padding: 18px 25px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
            font-size: 18px;
            transition: transform 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn:active {
            transform: scale(0.97);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%);
        }
        
        .btn-gold {
            background: linear-gradient(135deg, #ffd700 0%, #b8860b 100%);
            color: black;
            font-weight: bold;
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);
            color: white;
        }
        
        .input-field {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 30px;
            padding: 15px 20px;
            width: 100%;
            margin: 10px 0;
            color: white;
            font-size: 16px;
            outline: none;
        }
        
        .input-field:focus {
            border-color: #ffd700;
        }
        
        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        .auth-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100%;
            padding: 20px;
        }
        
        .auth-title {
            font-size: 32px;
            font-weight: bold;
            color: #ffd700;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .auth-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            border: 2px solid #ffd700;
            margin-bottom: 20px;
        }
        
        .bottom-nav {
            display: flex;
            background: rgba(0, 0, 0, 0.9);
            padding: 10px 5px;
            gap: 5px;
            border-top: 3px solid #ffd700;
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            white-space: nowrap;
        }
        
        .bottom-nav::-webkit-scrollbar {
            display: none;
        }
        
        .nav-item {
            flex: 0 0 auto;
            text-align: center;
            padding: 12px 15px;
            color: rgba(255, 255, 255, 0.6);
            border-radius: 15px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.3s;
            min-width: 70px;
        }
        
        .nav-item span {
            font-size: 22px;
            display: block;
            margin-bottom: 5px;
        }
        
        .nav-item.active {
            color: #ffd700;
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid #ffd700;
        }
        
        .shop-item {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }
        
        .item-info {
            flex: 1;
        }
        
        .item-name {
            font-weight: bold;
            color: #ffd700;
            font-size: 18px;
            margin-bottom: 5px;
        }
        
        .item-price {
            color: #4CAF50;
            font-weight: bold;
            font-size: 16px;
        }
        
        .buy-btn {
            background: linear-gradient(135deg, #4a2a6a 0%, #3a1a5a 100%);
            border: 2px solid #ffd700;
            color: white;
            padding: 15px 25px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .property-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .property-category {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 20px;
            padding: 25px 10px;
            text-align: center;
            cursor: pointer;
            border: 2px solid rgba(255, 215, 0, 0.4);
        }
        
        .property-category span {
            font-size: 48px;
            display: block;
            margin-bottom: 15px;
        }
        
        .category-name {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 5px;
        }
        
        .category-count {
            font-size: 16px;
            color: #ffd700;
            font-weight: bold;
        }
        
        .property-item {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }
        
        .property-emoji {
            font-size: 42px;
            width: 70px;
            text-align: center;
        }
        
        .property-details {
            flex: 1;
        }
        
        .property-title {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 5px;
        }
        
        .property-price {
            color: #ffd700;
            font-size: 16px;
        }
        
        .property-income {
            color: #4CAF50;
            font-size: 14px;
        }
        
        .property-owned {
            background: #2e7d32;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
        }
        
        .business-item {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 15px;
            cursor: pointer;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }
        
        .business-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        
        .business-name {
            font-weight: bold;
            color: #ffd700;
            font-size: 20px;
        }
        
        .business-level {
            color: #4CAF50;
            font-size: 16px;
            font-weight: bold;
        }
        
        .business-stats {
            display: flex;
            justify-content: space-between;
            font-size: 15px;
            margin: 10px 0;
        }
        
        .business-progress {
            background: rgba(255, 255, 255, 0.15);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin: 10px 0;
        }
        
        .business-bar {
            height: 100%;
            background: #ffd700;
            width: 0%;
        }
        
        .upgrade-time {
            font-size: 14px;
            color: #ff9800;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #1a1025;
            border-radius: 30px;
            padding: 30px;
            max-width: 350px;
            width: 90%;
            color: white;
            border: 3px solid #ffd700;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #ffd700;
            text-align: center;
        }
        
        .close-btn {
            background: #f44336;
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            text-align: center;
            margin-top: 15px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            border: 1px solid #ffd700;
        }
        
        .sell-btn {
            background: #ff9800;
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            text-align: center;
            margin-top: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            border: 1px solid #ffd700;
        }
        
        .hidden {
            display: none !important;
        }
        
        /* Floating effect for click */
        .floating-effect {
            position: fixed;
            color: #ffd700;
            font-weight: bold;
            font-size: 24px;
            pointer-events: none;
            z-index: 9999;
            text-shadow: 0 0 10px #ffaa00;
            animation: floatUp 1s ease-out forwards;
        }
        
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
        }
        
        /* Settings */
        .settings-group {
            margin-bottom: 20px;
        }
        .settings-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            margin-bottom: 10px;
        }
        .settings-label {
            font-size: 16px;
        }
        .settings-switch {
            width: 50px;
            height: 26px;
            background: rgba(255,255,255,0.2);
            border-radius: 30px;
            position: relative;
            cursor: pointer;
            border: 2px solid #ffd700;
        }
        .settings-switch.active {
            background: #ffd700;
        }
        .settings-switch::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            top: 0;
            left: 0;
            transition: 0.2s;
        }
        .settings-switch.active::after {
            left: 24px;
        }
        .info-text {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            text-align: center;
            margin: 10px 0;
        }
        .footer-link {
            color: #ffd700;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
        }
        
        /* Cloud storage */
        .cloud-badge {
            background: rgba(0, 150, 255, 0.2);
            border: 2px solid #0099ff;
            border-radius: 30px;
            padding: 5px 15px;
            font-size: 12px;
            color: #0099ff;
            margin-left: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header" id="header" style="display: none;">
            <div class="username" id="username" onclick="showNicknameModal()">
                👑 ЗАГРУЗКА...
                <span class="cloud-badge" id="cloudBadge" style="display:none;">☁️ ОБЛАКО</span>
            </div>
            <div class="offline-badge" id="offlineBadge" style="display:none;">⏱️ ОФФЛАЙН ДОХОД</div>
            
            <div class="balance-container">
                <div class="balance-box">
                    <div class="balance-label">💰 МОНЕТЫ</div>
                    <div class="balance-value" id="balance">0</div>
                </div>
                <div class="balance-box">
                    <div class="balance-label">💎 АЛМАЗЫ</div>
                    <div class="balance-value" id="diamonds">10</div>
                </div>
                <div class="balance-box">
                    <div class="balance-label">📊 УРОВЕНЬ</div>
                    <div class="balance-value" id="level">1</div>
                </div>
            </div>
            
            <div class="level-bar">
                <div class="level-progress" id="levelProgress"></div>
            </div>
        </div>
        
        <div class="content" id="content"></div>
        
        <div class="bottom-nav" id="bottomNav" style="display: none;">
            <div class="nav-item active" data-tab="home"><span>🏠</span>ГЛАВНАЯ</div>
            <div class="nav-item" data-tab="mybusiness"><span>💼</span>БИЗНЕСЫ</div>
            <div class="nav-item" data-tab="property"><span>🏰</span>НЕДВИЖ.</div>
            <div class="nav-item" data-tab="shop"><span>🏪</span>МАГАЗИН</div>
            <div class="nav-item" data-tab="stats"><span>📊</span>СТАТИС.</div>
            <div class="nav-item" data-tab="settings"><span>⚙️</span>НАСТР.</div>
        </div>
    </div>
    
    <div class="modal" id="businessModal">
        <div class="modal-content" id="businessModalContent"></div>
    </div>
    
    <div class="modal" id="propertyModal">
        <div class="modal-content" id="propertyModalContent"></div>
    </div>
    
    <div class="modal" id="nicknameModal">
        <div class="modal-content">
            <div class="modal-title">✏️ ИЗМЕНИТЬ НИК</div>
            <input type="text" class="input-field" id="nicknameInput" placeholder="Введите новый ник" maxlength="20">
            <div class="btn btn-gold" onclick="saveNickname()">СОХРАНИТЬ</div>
            <div class="close-btn" onclick="closeNicknameModal()">ОТМЕНА</div>
        </div>
    </div>
    
    <div class="modal" id="authModal">
        <div class="modal-content">
            <div class="modal-title">🔐 РЕГИСТРАЦИЯ</div>
            <div style="text-align:center; margin:20px 0;">
                <div style="font-size:48px;">👤</div>
            </div>
            <input type="text" class="input-field" id="regLogin" placeholder="Придумайте логин" maxlength="20">
            <input type="password" class="input-field" id="regPassword" placeholder="Придумайте пароль" maxlength="30">
            <div class="btn btn-gold" onclick="register()">🔐 ЗАРЕГИСТРИРОВАТЬСЯ</div>
            <div style="margin:15px 0; text-align:center; color:#ffd700;">или</div>
            <input type="text" class="input-field" id="loginLogin" placeholder="Ваш логин">
            <input type="password" class="input-field" id="loginPassword" placeholder="Ваш пароль">
            <div class="btn" onclick="login()">🔑 ВОЙТИ</div>
            <div style="margin-top:15px; font-size:12px; color:rgba(255,255,255,0.5); text-align:center;">
                Ваши данные сохранятся в облаке и не пропадут после переустановки
            </div>
        </div>
    </div>
    
    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); }
        
        const APP_VERSION = '1.0.5';
        let usersDatabase = {};
        let currentUser = null, currentUserLogin = null, gameState = null, settings = { soundEnabled: true, effectsEnabled: true };
        
        function loadUsersDatabase() {
            const saved = localStorage.getItem('imperiaUsersDB');
            usersDatabase = saved ? (JSON.parse(saved) || {}) : {};
        }
        function saveUsersDatabase() { localStorage.setItem('imperiaUsersDB', JSON.stringify(usersDatabase)); }
        
        const businessTemplates = [
            { id: 0, name: "🚕 ТАКСОПАРК", baseIncome: 1, baseUpgradeCost: 1000, upgradeTime: 30, maxLevel: 20 },
            { id: 1, name: "🍔 РЕСТОРАН", baseIncome: 2, baseUpgradeCost: 5000, upgradeTime: 60, maxLevel: 20 },
            { id: 2, name: "⛽ ЗАПРАВКА", baseIncome: 5, baseUpgradeCost: 25000, upgradeTime: 120, maxLevel: 20 },
            { id: 3, name: "🏭 ЗАВОД", baseIncome: 10, baseUpgradeCost: 100000, upgradeTime: 180, maxLevel: 20 },
            { id: 4, name: "🏨 ОТЕЛЬ", baseIncome: 20, baseUpgradeCost: 500000, upgradeTime: 300, maxLevel: 20 },
            { id: 5, name: "🎰 КАЗИНО", baseIncome: 50, baseUpgradeCost: 2500000, upgradeTime: 600, maxLevel: 20 },
            { id: 6, name: "🏦 БАНК", baseIncome: 100, baseUpgradeCost: 10000000, upgradeTime: 1200, maxLevel: 20 },
            { id: 7, name: "🛳️ ПОРТ", baseIncome: 200, baseUpgradeCost: 50000000, upgradeTime: 2400, maxLevel: 20 },
            { id: 8, name: "✈️ АЭРОПОРТ", baseIncome: 500, baseUpgradeCost: 250000000, upgradeTime: 4800, maxLevel: 20 },
            { id: 9, name: "🏛️ ИМПЕРИЯ", baseIncome: 1000, baseUpgradeCost: 1000000000, upgradeTime: 9600, maxLevel: 20 }
        ];
        
        const upgradePrices = {
            clickPower: [1000, 5000, 25000, 125000, 625000],
            autoClicker: [2000, 10000, 50000, 250000, 1250000],
            crit: [5000, 25000, 125000, 625000, 3125000]
        };
        
        function formatNumber(num) { return Math.floor(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
        
        function calculateOfflineEarnings() {
            if (!gameState) return;
            const now = Date.now(), lastOnline = gameState.lastOnlineTime || now, secondsPassed = Math.floor((now - lastOnline) / 1000);
            if (secondsPassed > 10) {
                let income = (gameState.autoClickerLevel || 0) * secondsPassed;
                (gameState.myBusinesses || []).forEach(b => {
                    const t = businessTemplates[b.templateId];
                    if (b.level > 0 && t) { let inc = t.baseIncome * b.level * secondsPassed; income += inc; b.totalEarned = (b.totalEarned || 0) + inc; }
                });
                [(gameState.houses||[]), (gameState.cars||[]), (gameState.planes||[]), (gameState.ships||[])].forEach(arr => arr.forEach(p => { if (p?.owned) income += (p.income/3600) * secondsPassed; }));
                if (income > 0) {
                    let earned = Math.floor(income);
                    gameState.balance = (gameState.balance||0) + earned;
                    gameState.totalEarned = (gameState.totalEarned||0) + earned;
                    let m = Math.floor(secondsPassed/60), s = secondsPassed%60;
                    alert(`⏱️ ВАС НЕ БЫЛО ${m} МИН ${s} СЕК\n💰 ЗАРАБОТАНО: ${formatNumber(earned)} МОНЕТ!`);
                    let b = document.getElementById('offlineBadge');
                    if (b) { b.style.display = 'inline-block'; b.textContent = `⏱️ +${formatNumber(earned)} ЗА ОФФЛАЙН`; setTimeout(() => b.style.display = 'none', 5000); }
                }
            }
            gameState.lastOnlineTime = now;
        }

        function handleClick(e) {
            if (!currentUser||!gameState) return;

            let earned = Math.floor(power);

            gameState.totalEarned = (gameState.totalEarned||0)+earned;
            gameState.exp = (gameState.exp||0)+earned/100;
            while (gameState.exp >= (gameState.level||1)*1000) {
                gameState.exp -= (gameState.level||1)*1000;
                gameState.level = (gameState.level||1)+1;
                gameState.diamonds = (gameState.diamonds||0)+(gameState.level*5);

            h+=`<div class="shop-item"><div class="item-info"><div class="item-name">💎 ОБМЕН АЛМАЗОВ</div><div class="item-desc">1💎 = 1000💰</div></div><button class="buy-btn buy-btn-diamond" onclick="exchangeDiamonds()">ОБМЕН</button></div></div>`;
            c.innerHTML = h;
        }
        
        function buyUpgrade(t) {
            let l = gameState[t+'Level']||0; if(l>=5) return;
            let p = upgradePrices[t][l];
            if ((gameState.balance||0) < p) return alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
            gameState.balance -= p; gameState[t+'Level'] = l+1;
            saveGame(); updateUI(); renderCurrentTab(); playClickSound();
        }
        
        function exchangeDiamonds() {
            if ((gameState.diamonds||0) < 1) return alert('❌ НЕТ АЛМАЗОВ!');
            gameState.diamonds--; gameState.balance = (gameState.balance||0)+1000;
            saveGame(); updateUI(); renderCurrentTab(); playClickSound();
        }
        
        function renderStats(c) {
            let inc = gameState.autoClickerLevel||0;
            (gameState.myBusinesses||[]).forEach(b=>{let t=businessTemplates[b.templateId]; if(b.level>0&&t) inc+=t.baseIncome*b.level;});
            let biz = gameState.myBusinesses?.length||0;
            let prop = [...(gameState.houses||[]),...(gameState.cars||[]),...(gameState.planes||[]),...(gameState.ships||[])].filter(x=>x&&x.owned).length;
            c.innerHTML = `<div class="card"><div class="card-title">📊 СТАТИСТИКА</div><div class="property-item" style="justify-content:space-between;"><span>👆 КЛИКОВ</span><span style="color:#ffd700;">${formatNumber(gameState.totalClicks||0)}</span></div><div class="property-item" style="justify-content:space-between;"><span>💰 ЗАРАБОТАНО</span><span style="color:#ffd700;">${formatNumber(gameState.totalEarned||0)}</span></div><div class="property-item" style="justify-content:space-between;"><span>⏱️ ДОХОД/СЕК</span><span style="color:#ffd700;">${Math.floor(inc)}</span></div><div class="property-item" style="justify-content:space-between;"><span>💼 БИЗНЕСОВ</span><span style="color:#ffd700;">${biz}/100</span></div><div class="property-item" style="justify-content:space-between;"><span>🏠 ИМУЩЕСТВА</span><span style="color:#ffd700;">${prop}/16</span></div><div class="property-item" style="justify-content:space-between;"><span>🎮 В ИГРЕ</span><span style="color:#ffd700;">${Math.floor((gameState.playTime||0)/60)} МИН</span></div><div class="property-item" style="justify-content:space-between;"><span>💎 АЛМАЗЫ</span><span style="color:#ffd700;">${gameState.diamonds||0}</span></div><div style="margin-top:20px;"><button class="btn btn-danger" onclick="resetGame()">🔄 СБРОСИТЬ ПРОГРЕСС</button></div></div>`;
        }
        
        function renderSettings(c) {
            c.innerHTML = `<div class="card"><div class="card-title">⚙️ НАСТРОЙКИ</div><div class="settings-group"><div class="settings-item"><span class="settings-label">🔊 ЗВУК КЛИКА</span><div class="settings-switch ${settings.soundEnabled?'active':''}" onclick="toggleSound()"></div></div><div class="settings-item"><span class="settings-label">✨ ЭФФЕКТЫ</span><div class="settings-switch ${settings.effectsEnabled?'active':''}" onclick="toggleEffects()"></div></div></div><div class="settings-group"><div class="btn btn-gold" onclick="showNicknameModal()">✏️ ИЗМЕНИТЬ НИК</div><div class="btn btn-success" onclick="alert('✅ Аккаунт: '+currentUser)">☁️ МОЙ АККАУНТ</div></div><div style="margin-top:30px;text-align:center;"><div class="info-text">📅 ИЗДАНИЕ 2026</div><div class="info-text">👨‍💻 СОЗДАТЕЛИ: SuguruStudio</div><div class="info-text">🔧 ВЕРСИЯ: ${APP_VERSION}</div><div class="info-text"><a href="#" class="footer-link" onclick="alert('Политика конфиденциальности');return false;">🔒 ПОЛИТИКА</a></div></div></div>`;
        }
        
        function toggleSound() { settings.soundEnabled = !settings.soundEnabled; saveGame(); renderCurrentTab(); }
        function toggleEffects() { settings.effectsEnabled = !settings.effectsEnabled; saveGame(); renderCurrentTab(); }
        function showNicknameModal() { document.getElementById('nicknameInput').value = currentUser||''; document.getElementById('nicknameModal').classList.add('active'); }
        function closeNicknameModal() { document.getElementById('nicknameModal').classList.remove('active'); }
        
        function saveNickname() {
            let n = document.getElementById('nicknameInput').value.trim(); if(!n) return;
            if (usersDatabase[n] && n!==currentUser) return alert('❌ Логин занят!');
            if (currentUserLogin) {
                let d = usersDatabase[currentUserLogin]; delete usersDatabase[currentUserLogin];
                usersDatabase[n] = d; currentUserLogin = currentUser = n; saveUsersDatabase();
            }
            document.getElementById('username').innerHTML = `👑 ${n} <span class="cloud-badge">☁️ ОБЛАКО</span>`;
            saveGame(); closeNicknameModal(); renderCurrentTab();
        }
        
        function resetGame() {
            if (!confirm('Сбросить прогресс?')) return;
            localStorage.removeItem('imperiaClickerLocal');
            if (currentUserLogin) { let p = usersDatabase[currentUserLogin].password; createNewUser(currentUserLogin, p); startGame(); }
            else location.reload();
        }
        
        setInterval(()=>{
            if (!currentUser||!gameState) return;
            let inc = gameState.autoClickerLevel||0;
            (gameState.myBusinesses||[]).forEach(b=>{let t=businessTemplates[b.templateId]; if(b.level>0&&t){let a=t.baseIncome*b.level; inc+=a; b.totalEarned=(b.totalEarned||0)+a;}});
            if (inc>0) { gameState.balance=(gameState.balance||0)+inc; gameState.totalEarned=(gameState.totalEarned||0)+inc; }
            gameState.playTime = (gameState.playTime||0)+1;
            updateUI(); saveGame();
        },1000);
        
        document.querySelectorAll('.nav-item').forEach(i=>i.addEventListener('click',function(){if(!currentUser||!gameState)return; document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active')); this.classList.add('active'); renderTab(this.dataset.tab);}));
        
        window.onload = function() {
            loadUsersDatabase();
            if (loadLocalGame()) { startGame(); }
            else showAuthScreen();
            window.register=register; window.login=login; window.showAuthScreen=showAuthScreen; window.showNicknameModal=showNicknameModal; window.closeNicknameModal=closeNicknameModal; window.saveNickname=saveNickname; window.toggleSound=toggleSound; window.toggleEffects=toggleEffects; window.handleClick=handleClick; window.openBuyBusinessModal=openBuyBusinessModal; window.buyBusinessFromModal=buyBusinessFromModal; window.openBusiness=openBusiness; window.startUpgrade=startUpgrade; window.sellBusiness=sellBusiness; window.closeBusinessModal=closeBusinessModal; window.showPropertyCategory=showPropertyCategory; window.buyProperty=buyProperty; window.closePropertyModal=closePropertyModal; window.showGarage=showGarage; window.showMyHouses=showMyHouses; window.showMyPlanes=showMyPlanes; window.showMyShips=showMyShips; window.buyUpgrade=buyUpgrade; window.exchangeDiamonds=exchangeDiamonds; window.resetGame=resetGame;
            setInterval(checkBusinessUpgrades,1000);
        };
    </script>
</body>
</html>
