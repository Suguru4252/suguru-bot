<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IMPERIA CLICKER 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            overscroll-behavior: none;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            touch-action: pan-y pinch-zoom;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a050f 0%, #1a1025 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5px;
        }
        
        .app-container {
            width: 100%;
            max-width: 400px;
            height: 98vh;
            background: rgba(10, 5, 20, 0.97);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            border: 2px solid #ffd700;
            overscroll-behavior: contain;
            transition: all 0.5s;
            position: relative;
        }
        
        .app-container.admin-mode {
            border: 4px solid #ff0000;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.5);
            animation: adminBorderPulse 2s infinite;
        }
        
        .app-container.admin-mode::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(
                45deg,
                rgba(255, 0, 0, 0.1) 0px,
                rgba(255,  , 0, 0.1) 20px,
                transparent 20px,
                transparent 40px
            );
            animation: adminStripes 20s linear infinite;
            pointer-events: none;
            z-index: 9999;
        }
        
        @keyframes adminStripes {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes adminBorderPulse {
            0% { border-color: #ff0000; box-shadow: 0 0 30px #ff0000; }
            50% { border-color: #ff6666; box-shadow: 0 0 60px #ff0000; }
            100% { border-color: #ff0000; box-shadow: 0 0 30px #ff0000; }
        }
        
        .header {
            background: linear-gradient(135deg, #2a1b3d 0%, #1a0f2a 100%);
            color: white;
            padding: 15px;
            text-align: center;
            border-bottom: 3px solid #ffd700;
            flex-shrink: 0;
            transition: all 0.5s;
        }
        
        .header.admin-mode {
            border-bottom: 3px solid #ff0000;
            background: linear-gradient(135deg, #3a1a1a 0%, #2a0f0f 100%);
        }
        
        .username {
            font-size: 16px;
            color: #ffd700;
            font-weight: bold;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 30px;
            background: rgba(0,0,0,0.3);
            cursor: pointer;
        }
        
        .admin-badge {
            background: linear-gradient(135deg, #ff0000, #990000);
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            margin-left: 10px;
            display: inline-block;
            border: 1px solid #ff6666;
            animation: adminGlow 1s infinite;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
        }
        
        @keyframes adminGlow {
            0% { box-shadow: 0 0 5px #ff0000; }
            50% { box-shadow: 0 0 20px #ff0000; }
            100% { box-shadow: 0 0 5px #ff0000; }
        }
        
        .special-badge {
            background: linear-gradient(135deg, #ff00ff, #ffd700);
            color: black;
            padding: 2px 8px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 8px;
            display: inline-block;
            border: 1px solid gold;
            animation: specialGlow 2s infinite;
        }
        
        @keyframes specialGlow {
            0% { box-shadow: 0 0 5px #ff00ff; }
            50% { box-shadow: 0 0 15px #ff00ff; }
            100% { box-shadow: 0 0 5px #ff00ff; }
        }
        
        .admin-grant-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,0,0,0.3) 0%, transparent 70%);
            animation: grantFlash 2s ease-out;
            pointer-events: none;
            z-index: 10000;
        }
        
        @keyframes grantFlash {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(2); }
        }
        
        .offline-badge {
            background: rgba(255, 215, 0, 0.25);
            border: 2px solid #ffd700;
            border-radius: 30px;
            padding: 8px 15px;
            font-size: 14px;
            display: inline-block;
            color: #ffd700;
            margin: 5px 0;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }
        
        .balance-container {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin: 15px 0;
        }
        
        .balance-box {
            background: rgba(0, 0, 0, 0.6);
            padding: 12px 5px;
            border-radius: 15px;
            flex: 1;
            border: 2px solid rgba(255, 215, 0, 0.5);
        }
        
        .balance-label {
            font-size: 11px;
            opacity: 0.9;
        }
        
        .balance-value {
            font-size: 16px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .level-bar {
            background: rgba(255, 255, 255, 0.2);
            height: 8px;
            border-radius: 4px;
            margin: 10px 0;
            overflow: hidden;
        }
        
        .level-progress {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffaa00);
            width: 0%;
            border-radius: 4px;
        }
        
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            color: white;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }
        
        .content::-webkit-scrollbar {
            display: none;
        }
        
        .clicker-area {
            text-align: center;
            cursor: pointer;
        }
        
        .click-btn {
            background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b);
            border: none;
            border-radius: 50%;
            width: 200px;
            height: 200px;
            font-size: 60px;
            color: white;
            margin: 20px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 4px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.6);
            cursor: pointer;
            position: relative;
            z-index: 5;
            pointer-events: auto;
            transition: transform 0.1s;
        }
        
        .click-btn:active {
            transform: scale(0.95);
        }
        
        .click-btn span {
            font-size: 20px;
            margin-top: 10px;
        }
        
        .per-second {
            color: #4CAF50;
            font-size: 18px;
            margin: 10px 0;
            font-weight: bold;
            cursor: pointer;
        }
        
        .offline-earnings {
            background: rgba(255, 215, 0, 0.15);
            border: 2px solid #ffd700;
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
            font-size: 16px;
            animation: pulse 2s infinite;
            font-weight: bold;
            cursor: pointer;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }
        
        .card-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #ffd700;
            text-align: center;
            border-bottom: 2px solid #ffd700;
            padding-bottom: 10px;
        }
        
        .btn {
            background: linear-gradient(135deg, #3a2a4d 0%, #2a1a3d 100%);
            border: 2px solid #ffd700;
            color: white;
            padding: 18px 25px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
            font-size: 18px;
            transition: transform 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn:active {
            transform: scale(0.97);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%);
        }
        
        .btn-gold {
            background: linear-gradient(135deg, #ffd700 0%, #b8860b 100%);
            color: black;
            font-weight: bold;
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);
            color: white;
        }
        
        .btn-admin {
            background: linear-gradient(135deg, #ff0000 0%, #990000 100%);
            border: 2px solid #ff6666;
            color: white;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(255,0,0,0.5);
            margin: 5px 0;
            padding: 12px 15px;
            font-size: 14px;
        }
        
        .btn-admin-small {
            background: linear-gradient(135deg, #ff3333 0%, #cc0000 100%);
            border: 2px solid #ff9999;
            color: white;
            font-weight: bold;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            margin: 2px;
        }
        
        .btn-admin:hover {
            transform: scale(0.98);
            background: linear-gradient(135deg, #cc0000 0%, #880000 100%);
        }
        
        .business-item {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 15px;
            cursor: pointer;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }
        
        .business-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        
        .business-name {
            font-weight: bold;
            color: #ffd700;
            font-size: 20px;
        }
        
        .business-level {
            color: #4CAF50;
            font-size: 16px;
            font-weight: bold;
        }
        
        .business-stats {
            display: flex;
            justify-content: space-between;
            font-size: 15px;
            margin: 10px 0;
        }
        
        .business-progress {
            background: rgba(255, 255, 255, 0.15);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin: 10px 0;
        }
        
        .business-bar {
            height: 100%;
            background: #ffd700;
            width: 0%;
        }
        
        .upgrade-time {
            font-size: 14px;
            color: #ff9800;
        }
        
        .crypto-item {
            background: rgba(0, 200, 83, 0.1);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid #00c853;
        }
        
        .crypto-name {
            font-weight: bold;
            color: #00c853;
            font-size: 18px;
        }
        
        .crypto-price {
            color: #ffd700;
            font-size: 16px;
        }
        
        .crypto-owned {
            color: #4CAF50;
            font-size: 14px;
        }
        
        .crypto-profit {
            color: #ff9800;
            font-size: 12px;
        }
        
        .crypto-actions {
            display: flex;
            gap: 5px;
        }
        
        .crypto-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid #00c853;
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
        }
        
        .crypto-btn:active {
            background: rgba(0,200,83,0.3);
        }
        
        .collection-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .collection-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 15px 5px;
            text-align: center;
            cursor: pointer;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }
        
        .collection-item span {
            font-size: 32px;
            display: block;
            margin-bottom: 5px;
        }
        
        .collection-name {
            font-size: 12px;
            color: #ffd700;
        }
        
        .collection-owned {
            font-size: 11px;
            color: #4CAF50;
        }
        
        .collection-detail {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }
        
        .collection-emoji {
            font-size: 42px;
            width: 70px;
            text-align: center;
        }
        
        .collection-details {
            flex: 1;
        }
        
        .collection-title {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 5px;
        }
        
        .collection-price {
            color: #ffd700;
            font-size: 16px;
        }
        
        .special-item {
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,0,255,0.2));
            border: 3px solid #ff00ff;
            border-radius: 20px;
            padding: 25px;
            margin: 20px 0;
            text-align: center;
            animation: specialGlow 2s infinite;
        }
        
        .special-emoji {
            font-size: 64px;
            margin-bottom: 10px;
        }
        
        .special-title {
            font-size: 24px;
            font-weight: bold;
            color: #ff00ff;
            margin-bottom: 10px;
        }
        
        .special-price {
            font-size: 18px;
            color: #ffd700;
            margin-bottom: 15px;
        }
        
        .special-income {
            font-size: 16px;
            color: #4CAF50;
            margin-bottom: 15px;
        }
        
        .special-owned {
            background: #ff00ff;
            color: black;
            padding: 10px;
            border-radius: 30px;
            font-weight: bold;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #1a1025;
            border-radius: 30px;
            padding: 30px;
            max-width: 350px;
            width: 90%;
            color: white;
            border: 3px solid #ffd700;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-content.admin-modal {
            border: 3px solid #ff0000;
            box-shadow: 0 0 30px #ff0000;
        }
        
        .modal-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #ffd700;
            text-align: center;
            border-bottom: 2px solid #ffd700;
            padding-bottom: 10px;
        }
        
        .modal-title.admin-title {
            color: #ff0000;
            border-bottom: 2px solid #ff0000;
            text-shadow: 0 0 10px #ff0000;
        }
        
        .close-btn {
            background: #f44336;
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            text-align: center;
            margin-top: 15px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            border: 1px solid #ffd700;
        }
        
        .close-btn.admin-close {
            background: #ff0000;
            border-color: #ff6666;
        }
        
        .sell-btn {
            background: #ff9800;
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            text-align: center;
            margin-top: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            border: 1px solid #ffd700;
        }
        
        .top-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            transition: all 0.3s;
        }
        
        .top-item.banned {
            opacity: 0.5;
            filter: grayscale(0.8);
            background: rgba(100, 0, 0, 0.2);
            border-color: #ff0000;
        }
        
        .top-rank {
            width: 40px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
        }
        
        .top-rank-1 { color: #ffd700; }
        .top-rank-2 { color: #c0c0c0; }
        .top-rank-3 { color: #cd7f32; }
        
        .top-name {
            flex: 1;
            font-size: 16px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .top-special-icon {
            font-size: 16px;
            animation: specialGlow 2s infinite;
        }
        
        .top-money {
            font-size: 16px;
            color: #ffd700;
            font-weight: bold;
            margin-left: 10px;
        }
        
        .top-banned-icon {
            color: #ff0000;
            font-size: 14px;
            margin-left: 5px;
        }
        
        .top-update-time {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            text-align: center;
            margin-top: 10px;
        }
        
        .admin-panel {
            background: rgba(100, 0, 0, 0.3);
            border: 2px solid #ff0000;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .admin-input {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #ff0000;
            border-radius: 30px;
            padding: 12px 15px;
            width: 100%;
            margin: 8px 0;
            color: white;
            font-size: 14px;
            outline: none;
        }
        
        .admin-input:focus {
            border-color: #ff6666;
            box-shadow: 0 0 20px rgba(255,0,0,0.5);
        }
        
        .admin-select {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #ff0000;
            border-radius: 30px;
            padding: 12px 15px;
            width: 100%;
            margin: 8px 0;
            color: white;
            font-size: 14px;
            outline: none;
        }
        
        .admin-select option {
            background: #1a1025;
            color: white;
        }
        
        .admin-section {
            background: rgba(255, 0, 0, 0.1);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #ff0000;
        }
        
        .admin-section-title {
            color: #ff0000;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 15px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .admin-button-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin: 10px 0;
        }
        
        .hidden {
            display: none !important;
        }
        
        .floating-effect {
            position: fixed;
            color: #ffd700;
            font-weight: bold;
            font-size: 24px;
            pointer-events: none;
            z-index: 9999;
            text-shadow: 0 0 10px #ffaa00;
            animation: floatUp 1s ease-out forwards;
        }
        
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
        }
        
        .settings-group {
            margin-bottom: 20px;
        }
        .settings-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            margin-bottom: 10px;
        }
        .settings-label {
            font-size: 16px;
        }
        .settings-switch {
            width: 50px;
            height: 26px;
            background: rgba(255,255,255,0.2);
            border-radius: 30px;
            position: relative;
            cursor: pointer;
            border: 2px solid #ffd700;
        }
        .settings-switch.active {
            background: #ffd700;
        }
        .settings-switch::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            top: 0;
            left: 0;
            transition: 0.2s;
        }
        .settings-switch.active::after {
            left: 24px;
        }
        .info-text {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            text-align: center;
            margin: 10px 0;
        }
        .footer-link {
            color: #ffd700;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
        }
        
        .version-text {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            text-align: center;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="app-container" id="appContainer">
        <div class="header" id="header">
            <div class="username" id="username" onclick="showNicknameModal()">
                👑 ЗАГРУЗКА...
            </div>
            <div class="offline-badge" id="offlineBadge" style="display:none;">⏱️ ОФФЛАЙН ДОХОД</div>
            
            <div class="balance-container">
                <div class="balance-box">
                    <div class="balance-label">💰 МОНЕТЫ</div>
                    <div class="balance-value" id="balance">0</div>
                </div>
                <div class="balance-box">
                    <div class="balance-label">💎 АЛМАЗЫ</div>
                    <div class="balance-value" id="diamonds">10</div>
                </div>
                <div class="balance-box">
                    <div class="balance-label">📊 УРОВЕНЬ</div>
                    <div class="balance-value" id="level">1</div>
                </div>
            </div>
            
            <div class="level-bar">
                <div class="level-progress" id="levelProgress"></div>
            </div>
        </div>
        
        <div class="content" id="content"></div>

            if (num >= 1e12) return (num / 1e12).toFixed(2) + 'T';
            if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(2) + 'K';
            return Math.floor(num).toString();
        }
        
        function formatFullNumber(num) {
            return Math.floor(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }
        
        // ========== ГЛОБАЛЬНЫЙ ТОП ==========
        function loadGlobalPlayers() {
            const saved = localStorage.getItem('imperiaGlobalPlayers');
            if (saved) {
                try {
                    globalPlayers = JSON.parse(saved);
                } catch(e) {
                    globalPlayers = [];
                }
            } else {
                globalPlayers = [];
            }
            globalPlayers = globalPlayers.filter(p => p.nickname !== ADMIN_NICK);
        }
        
        function saveGlobalPlayers() {
            const filtered = globalPlayers.filter(p => p.nickname !== ADMIN_NICK);
            filtered.sort((a, b) => b.totalEarned - a.totalEarned);
            globalPlayers = filtered.slice(0, 100);
            localStorage.setItem('imperiaGlobalPlayers', JSON.stringify(globalPlayers));
        }
        
        function updateGlobalPlayer() {
            if (!gameState) return;
            if (currentUser === ADMIN_NICK) return;
            if (bannedPlayers.includes(currentUserId)) return;
            
            const existingIndex = globalPlayers.findIndex(p => p.deviceId === currentUserId);
            const playerData = {
                deviceId: currentUserId,
                nickname: currentUser,
                totalEarned: gameState.totalEarned || 0,
                hasSpecialItem: gameState.specialItem?.owned || false,
                lastUpdate: Date.now()
            };
            
            if (existingIndex >= 0) {
                globalPlayers[existingIndex] = playerData;
            } else {
                globalPlayers.push(playerData);
            }
            saveGlobalPlayers();
        }
        
        function getPlayerRank() {
            const index = globalPlayers.findIndex(p => p.deviceId === currentUserId);
            return index >= 0 ? index + 1 : globalPlayers.length + 1;
        }
        
        // ========== ЗАГРУЗКА/СОХРАНЕНИЕ ==========
        function loadGame() {
            const saved = localStorage.getItem('imperiaSave_' + currentUserId);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    gameState = data.gameState;
                    settings = data.settings || { soundEnabled: true, effectsEnabled: true };
                    currentUser = data.nickname || generateRandomNickname();
                    
                    if (!gameState.collections) {
                        gameState.collections = JSON.parse(JSON.stringify(collectionItems));
                    }
                    if (!gameState.crypto) {
                        gameState.crypto = cryptoCurrencies.map(c => ({ id: c.id, owned: 0 }));
                    }
                    if (!gameState.cryptoPrices) {
                        cryptoPrices = cryptoCurrencies.map(c => c.basePrice);
                        gameState.cryptoPrices = cryptoPrices;
                    } else {
                        cryptoPrices = gameState.cryptoPrices;
                    }
                    if (gameState.specialItem === undefined) {
                        gameState.specialItem = { owned: false, revealed: false };
                    }
                    
                    const now = Date.now();
                    const lastOnline = gameState.lastOnlineTime || now;
                    const secondsPassed = Math.floor((now - lastOnline) / 1000);
                    
                    if (secondsPassed > 10) {
                        calculateOfflineEarnings(secondsPassed);
                    }
                    gameState.lastOnlineTime = now;
                    return true;
                } catch(e) {
                    return false;
                }
            }
            return false;
        }
        
        function saveGame() {
            if (gameState) {
                gameState.lastOnlineTime = Date.now();
                gameState.cryptoPrices = cryptoPrices;
                const saveData = {
                    gameState: gameState,
                    settings: settings,
                    nickname: currentUser
                };
                localStorage.setItem('imperiaSave_' + currentUserId, JSON.stringify(saveData));
                updateGlobalPlayer();
            }
        }
        
        function startNewGame() {
            const randomNick = generateRandomNickname();
            currentUser = randomNick;
            
            gameState = {
                balance: 0,
                diamonds: 10,
                exp: 0,
                level: 1,
                clickPower: 1,
                clickPowerLevel: 0,
                autoClickerLevel: 0,
                critLevel: 0,
                totalClicks: 0,
                totalEarned: 0,
                playTime: 0,
                lastOnlineTime: Date.now(),
                lastWeeklyReward: 0,
                myBusinesses: [],
                collections: JSON.parse(JSON.stringify(collectionItems)),
                crypto: cryptoCurrencies.map(c => ({ id: c.id, owned: 0 })),
                cryptoPrices: cryptoCurrencies.map(c => c.basePrice),
                specialItem: { owned: false, revealed: false }
            };
            
            cryptoPrices = gameState.cryptoPrices;
            
            document.getElementById('username').innerHTML = `👑 ${currentUser}`;
            updateUI();
            renderTab('home');
            saveGame();
        }
        
        // ========== ОФФЛАЙН ДОХОД ==========
        function calculateOfflineEarnings(seconds) {
            let income = 0;
            
            if (gameState.autoClickerLevel > 0) {
                income += gameState.autoClickerLevel * seconds;
            }
            
            if (gameState.myBusinesses && gameState.myBusinesses.length > 0) {
                gameState.myBusinesses.forEach(b => {
                    const t = businessTemplates[b.templateId];
                    if (b.level > 0 && t) {
                        income += t.baseIncome * b.level * seconds;
                    }
                });
            }
            
            if (gameState.crypto && cryptoPrices) {
                gameState.crypto.forEach(c => {
                    const cryptoData = cryptoCurrencies.find(cr => cr.id === c.id);
                    if (c.owned > 0 && cryptoData) {
                        const price = cryptoPrices[c.id] || cryptoData.basePrice;
                        income += (price / 2000) * c.owned * seconds;
                    }
                });
            }
            
            if (gameState.specialItem && gameState.specialItem.owned) {
                income += 777 * seconds;
            }
            
            if (income > 0) {
                const earned = Math.floor(income);
                gameState.balance = (gameState.balance || 0) + earned;
                gameState.totalEarned = (gameState.totalEarned || 0) + earned;
                
                const minutes = Math.floor(seconds / 60);
                const secs = seconds % 60;
                
                alert(`⏱️ ОФФЛАЙН ДОХОД\nОтсутствовал: ${minutes} мин ${secs} сек\n💰 ЗАРАБОТАНО: ${formatFullNumber(earned)} монет`);
                
                const badge = document.getElementById('offlineBadge');
                if (badge) {
                    badge.style.display = 'inline-block';
                    badge.textContent = `⏱️ +${formatFullNumber(earned)} ЗА ОФФЛАЙН`;
                    setTimeout(() => badge.style.display = 'none', 5000);
                }
            }
        }
        
        // ========== ОБНОВЛЕНИЕ ЦЕН КРИПТЫ ==========
        function updateCryptoPrices() {
            cryptoPrices = cryptoPrices.map((price, i) => {
                const crypto = cryptoCurrencies[i];
                const change = (Math.random() - 0.5) * 2 * crypto.volatility;
                let newPrice = price * (1 + change);
                newPrice = Math.max(newPrice, crypto.basePrice * 0.1);
                newPrice = Math.min(newPrice, crypto.basePrice * 10);
                return Math.floor(newPrice);
            });
        }
        
        // ========== ЗВУК ==========
        function playClickSound() {
            if (!settings.soundEnabled) return;
            try {
                if (window.AudioContext || window.webkitAudioContext) {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    
                    const oscillator = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    
                    oscillator.type = 'sine';
                    oscillator.frequency.value = 523.25;
                    
                    gainNode.gain.value = 0.15;
                    gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.08);
                    
                    const oscillator2 = audioCtx.createOscillator();
                    const gainNode2 = audioCtx.createGain();
                    
                    oscillator2.type = 'triangle';
                    oscillator2.frequency.value = 659.25;
                    
                    gainNode2.gain.value = 0.1;
                    gainNode2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                    
                    oscillator2.connect(gainNode2);
                    gainNode2.connect(audioCtx.destination);
                    
                    oscillator2.start();
                    oscillator2.stop(audioCtx.currentTime + 0.08);
                }
            } catch(e) {}
        }
        
        function createFloatingEffect(x, y, text) {
            if (!settings.effectsEnabled) return;
            const el = document.createElement('div');
            el.className = 'floating-effect';
            el.textContent = text;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }
        
        function handleClick(event) {
            if (!gameState) return;
            
            let power = (gameState.clickPower || 1) * (1 + (gameState.clickPowerLevel || 0) * 0.5);
            
            if (Math.random() * 100 < (gameState.critLevel || 0) * 10) {
                power *= 10;
            }
            
            const earned = Math.floor(power);
            gameState.balance = (gameState.balance || 0) + earned;
            gameState.totalClicks = (gameState.totalClicks || 0) + 1;
            gameState.totalEarned = (gameState.totalEarned || 0) + earned;
            gameState.exp = (gameState.exp || 0) + earned / 100;
            
            while (gameState.exp >= (gameState.level || 1) * 1000) {
                gameState.exp -= (gameState.level || 1) * 1000;
                gameState.level = (gameState.level || 1) + 1;
                gameState.diamonds = (gameState.diamonds || 0) + (gameState.level * 5);
            }
            
            playClickSound();
            if (event) {
                createFloatingEffect(event.clientX, event.clientY, `+${earned}💰`);
            }
            
            updateUI();
            saveGame();
            renderCurrentTab();
        }
        
        function updateUI() {
            if (!gameState) return;
            
            document.getElementById('balance').textContent = formatFullNumber(gameState.balance || 0);
            document.getElementById('diamonds').textContent = gameState.diamonds || 0;
            document.getElementById('level').textContent = gameState.level || 1;
            
            const expNeeded = (gameState.level || 1) * 1000;
            const expPercent = ((gameState.exp || 0) / expNeeded) * 100;
            document.getElementById('levelProgress').style.width = Math.min(expPercent, 100) + '%';
        }
        
        function renderTab(tab) {
            if (!gameState) return;
            
            const content = document.getElementById('content');
            
            if (tab === 'home') {
                renderHome(content);
            } else if (tab === 'mybusiness') {
                renderMyBusiness(content);
            } else if (tab === 'crypto') {
                renderCrypto(content);
            } else if (tab === 'collection') {
                renderCollection(content);
            } else if (tab === 'shop') {
                renderShop(content);
            } else if (tab === 'top') {
                renderTop(content);
            } else if (tab === 'stats') {
                renderStats(content);
            } else if (tab === 'settings') {
                renderSettings(content);
            }
        }
        
        function renderCurrentTab() {
            const active = document.querySelector('.nav-item.active');
            if (active) renderTab(active.dataset.tab);
        }
        
        function renderHome(content) {
            const power = (gameState.clickPower || 1) * (1 + (gameState.clickPowerLevel || 0) * 0.5);
            let total = gameState.autoClickerLevel || 0;
            
            if (gameState.myBusinesses && gameState.myBusinesses.length > 0) {
                gameState.myBusinesses.forEach(b => {
                    const t = businessTemplates[b.templateId];
                    if (b.level > 0 && t) {
                        total += t.baseIncome * b.level;
                    }
                });
            }
            
            if (gameState.crypto && cryptoPrices) {
                gameState.crypto.forEach(c => {
                    if (c.owned > 0) {
                        const cryptoData = cryptoCurrencies.find(cr => cr.id === c.id);
                        if (cryptoData) {
                            const price = cryptoPrices[c.id] || cryptoData.basePrice;
                            total += (price / 2000) * c.owned;
                        }
                    }
                });
            }
            
            if (gameState.specialItem && gameState.specialItem.owned) {
                total += 777;
            }
            
            content.innerHTML = `
                <div id="home-content" onclick="handleClick(event)">
                    <div class="clicker-area">
                        <div class="per-second">⏱️ ДОХОД/СЕК: ${formatFullNumber(Math.floor(total))}</div>
                        <div class="click-btn">
                            👆
                            <span>+${formatFullNumber(Math.floor(power))}</span>
                        </div>
                        <div class="offline-earnings">
                            💰 ОФФЛАЙН ДОХОД РАБОТАЕТ
                        </div>
                    </div>
                </div>
            `;
        }
        
        function renderTop(content) {
            updateGlobalPlayer();
            
            let html = '<div class="card"><div class="card-title">🏆 ТОП-100 ИГРОКОВ</div>';
            
            if (globalPlayers.length === 0) {
                html += '<div style="text-align:center; padding:30px;">ПОКА НИКОГО НЕТ</div>';
            } else {
                const myRank = getPlayerRank();
                
                html += `
                    <div style="text-align:center; margin:10px; color:#ffd700; font-size:18px;">
                        🏅 ВАШЕ МЕСТО: ${myRank}
                    </div>
                `;
                
                html += '<div style="margin-bottom:10px; text-align:center; color:#ffd700;">ПО ОБЩЕМУ ЗАРАБОТКУ</div>';
                
                globalPlayers.slice(0, 20).forEach((player, index) => {
                    const rank = index + 1;
                    let rankClass = '';
                    if (rank === 1) rankClass = 'top-rank-1';
                    else if (rank === 2) rankClass = 'top-rank-2';
                    else if (rank === 3) rankClass = 'top-rank-3';
                    
                    const isCurrentPlayer = player.deviceId === currentUserId;
                    
                    html += `
                        <div class="top-item" style="${isCurrentPlayer ? 'background: rgba(255,215,0,0.2); border:2px solid gold;' : ''}">
                            <div class="top-rank ${rankClass}">${rank}</div>
                            <div class="top-name">
                                ${player.nickname} ${isCurrentPlayer ? '👑' : ''}
                                ${player.hasSpecialItem ? '<span class="top-special-icon">💎</span>' : ''}
                            </div>
                            <div class="top-money">${formatNumber(player.totalEarned)}💰</div>
                        </div>
                    `;
                });
                
                html += `
                    <div class="top-update-time">
                        ⏱️ Обновляется автоматически<br>
                        Всего игроков: ${globalPlayers.length}
                    </div>
                `;
            }
            
            html += '</div>';
            content.innerHTML = html;
        }
        
        function renderMyBusiness(content) {
            let html = '<div class="card"><div class="card-title">💼 МОИ БИЗНЕСЫ</div>';
            
            if (!gameState.myBusinesses || gameState.myBusinesses.length === 0) {
                html += '<div style="text-align:center; padding:30px;">У ВАС НЕТ БИЗНЕСОВ</div>';
            } else {
                gameState.myBusinesses.forEach((business, index) => {
                    const t = businessTemplates[business.templateId];
                    if (!t) return;
                    
                    const upgrading = business.upgradeEnd && business.upgradeEnd > Date.now();
                    const timeLeft = upgrading ? Math.ceil((business.upgradeEnd - Date.now()) / 1000) : 0;
                    
                    html += `
                        <div class="business-item" onclick="openBusiness(${index})">
                            <div class="business-header">
                                <span class="business-name">${t.name} #${index + 1}</span>
                                <span class="business-level">${business.level || 1}/${t.maxLevel}</span>
                            </div>
                            <div class="business-stats">
                                <span>💰 +${formatFullNumber(t.baseIncome * (business.level || 1))}/сек</span>
                                <span>📈 ${formatFullNumber(business.totalEarned || 0)}</span>
                            </div>
                            ${upgrading ? `
                                <div class="business-progress">
                                    <div class="business-bar" style="width: ${((Date.now() - (business.lastUpgrade || Date.now())) / ((business.upgradeEnd || Date.now()) - (business.lastUpgrade || Date.now())) * 100) || 0}%"></div>
                                </div>
                                <div class="upgrade-time">⏱️ УЛУЧШЕНИЕ: ${timeLeft}С</div>
                            ` : (business.level || 1) < t.maxLevel ? `
                                <div class="upgrade-time">💰 УЛУЧШИТЬ: ${formatFullNumber(business.upgradeCost || 0)}</div>
                            ` : '<div style="color:#ffd700; text-align:center;">МАКСИМАЛЬНЫЙ УРОВЕНЬ</div>'}
                        </div>
                    `;
                });
            }
            
            html += '<div class="btn btn-gold" onclick="openBuyBusinessModal()">➕ КУПИТЬ НОВЫЙ БИЗНЕС</div>';
            html += '</div>';
            content.innerHTML = html;
        }
        
        function openBuyBusinessModal() {
            const modal = document.getElementById('businessModal');
            const modalContent = document.getElementById('businessModalContent');
            
            let html = '<div class="modal-title">🏪 КУПИТЬ БИЗНЕС</div>';
            
            businessTemplates.forEach(t => {
                const ownedCount = gameState.myBusinesses ? gameState.myBusinesses.filter(b => b.templateId === t.id).length : 0;
                
                html += `
                    <div class="business-item" style="cursor:pointer;" onclick="buyBusinessFromModal(${t.id})">
                        <div class="business-header">
                            <span class="business-name">${t.name}</span>
                        </div>
                        <div class="business-stats">
                            <span>💰 ДОХОД: +${t.baseIncome}/сек</span>
                            <span>⏱️ ВРЕМЯ: ${t.upgradeTime}С</span>
                        </div>
                        <div class="business-stats">
                            <span>📊 КУПЛЕНО: ${ownedCount}/10</span>
                            <span style="color:#4CAF50;">💰 ЦЕНА: ${formatFullNumber(t.baseUpgradeCost)}</span>
                        </div>
                        ${ownedCount >= 10 ? 
                            '<div style="color:#f44336; text-align:center;">⚠️ МАКСИМУМ (10 ШТУК)</div>' : 
                            '<div class="btn btn-small" style="margin-top:10px; pointer-events:none;">КУПИТЬ</div>'
                        }
                    </div>
                `;
            });
            
            html += '<div class="close-btn" onclick="closeBusinessModal()">ЗАКРЫТЬ</div>';
            
            modalContent.innerHTML = html;
            modal.classList.add('active');
        }
        
        function buyBusinessFromModal(templateId) {
            const t = businessTemplates.find(t => t.id === templateId);
            if (!t) return;
            
            const ownedCount = gameState.myBusinesses ? gameState.myBusinesses.filter(b => b.templateId === templateId).length : 0;
            
            if (ownedCount >= 10) {
                alert('❌ НЕЛЬЗЯ КУПИТЬ БОЛЬШЕ 10!');
                return;
            }
            
            if ((gameState.balance || 0) < t.baseUpgradeCost) {
                alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
                return;
            }
            
            gameState.balance -= t.baseUpgradeCost;
            
            if (!gameState.myBusinesses) gameState.myBusinesses = [];
            
            gameState.myBusinesses.push({
                id: Date.now() + Math.random(),
                templateId: templateId,
                level: 1,
                upgradeCost: Math.floor(t.baseUpgradeCost * 2.5),
                upgradeTime: t.upgradeTime,
                upgradeEnd: 0,
                lastUpgrade: 0,
                totalEarned: 0
            });
            
            saveGame();
            updateUI();
            closeBusinessModal();
            renderCurrentTab();
            alert(`✅ Куплен ${t.name}!`);
        }
        
        function openBusiness(index) {
            const business = gameState.myBusinesses[index];
            if (!business) return;
            
            const t = businessTemplates[business.templateId];
            if (!t) return;
            
            let totalSpent = t.baseUpgradeCost;
            let currentCost = t.baseUpgradeCost;
            for (let i = 1; i < (business.level || 1); i++) {
                currentCost = Math.floor(currentCost * 2.5);
                totalSpent += currentCost;
            }
            
            const sellPrice = Math.floor(totalSpent * 0.5);
            
            const modal = document.getElementById('businessModal');
            const modalContent = document.getElementById('businessModalContent');
            
            let content = `
                <div class="modal-title">${t.name} #${index + 1}</div>
                <div style="text-align:center;">
                    <div style="font-size:48px; margin:15px;">${t.name.charAt(0)}</div>
                    <div style="margin:10px;">📊 УРОВЕНЬ: ${business.level || 1}/${t.maxLevel}</div>
                    <div style="margin:10px;">💰 ДОХОД: +${formatFullNumber(t.baseIncome * (business.level || 1))}/сек</div>
                    <div style="margin:10px;">📈 ЗАРАБОТАНО: ${formatFullNumber(business.totalEarned || 0)}</div>
                    <div style="margin:10px;">💸 ВЛОЖЕНО: ${formatFullNumber(totalSpent)}</div>
                    <div style="margin:10px;">🏷️ ПРОДАЖА: ${formatFullNumber(sellPrice)} (50%)</div>
                    <div style="margin:10px;">⏱️ ВРЕМЯ: ${business.upgradeTime || t.upgradeTime}С</div>
            `;
            
            if ((business.level || 1) < t.maxLevel) {
                if (business.upgradeEnd && business.upgradeEnd > Date.now()) {
                    const timeLeft = Math.ceil((business.upgradeEnd - Date.now()) / 1000);
                    content += `
                        <div style="margin:15px; color:#ff9800;">
                            ⏱️ УЛУЧШЕНИЕ... ${timeLeft}С
                        </div>
                    `;
                } else {
                    content += `
                        <div style="margin:15px;">
                            <div class="btn btn-gold" onclick="startUpgrade(${index})">
                                🚀 УЛУЧШИТЬ (${formatFullNumber(business.upgradeCost || 0)}💰)
                            </div>
                        </div>
                    `;
                }
            } else {
                content += '<div style="margin:15px; color:#ffd700;">✅ МАКСИМАЛЬНЫЙ УРОВЕНЬ</div>';
            }
            
            content += `
                <div style="margin:15px;">
                    <div class="sell-btn" onclick="sellBusiness(${index})">
                        💰 ПРОДАТЬ (${formatFullNumber(sellPrice)}💰)
                    </div>
                </div>
                </div>
                <div class="close-btn" onclick="closeBusinessModal()">ЗАКРЫТЬ</div>
            `;
            
            modalContent.innerHTML = content;
            modal.classList.add('active');
        }
        
        function startUpgrade(index) {
            const business = gameState.myBusinesses[index];
            if (!business) return;
            
            const t = businessTemplates[business.templateId];
            if (!t) return;
            
            if ((business.level || 1) >= t.maxLevel) {
                alert('❌ МАКСИМАЛЬНЫЙ УРОВЕНЬ!');
                return;
            }
            
            if (business.upgradeEnd && business.upgradeEnd > Date.now()) {
                alert('⏱️ УЛУЧШЕНИЕ УЖЕ ИДЕТ!');
                return;
            }
            
            if ((gameState.balance || 0) < (business.upgradeCost || 0)) {
                alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
                return;
            }
            
            gameState.balance -= (business.upgradeCost || 0);
            
            business.lastUpgrade = Date.now();
            business.upgradeEnd = Date.now() + ((business.upgradeTime || t.upgradeTime) * 1000);
            
            saveGame();
            updateUI();
            closeBusinessModal();
            renderCurrentTab();
            
            alert(`✅ Улучшение запущено на ${business.upgradeTime || t.upgradeTime} сек.`);
            
            setTimeout(() => {
                if (business.upgradeEnd && business.upgradeEnd <= Date.now() && (business.level || 1) < t.maxLevel) {
                    business.level = (business.level || 1) + 1;
                    business.upgradeCost = Math.floor((business.upgradeCost || t.baseUpgradeCost) * 2.5);
                    business.upgradeTime = Math.floor((business.upgradeTime || t.upgradeTime) * 1.3);
                    business.upgradeEnd = 0;
                    
                    saveGame();
                    updateUI();
                    renderCurrentTab();
                    
                    alert(`✅ ${t.name} улучшен до ${business.level} уровня!`);
                }
            }, (business.upgradeTime || t.upgradeTime) * 1000);
        }
        
        function sellBusiness(index) {
            const business = gameState.myBusinesses[index];
            if (!business) return;

            if (!t) return;
            
            let totalSpent = t.baseUpgradeCost;
            let currentCost = t.baseUpgradeCost;
            for (let i = 1; i < (business.level || 1); i++) {
                currentCost = Math.floor(currentCost * 2.5);
                totalSpent += currentCost;
            }
            
            const sellPrice = Math.floor(totalSpent * 0.5);
            
            if (confirm(`Продать ${t.name} за ${formatFullNumber(sellPrice)}💰?`)) {
                gameState.myBusinesses.splice(index, 1);
                gameState.balance = (gameState.balance || 0) + sellPrice;
                
                saveGame();
                updateUI();
                closeBusinessModal();
                renderCurrentTab();
                alert(`✅ Продано! +${formatFullNumber(sellPrice)}💰`);

            gameState.myBusinesses.forEach(business => {
                const t = businessTemplates[business.templateId];
                if (!t) return;
                
                if (business.upgradeEnd && business.upgradeEnd > 0 && business.upgradeEnd <= now && (business.level || 1) < t.maxLevel) {
                    business.level = (business.level || 1) + 1;
                    business.upgradeCost = Math.floor((business.upgradeCost || t.baseUpgradeCost) * 2.5);
                    business.upgradeTime = Math.floor((business.upgradeTime || t.upgradeTime) * 1.3);

        function updateTotalPrice(cryptoId, type) {

            const amount = parseInt(document.getElementById('tradeAmount')?.value) || 0;

        function executeTrade(cryptoId, type) {
            const crypto = cryptoCurrencies.find(c => c.id === cryptoId);
            const userCrypto = gameState.crypto.find(c => c.id === cryptoId);
            const currentPrice = cryptoPrices[cryptoId] || crypto.basePrice;
            const amount = parseInt(document.getElementById('tradeAmount')?.value);
            
            if (!amount || amount <= 0) {
                alert('❌ Введите корректное количество!');
                closeTradeModal();
                return;
            }
            
            if (type === 'buy') {
                const maxBuy = crypto.maxBuy - userCrypto.owned;
                
                if (amount > maxBuy) {
                    alert(`❌ Можно купить только ${formatFullNumber(maxBuy)}!`);
                    closeTradeModal();
                    return;

                const totalPrice = currentPrice * amount;
                
                if (gameState.balance < totalPrice) {
                    alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
                    closeTradeModal();
                    return;
                }
                
                gameState.balance -= totalPrice;
                userCrypto.owned += amount;
                
                saveGame();
                updateUI();
                closeTradeModal();
                renderCurrentTab();
                alert(`✅ Куплено ${amount} ${crypto.name} за ${formatFullNumber(totalPrice)}💰`);
                
            } else {
                if (amount > userCrypto.owned) {
                    alert(`❌ У вас только ${formatFullNumber(userCrypto.owned)}!`);
                    closeTradeModal();
                    return;
                }
                
                const totalPrice = currentPrice * amount;
                
                gameState.balance += totalPrice;
                userCrypto.owned -= amount;
                
                saveGame();
                updateUI();
                closeTradeModal();
                renderCurrentTab();
                alert(`✅ Продано ${amount} ${crypto.name} за ${formatFullNumber(totalPrice)}💰`);
            }

        function showNicknameModal() {
            document.getElementById('nicknameInput').value = currentUser || '';
            document.getElementById('nicknameModal').classList.add('active');

        function closeNicknameModal() {
            document.getElementById('nicknameModal').classList.remove('active');

        function saveNickname() {
            const newNick = document.getElementById('nicknameInput').value.trim();
            if (!newNick) return;
            
            const oldNick = currentUser;
            currentUser = newNick;
            
            if (currentUser === ADMIN_NICK) {
                grantAdmin();
            } else {
                if (isAdmin) {
                    isAdmin = false;
                    document.getElementById('appContainer').classList.remove('admin-mode');
                    document.getElementById('header').classList.remove('admin-mode');
                }
            }
            
            if (!isAdmin) {
                document.getElementById('username').innerHTML = `👑 ${currentUser}`;
            }
            
            const existingIndex = globalPlayers.findIndex(p => p.deviceId === currentUserId);
            if (existingIndex >= 0) {
                globalPlayers[existingIndex].nickname = currentUser;
                saveGlobalPlayers();
            }
            
            saveGame();
            closeNicknameModal();
            renderCurrentTab();
        }

        function closeAdminModal() {
            document.getElementById('adminModal').classList.remove('active');
        }
        
        function findPlayerByNickname(nickname) {
            const playerInTop = globalPlayers.find(p => p.nickname === nickname);
            if (playerInTop) return playerInTop;
            
            const allKeys = Object.keys(localStorage);
            for (let key of allKeys) {
                if (key.startsWith('imperiaSave_')) {
                    try {
                        const data = JSON.parse(localStorage.getItem(key));
                        if (data.nickname === nickname) {
                            return {
                                deviceId: key.replace('imperiaSave_', ''),
                                nickname: data.nickname,
                                data: data
                            };
                        }
                    } catch(e) {}
                }
            }
            return null;
        }
        
        function adminGiveMoney() {
            const nick = document.getElementById('adminMoneyNick').value;
            const amount = parseInt(document.getElementById('adminMoneyAmount').value);
            
            if (!nick || !amount) {
                alert('❌ Введите ник и сумму!');
                return;
            }
            
            const player = findPlayerByNickname(nick);
            if (!player) {
                alert('❌ Игрок не найден!');
                return;
            }
            
            if (player.data) {
                player.data.gameState.balance = (player.data.gameState.balance || 0) + amount;
                player.data.gameState.totalEarned = (player.data.gameState.totalEarned || 0) + amount;
                localStorage.setItem(`imperiaSave_${player.deviceId}`, JSON.stringify(player.data));
            } else {
                const index = globalPlayers.findIndex(p => p.deviceId === player.deviceId);
                if (index >= 0) {
                    globalPlayers[index].totalEarned += amount;
                }
            }
            
            saveGlobalPlayers();
            alert(`✅ Выдано ${amount} монет игроку ${nick}`);
            closeAdminModal();
        }
        
        function adminGiveDiamonds() {
            const nick = document.getElementById('adminDiamondNick').value;
            const amount = parseInt(document.getElementById('adminDiamondAmount').value);
            
            if (!nick || !amount) {
                alert('❌ Введите ник и количество!');
                return;
            }
            
            const player = findPlayerByNickname(nick);
            if (!player || !player.data) {
                alert('❌ Игрок не найден или не в сети!');
                return;
            }
            
            player.data.gameState.diamonds = (player.data.gameState.diamonds || 0) + amount;
            localStorage.setItem(`imperiaSave_${player.deviceId}`, JSON.stringify(player.data));
            
            alert(`✅ Выдано ${amount} алмазов игроку ${nick}`);
            closeAdminModal();
        }
        
        function adminAddLevel() {
            const nick = document.getElementById('adminLevelNick').value;
            const levels = parseInt(document.getElementById('adminLevelAmount').value);
            
            if (!nick || !levels) {
                alert('❌ Введите ник и количество уровней!');
                return;
            }
            
            const player = findPlayerByNickname(nick);
            if (!player || !player.data) {
                alert('❌ Игрок не найден или не в сети!');
                return;
            }
            
            for (let i = 0; i < levels; i++) {
                player.data.gameState.level = (player.data.gameState.level || 1) + 1;
                player.data.gameState.diamonds = (player.data.gameState.diamonds || 0) + (player.data.gameState.level * 5);
            }
            localStorage.setItem(`imperiaSave_${player.deviceId}`, JSON.stringify(player.data));
            
            alert(`✅ Игроку ${nick} повышен уровень на ${levels}`);
            closeAdminModal();
        }
        
        function adminGiveCrypto() {
            const nick = document.getElementById('adminCryptoNick').value;
            const cryptoId = parseInt(document.getElementById('adminCryptoSelect').value);
            const amount = parseInt(document.getElementById('adminCryptoAmount').value);
            
            if (!nick || !amount) {
                alert('❌ Введите ник и количество!');
                return;
            }
            
            const player = findPlayerByNickname(nick);
            if (!player || !player.data) {
                alert('❌ Игрок не найден или не в сети!');
                return;
            }
            
            const cryptoIndex = player.data.gameState.crypto.findIndex(c => c.id === cryptoId);
            if (cryptoIndex >= 0) {
                player.data.gameState.crypto[cryptoIndex].owned += amount;
            } else {
                player.data.gameState.crypto.push({ id: cryptoId, owned: amount });
            }
            localStorage.setItem(`imperiaSave_${player.deviceId}`, JSON.stringify(player.data));
            
            const crypto = cryptoCurrencies.find(c => c.id === cryptoId);
            alert(`✅ Выдано ${amount} ${crypto.name} игроку ${nick}`);
            closeAdminModal();
        }
        
        function adminGiveBusiness() {
            const nick = document.getElementById('adminBusinessNick').value;
            const businessIndex = parseInt(document.getElementById('adminBusinessSelect').value);
            
            if (!nick) {
                alert('❌ Введите ник!');
                return;
            }
            
            const player = findPlayerByNickname(nick);
            if (!player || !player.data) {
                alert('❌ Игрок не найден или не в сети!');
                return;
            }
            
            const template = businessTemplates[businessIndex];
            
            if (!player.data.gameState.myBusinesses) player.data.gameState.myBusinesses = [];
            
            const ownedCount = player.data.gameState.myBusinesses.filter(b => b.templateId === template.id).length;
            if (ownedCount < 10) {
                player.data.gameState.myBusinesses.push({
                    id: Date.now() + Math.random(),
                    templateId: template.id,
                    level: 1,
                    upgradeCost: Math.floor(template.baseUpgradeCost * 2.5),
                    upgradeTime: template.upgradeTime,
                    upgradeEnd: 0,
                    lastUpgrade: 0,
                    totalEarned: 0
                });
                localStorage.setItem(`imperiaSave_${player.deviceId}`, JSON.stringify(player.data));
                alert(`✅ Игроку ${nick} выдан бизнес ${template.name}`);
            } else {
                alert('❌ У игрока уже максимум бизнесов этого типа (10)');
            }
            closeAdminModal();
        }
        
        function adminBanPlayer() {
            const nick = document.getElementById('adminPlayerNick').value;
            if (!nick) {
                alert('❌ Введите ник!');
                return;
            }
            
            const player = findPlayerByNickname(nick);
            if (!player) {
                alert('❌ Игрок не найден!');
                return;
            }
            
            if (!bannedPlayers.includes(player.deviceId)) {
                bannedPlayers.push(player.deviceId);
                localStorage.setItem('bannedPlayers', JSON.stringify(bannedPlayers));
                
                globalPlayers = globalPlayers.filter(p => p.deviceId !== player.deviceId);
                saveGlobalPlayers();
                
                alert(`✅ Игрок ${nick} заблокирован`);
            } else {
                alert('❌ Игрок уже заблокирован');
            }
            closeAdminModal();
        }
        
        function adminUnbanPlayer() {
            const nick = document.getElementById('adminPlayerNick').value;
            if (!nick) {
                alert('❌ Введите ник!');
                return;
            }
            
            const player = findPlayerByNickname(nick);
            if (!player) {
                alert('❌ Игрок не найден!');
                return;
            }
            
            bannedPlayers = bannedPlayers.filter(id => id !== player.deviceId);
            localStorage.setItem('bannedPlayers', JSON.stringify(bannedPlayers));
            
            alert(`✅ Игрок ${nick} разблокирован`);
            closeAdminModal();
        }
        
        function adminResetPlayer() {
            const nick = document.getElementById('adminPlayerNick').value;
            if (!nick) {
                alert('❌ Введите ник!');
                return;
            }
            
            const player = findPlayerByNickname(nick);
            if (!player || !player.data) {
                alert('❌ Игрок не найден или не в сети!');
                return;
            }
            
            player.data.gameState.balance = 0;
            player.data.gameState.diamonds = 10;
            player.data.gameState.exp = 0;
            player.data.gameState.level = 1;
            player.data.gameState.clickPowerLevel = 0;
            player.data.gameState.autoClickerLevel = 0;
            player.data.gameState.critLevel = 0;
            player.data.gameState.totalClicks = 0;
            player.data.gameState.totalEarned = 0;
            player.data.gameState.myBusinesses = [];
            player.data.gameState.crypto = cryptoCurrencies.map(c => ({ id: c.id, owned: 0 }));

            localStorage.setItem(`imperiaSave_${player.deviceId}`, JSON.stringify(player.data));

        function adminGiveSpecial() {
            const nick = document.getElementById('adminSpecialNick').value;
            if (!nick) {
                alert('❌ Введите ник!');
                return;
            }
            
            const player = findPlayerByNickname(nick);
            if (!player || !player.data) {
                alert('❌ Игрок не найден или не в сети!');
                return;
            }
            
            player.data.gameState.specialItem = { owned: true, revealed: true };
            localStorage.setItem(`imperiaSave_${player.deviceId}`, JSON.stringify(player.data));
            
            const topIndex = globalPlayers.findIndex(p => p.deviceId === player.deviceId);
            if (topIndex >= 0) {
                globalPlayers[topIndex].hasSpecialItem = true;

            saveGlobalPlayers();
            
            alert(`✅ Игроку ${nick} выдана супер-монета Suguru Coin!`);

        }
        
        // ========== АВТОМАТИЧЕСКИЙ ДОХОД ==========
        setInterval(() => {
            if (!gameState) return;
            
            let income = 0;
            
            if (gameState.autoClickerLevel > 0) {
                income += gameState.autoClickerLevel;
            }
            
            if (gameState.myBusinesses && gameState.myBusinesses.length > 0) {
                gameState.myBusinesses.forEach(b => {
                    const t = businessTemplates[b.templateId];
                    if (b.level > 0 && t) {
                        const inc = t.baseIncome * b.level;
                        income += inc;
                        b.totalEarned = (b.totalEarned || 0) + inc;
                    }
                });
            }
            
            if (gameState.crypto && cryptoPrices) {
                gameState.crypto.forEach(c => {
                    if (c.owned > 0) {
                        const cryptoData = cryptoCurrencies.find(cr => cr.id === c.id);
                        if (cryptoData) {
                            const price = cryptoPrices[c.id] || cryptoData.basePrice;
                            income += (price / 2000) * c.owned;
                        }
                    }
                });
            }
            
            if (gameState.specialItem && gameState.specialItem.owned) {
                income += 777;
            }
            
            if (income > 0) {
                gameState.balance = (gameState.balance || 0) + income;
                gameState.totalEarned = (gameState.totalEarned || 0) + income;
            }
            
            gameState.playTime = (gameState.playTime || 0) + 1;
            
            updateUI();
            saveGame();
        }, 1000);
        
        // Обновление цен крипты каждые 5 минут
        setInterval(() => {
            if (gameState) {
                updateCryptoPrices();
                const activeTab = document.querySelector('.nav-item.active');
                if (activeTab && activeTab.dataset.tab === 'crypto') {
                    renderTab('crypto');
                }
            }
        }, 300000);
        
        // Обновление топа каждые 30 секунд
        setInterval(() => {
            if (gameState) {
                updateGlobalPlayer();
                const activeTab = document.querySelector('.nav-item.active');
                if (activeTab && activeTab.dataset.tab === 'top') {
                    renderTab('top');
                }
            }
        }, 30000);
        
        // Проверка улучшений
        setInterval(checkBusinessUpgrades, 1000);
        
        // ========== НАВИГАЦИЯ ==========
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                if (!gameState) return;
                
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                this.classList.add('active');
                renderTab(this.dataset.tab);
            });
        });
        
        // ========== ЗАПУСК ==========
        window.onload = function() {
            loadGlobalPlayers();
            
            if (loadGame()) {
                document.getElementById('username').innerHTML = `👑 ${currentUser}`;
                if (currentUser === ADMIN_NICK) {
                    grantAdmin();
                }
                updateUI();
                renderTab('home');
                updateGlobalPlayer();
            } else {
                startNewGame();
            }
            
            // Глобальные функции
            window.handleClick = handleClick;
            window.showNicknameModal = showNicknameModal;
            window.closeNicknameModal = closeNicknameModal;
            window.saveNickname = saveNickname;
            window.toggleSound = toggleSound;
            window.toggleEffects = toggleEffects;
            window.buySpecialItem = buySpecialItem;
            window.showAdminPanel = showAdminPanel;
            window.closeAdminModal = closeAdminModal;
            window.adminGiveMoney = adminGiveMoney;
            window.adminGiveDiamonds = adminGiveDiamonds;
            window.adminAddLevel = adminAddLevel;
            window.adminGiveCrypto = adminGiveCrypto;
            window.adminGiveBusiness = adminGiveBusiness;
            window.adminBanPlayer = adminBanPlayer;
            window.adminUnbanPlayer = adminUnbanPlayer;
            window.adminResetPlayer = adminResetPlayer;
            window.adminRemoveFromTop = adminRemoveFromTop;
            window.adminGiveSpecial = adminGiveSpecial;
            window.openTradeModal = openTradeModal;
            window.closeTradeModal = closeTradeModal;
            window.executeTrade = executeTrade;
            window.openBuyBusinessModal = openBuyBusinessModal;
            window.buyBusinessFromModal = buyBusinessFromModal;
            window.openBusiness = openBusiness;
            window.startUpgrade = startUpgrade;
            window.sellBusiness = sellBusiness;
            window.closeBusinessModal = closeBusinessModal;
            window.showCollection = showCollection;
            window.buyCollectionItem = buyCollectionItem;
            window.closeCollectionModal = closeCollectionModal;
            window.buyUpgrade = buyUpgrade;
            window.exchangeDiamonds = exchangeDiamonds;
            window.resetGame = resetGame;
        };
    </script>
