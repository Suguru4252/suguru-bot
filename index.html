        function formatNumber(num) {
            if (num >= 1e12) return (num / 1e12).toFixed(2) + 'T';
            if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(2) + 'K';
            return Math.floor(num).toString();
        }
        
        function formatFullNumber(num) {
            return Math.floor(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }
        
        // ========== ТОП-100 ==========
        function loadTopPlayers() {
            const saved = localStorage.getItem('imperiaTopPlayers');
            if (saved) {
                try {
                    topPlayers = JSON.parse(saved);
                } catch(e) {
                    topPlayers = [];
                }
            } else {
                topPlayers = [];
            }
            
            // Убеждаемся, что у каждого игрока есть deviceId
            topPlayers = topPlayers.filter(p => p.deviceId);
        }
        
        function saveTopPlayers() {
            topPlayers.sort((a, b) => b.totalEarned - a.totalEarned);
            if (topPlayers.length > 100) {
                topPlayers = topPlayers.slice(0, 100);
            }
            localStorage.setItem('imperiaTopPlayers', JSON.stringify(topPlayers));
        }
        
        function updateTopPlayers() {
            if (!gameState) return;
            
            const existingIndex = topPlayers.findIndex(p => p.deviceId === currentUserId);
            
            const playerData = {
                deviceId: currentUserId,
                nickname: currentUser,
                totalEarned: gameState.totalEarned || 0,
                lastUpdate: Date.now(),
                lastRewardWeek: gameState.lastWeeklyReward || 0
            };
            
            if (existingIndex >= 0) {
                // Обновляем существующего игрока
                topPlayers[existingIndex] = playerData;
            } else {
                // Добавляем нового игрока
                topPlayers.push(playerData);
            }
            
            // Удаляем возможные дубликаты (на всякий случай)
            const uniquePlayers = [];
            const seen = new Set();
            for (const player of topPlayers) {
                if (!seen.has(player.deviceId)) {
                    seen.add(player.deviceId);
                    uniquePlayers.push(player);
                }
            }
            topPlayers = uniquePlayers;
            
            saveTopPlayers();
        }
        
        function getPlayerRank() {
            const index = topPlayers.findIndex(p => p.deviceId === currentUserId);
            return index >= 0 ? index + 1 : topPlayers.length + 1;
        }
        
        // ========== ЕЖЕНЕДЕЛЬНЫЕ НАГРАДЫ ==========
        function checkWeeklyRewards() {
            if (!gameState || topPlayers.length === 0) return;
            
            const now = new Date();
            const day = now.getDay(); // 0 = воскресенье
            const hours = now.getHours();
            const minutes = now.getMinutes();
            
            // Проверяем каждое воскресенье в 00:00
            if (day === 0 && hours === 0 && minutes === 0) {
                const oneWeek = 7 * 24 * 60 * 60 * 1000;
                
                if (now - (gameState.lastWeeklyReward || 0) > oneWeek) {
                    const myIndex = topPlayers.findIndex(p => p.deviceId === currentUserId);
                    
                    let reward = 0;
                    if (myIndex === 0) reward = 1000;
                    else if (myIndex === 1) reward = 500;
                    else if (myIndex === 2) reward = 100;
                    
                    if (reward > 0) {
                        gameState.diamonds = (gameState.diamonds || 0) + reward;
                        gameState.lastWeeklyReward = now.getTime();
                        saveGame();
                        updateUI();
                        
                        alert(`🏆 ЕЖЕНЕДЕЛЬНАЯ НАГРАДА!\n\nМесто: ${myIndex + 1}\nПолучено: ${reward}💎`);
                    }
                }
            }
        }
        
        // ========== ЗАГРУЗКА/СОХРАНЕНИЕ ==========
        function loadGame() {
            const saved = localStorage.getItem('imperiaClickerSave_' + currentUserId);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    gameState = data.gameState;
                    settings = data.settings || { soundEnabled: true, effectsEnabled: true };
                    currentUser = data.nickname || "ИГРОК";
                    
                    if (!gameState.collections) {
                        gameState.collections = JSON.parse(JSON.stringify(collectionItems));
                    }
                    
                    if (!gameState.crypto) {
                        gameState.crypto = cryptoCurrencies.map(c => ({ id: c.id, owned: 0 }));
                    }
                    
                    if (!gameState.cryptoPrices) {
                        cryptoPrices = cryptoCurrencies.map(c => c.basePrice);
                        gameState.cryptoPrices = cryptoPrices;
                    } else {
                        cryptoPrices = gameState.cryptoPrices;
                    }
                    
                    if (gameState.specialItem === undefined) {
                        gameState.specialItem = { owned: false, revealed: false };
                    }
                    
                    const now = Date.now();
                    const lastOnline = gameState.lastOnlineTime || now;
                    const secondsPassed = Math.floor((now - lastOnline) / 1000);
                    
                    if (secondsPassed > 10) {
                        calculateOfflineEarnings(secondsPassed);
                    }
                    
                    gameState.lastOnlineTime = now;
                    
                    return true;
                } catch(e) {
                    return false;
                }
            }
            return false;
        }
        
        function saveGame() {
            if (gameState) {
                gameState.lastOnlineTime = Date.now();
                gameState.cryptoPrices = cryptoPrices;
                const saveData = {
                    gameState: gameState,
                    settings: settings,
                    nickname: currentUser
                };
                localStorage.setItem('imperiaClickerSave_' + currentUserId, JSON.stringify(saveData));
                updateTopPlayers();
            }
        }
        
        function calculateOfflineEarnings(seconds) {
            let income = 0;
            
            if (gameState.autoClickerLevel > 0) {
                income += gameState.autoClickerLevel * seconds;
            }
            
            if (gameState.myBusinesses && gameState.myBusinesses.length > 0) {
                gameState.myBusinesses.forEach(b => {
                    const t = businessTemplates[b.templateId];
                    if (b.level > 0 && t) {
                        income += t.baseIncome * b.level * seconds;
                    }
                });
            }
            
            if (gameState.crypto && cryptoPrices) {
                gameState.crypto.forEach(c => {
                    const cryptoData = cryptoCurrencies.find(cr => cr.id === c.id);
                    if (c.owned > 0 && cryptoData) {
                        const price = cryptoPrices[c.id] || cryptoData.basePrice;
                        income += (price / 1000) * c.owned * seconds;
                    }
                });
            }
            
            if (gameState.specialItem && gameState.specialItem.owned) {
                income += 777 * seconds;
            }
            
            if (income > 0) {
                const earned = Math.floor(income);
                gameState.balance = (gameState.balance || 0) + earned;
                gameState.totalEarned = (gameState.totalEarned || 0) + earned;
                
                const minutes = Math.floor(seconds / 60);
                const secs = seconds % 60;
                
                setTimeout(() => {
                    alert(`⏱️ ОФФЛАЙН ДОХОД\nОтсутствовал: ${minutes} мин ${secs} сек\nЗаработано: ${formatFullNumber(earned)} монет`);
                }, 1000);
            }
        }
        
        // ========== КРИПТА ==========
        function updateCryptoPrices() {
            cryptoPrices = cryptoPrices.map((price, i) => {
                const crypto = cryptoCurrencies[i];
                const change = (Math.random() - 0.5) * 2 * crypto.volatility;
                let newPrice = price * (1 + change);
                newPrice = Math.max(newPrice, crypto.basePrice * 0.1);
                newPrice = Math.min(newPrice, crypto.basePrice * 10);
                return Math.floor(newPrice);
            });
        }
        
        // Функция для подсчета общего портфеля крипты
        function calculateTotalCryptoPortfolio() {
            if (!gameState || !cryptoPrices) return 0;
            
            let total = 0;
            gameState.crypto.forEach(c => {
                if (c.owned > 0) {
                    const cryptoData = cryptoCurrencies.find(cr => cr.id === c.id);
                    if (cryptoData) {
                        const price = cryptoPrices[c.id] || cryptoData.basePrice;
                        total += price * c.owned;
                    }
                }
            });
            return total;
        }

        function playClickSound() {
            if (!settings.soundEnabled) return;
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.value = 800;
                gainNode.gain.value = 0.1;
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.1);
            } catch(e) {}
        }
        
        function createFloatingEffect(x, y, text) {
            if (!settings.effectsEnabled) return;
            const el = document.createElement('div');
            el.className = 'floating-effect';
            el.textContent = text;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }
        
        function handleClick(event) {
            if (!gameState) return;
            
            let power = (gameState.clickPower || 1) * (1 + (gameState.clickPowerLevel || 0) * 0.5);
            
            if (Math.random() * 100 < (gameState.critLevel || 0) * 10) {
                power *= 10;
            }
            
            const earned = Math.floor(power);
            gameState.balance = (gameState.balance || 0) + earned;
            gameState.totalClicks = (gameState.totalClicks || 0) + 1;
            gameState.totalEarned = (gameState.totalEarned || 0) + earned;
            gameState.exp = (gameState.exp || 0) + earned / 100;
            
            while (gameState.exp >= (gameState.level || 1) * 1000) {
                gameState.exp -= (gameState.level || 1) * 1000;
                gameState.level = (gameState.level || 1) + 1;
                gameState.diamonds = (gameState.diamonds || 0) + (gameState.level * 5);
            }
            
            playClickSound();
            if (event) {
                createFloatingEffect(event.clientX, event.clientY, `+${earned}💰`);
            }
            
            updateUI();
            saveGame();
            renderCurrentTab();
        }

        function startUpgrade(index) {
            const business = gameState.myBusinesses[index];
            if (!business) return;
            
            const t = businessTemplates[business.templateId];
            if (!t) return;
            
            if ((business.level || 1) >= t.maxLevel) {
                alert('❌ МАКСИМАЛЬНЫЙ УРОВЕНЬ!');
                return;
            }
            
            if (business.upgradeEnd && business.upgradeEnd > Date.now()) {
                alert('⏱️ УЛУЧШЕНИЕ УЖЕ ИДЕТ!');
                return;
            }
            
            if ((gameState.balance || 0) < (business.upgradeCost || 0)) {
                alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
                return;
            }
            
            gameState.balance -= (business.upgradeCost || 0);
            
            business.lastUpgrade = Date.now();
            business.upgradeEnd = Date.now() + ((business.upgradeTime || t.upgradeTime) * 1000);
            
            saveGame();
            updateUI();
            closeBusinessModal();
            renderCurrentTab();
            
            alert(`✅ Улучшение запущено на ${business.upgradeTime || t.upgradeTime} сек.`);
            
            setTimeout(() => {
                if (business.upgradeEnd && business.upgradeEnd <= Date.now() && (business.level || 1) < t.maxLevel) {
                    business.level = (business.level || 1) + 1;
                    business.upgradeCost = Math.floor((business.upgradeCost || t.baseUpgradeCost) * 2.5);
                    business.upgradeTime = Math.floor((business.upgradeTime || t.upgradeTime) * 1.3);
                    business.upgradeEnd = 0;
                    
                    saveGame();
                    updateUI();
                    renderCurrentTab();
                    
                    alert(`✅ ${t.name} улучшен до ${business.level} уровня!`);
                }
            }, (business.upgradeTime || t.upgradeTime) * 1000);
        }

            const t = businessTemplates[business.templateId];
            if (!t) return;
            
            let totalSpent = t.baseUpgradeCost;
            let currentCost = t.baseUpgradeCost;
            for (let i = 1; i < (business.level || 1); i++) {
                currentCost = Math.floor(currentCost * 2.5);
                totalSpent += currentCost;
            }
            
            const sellPrice = Math.floor(totalSpent * 0.5);

                alert(`✅ Продано! +${formatFullNumber(sellPrice)}💰`);

            gameState.myBusinesses.forEach(business => {

            const totalPrice = currentPrice * numAmount;

                totalIncome += 777;
            }
            
            const ownedBusinesses = gameState.myBusinesses ? gameState.myBusinesses.length : 0;
            
            let totalCollections = 0;
            for (let key in gameState.collections) {
                totalCollections += gameState.collections[key].filter(i => i.owned).length;
            }
            
            let totalCrypto = gameState.crypto.reduce((sum, c) => sum + c.owned, 0);
            let totalPortfolio = calculateTotalCryptoPortfolio();
            
            const myRank = getPlayerRank();
            
            content.innerHTML = `
                <div class="card">
                    <div class="card-title">📊 СТАТИСТИКА</div>
                    
                    <div class="property-item" style="justify-content:space-between;">
                        <span>👆 ВСЕГО КЛИКОВ</span>
                        <span style="color:#ffd700;">${formatFullNumber(gameState.totalClicks || 0)}</span>
                    </div>
                    <div class="property-item" style="justify-content:space-between;">
                        <span>💰 ЗАРАБОТАНО</span>
                        <span style="color:#ffd700;">${formatFullNumber(gameState.totalEarned || 0)}</span>
                    </div>
                    <div class="property-item" style="justify-content:space-between;">
                        <span>⏱️ ДОХОД/СЕК</span>
                        <span style="color:#ffd700;">${formatFullNumber(Math.floor(totalIncome))}</span>
                    </div>
                    <div class="property-item" style="justify-content:space-between;">
                        <span>💼 БИЗНЕСОВ</span>
                        <span style="color:#ffd700;">${ownedBusinesses}/100</span>
                    </div>
                    <div class="property-item" style="justify-content:space-between;">
                        <span>🎨 КОЛЛЕКЦИЯ</span>
                        <span style="color:#ffd700;">${totalCollections}/100+</span>
                    </div>
                    <div class="property-item" style="justify-content:space-between;">
                        <span>📈 КРИПТА (шт)</span>
                        <span style="color:#ffd700;">${formatFullNumber(totalCrypto)} монет</span>
                    </div>
                    <div class="property-item" style="justify-content:space-between;">
                        <span>💰 ПОРТФЕЛЬ</span>
                        <span style="color:#ffd700;">${formatFullNumber(totalPortfolio)}</span>
                    </div>
                    <div class="property-item" style="justify-content:space-between;">
                        <span>🏆 МЕСТО В ТОПЕ</span>
                        <span style="color:#ffd700;">${myRank}</span>
                    </div>
                    <div class="property-item" style="justify-content:space-between;">
                        <span>🎮 В ИГРЕ</span>
                        <span style="color:#ffd700;">${Math.floor((gameState.playTime || 0) / 60)} МИН</span>
                    </div>
                    <div class="property-item" style="justify-content:space-between;">
                        <span>💎 АЛМАЗЫ</span>
                        <span style="color:#ffd700;">${gameState.diamonds || 0}</span>
                    </div>
                    
                    <div style="margin-top:20px;">
                        <button class="btn btn-danger" onclick="resetGame()">🔄 СБРОСИТЬ ПРОГРЕСС</button>
                    </div>
                </div>
            `;
        }
        
        // ========== НАСТРОЙКИ ==========
        function renderSettings(content) {
            content.innerHTML = `
                <div class="card">
                    <div class="card-title">⚙️ НАСТРОЙКИ</div>
                    
                    <div class="settings-group">
                        <div class="settings-item">
                            <span class="settings-label">🔊 ЗВУК КЛИКА</span>
                            <div class="settings-switch ${settings.soundEnabled ? 'active' : ''}" onclick="toggleSound()"></div>
                        </div>
                        <div class="settings-item">
                            <span class="settings-label">✨ ЭФФЕКТЫ</span>
                            <div class="settings-switch ${settings.effectsEnabled ? 'active' : ''}" onclick="toggleEffects()"></div>
                        </div>
                    </div>
                    
                    <div class="settings-group">
                        <div class="btn btn-gold" onclick="showNicknameModal()">✏️ ИЗМЕНИТЬ НИК</div>
                    </div>
                    
                    <div class="warning-box" style="margin-top:20px;">
                        <h3>⚠️ ВНИМАНИЕ!</h3>
                        <p style="color:#ff9999; font-size:14px;">
                            Все данные хранятся локально на этом устройстве.<br>
                            При удалении игры прогресс НЕ ВОССТАНАВЛИВАЕТСЯ.
                        </p>
                    </div>
                    
                    <div style="margin-top:30px; text-align:center;">
                        <div class="info-text">📅 ИЗДАНИЕ 2026</div>
                        <div class="info-text">👨‍💻 СОЗДАТЕЛИ: SuguruStudio</div>
                        <div class="info-text">🔧 ВЕРСИЯ: ${APP_VERSION}</div>
                        <div class="info-text"><a href="#" class="footer-link" onclick="alert('Политика конфиденциальности'); return false;">🔒 ПОЛИТИКА</a></div>
                    </div>
                </div>
            `;
        }
        
        function toggleSound() {
            settings.soundEnabled = !settings.soundEnabled;
            saveGame();
            renderCurrentTab();
        }
        
        function toggleEffects() {
            settings.effectsEnabled = !settings.effectsEnabled;
            saveGame();
            renderCurrentTab();
        }
        
        function showNicknameModal() {
            document.getElementById('nicknameInput').value = currentUser || '';
            document.getElementById('nicknameModal').classList.add('active');
        }
        
        function closeNicknameModal() {
            document.getElementById('nicknameModal').classList.remove('active');
        }
        
        function saveNickname() {
            const newNick = document.getElementById('nicknameInput').value.trim();
            if (!newNick) return;
            
            currentUser = newNick;
            document.getElementById('username').innerHTML = `👑 ${newNick} <span class="warning-badge">⚠️ ЛОКАЛЬНО</span>`;
            
            saveGame();
            closeNicknameModal();
            renderCurrentTab();
            updateTopPlayers();
        }
        
        function resetGame() {
            if (confirm('ТОЧНО СБРОСИТЬ ВЕСЬ ПРОГРЕСС?\n\nЭто действие необратимо!')) {
                localStorage.removeItem('imperiaClickerSave_' + currentUserId);
                localStorage.removeItem('imperiaTopPlayers');
                location.reload();
            }
        }
        
        // ========== АВТОМАТИЧЕСКИЙ ДОХОД ==========
        setInterval(() => {
            if (!gameState) return;
            
            let income = 0;
            
            if (gameState.autoClickerLevel > 0) {
                income += gameState.autoClickerLevel;
            }
            
            if (gameState.myBusinesses && gameState.myBusinesses.length > 0) {
                gameState.myBusinesses.forEach(b => {
                    const t = businessTemplates[b.templateId];
                    if (b.level > 0 && t) {
                        const inc = t.baseIncome * b.level;
                        income += inc;
                        b.totalEarned = (b.totalEarned || 0) + inc;
                    }
                });
            }
            
            if (gameState.crypto && cryptoPrices) {
                gameState.crypto.forEach(c => {
                    if (c.owned > 0) {
                        const cryptoData = cryptoCurrencies.find(cr => cr.id === c.id);
                        if (cryptoData) {
                            const price = cryptoPrices[c.id] || cryptoData.basePrice;
                            income += (price / 1000) * c.owned;
                        }
                    }
                });
            }
            
            if (gameState.specialItem && gameState.specialItem.owned) {
                income += 777;
            }
            
            if (income > 0) {
                gameState.balance = (gameState.balance || 0) + income;
                gameState.totalEarned = (gameState.totalEarned || 0) + income;
            }
            
            gameState.playTime = (gameState.playTime || 0) + 1;
            
            updateUI();
            saveGame();
        }, 1000);
        
        // Обновление цен крипты каждые 10 минут (600000 мс)
        setInterval(() => {
            if (gameState) {
                updateCryptoPrices();
                // Если открыт раздел крипты, обновляем отображение
                const activeTab = document.querySelector('.nav-item.active');
                if (activeTab && activeTab.dataset.tab === 'crypto') {
                    renderTab('crypto');
                }
            }
        }, 600000);
        
        // Обновление топа каждые 30 секунд
        setInterval(() => {
            if (gameState) {
                updateTopPlayers();
                const activeTab = document.querySelector('.nav-item.active');
                if (activeTab && activeTab.dataset.tab === 'top') {
                    renderTab('top');
                }
            }
        }, 30000);
        
        // Проверка недельных наград каждый час
        setInterval(() => {
            if (gameState) {
                checkWeeklyRewards();
            }
        }, 3600000);
        
        // Проверка улучшений
        setInterval(checkBusinessUpgrades, 1000);
        
        // ========== НАВИГАЦИЯ ==========
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                if (!gameState) return;
                
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                this.classList.add('active');
                renderTab(this.dataset.tab);
            });
        });
        
        // ========== ЗАПУСК ==========
        window.onload = function() {
            loadTopPlayers();
            
            if (loadGame()) {
                document.getElementById('header').style.display = 'block';
                document.getElementById('bottomNav').style.display = 'flex';
                document.getElementById('username').innerHTML = `👑 ${currentUser} <span class="warning-badge">⚠️ ЛОКАЛЬНО</span>`;
                
                updateUI();
                renderTab('home');
                updateTopPlayers();
                checkWeeklyRewards();
            } else {
                showWelcomeScreen();
            }
            
            window.handleClick = handleClick;
            window.openBuyBusinessModal = openBuyBusinessModal;
            window.buyBusinessFromModal = buyBusinessFromModal;
            window.openBusiness = openBusiness;
            window.startUpgrade = startUpgrade;
            window.sellBusiness = sellBusiness;
            window.closeBusinessModal = closeBusinessModal;
            window.renderCrypto = renderCrypto;
            window.buyCrypto = buyCrypto;
            window.sellCrypto = sellCrypto;
            window.buySpecialItem = buySpecialItem;
            window.showCollection = showCollection;
            window.buyCollectionItem = buyCollectionItem;
            window.closeCollectionModal = closeCollectionModal;
            window.showCryptoPortfolio = showCryptoPortfolio;
            window.closePortfolioModal = closePortfolioModal;
            window.buyUpgrade = buyUpgrade;
            window.exchangeDiamonds = exchangeDiamonds;
            window.resetGame = resetGame;
            window.showNicknameModal = showNicknameModal;
            window.closeNicknameModal = closeNicknameModal;
            window.saveNickname = saveNickname;
            window.toggleSound = toggleSound;
            window.toggleEffects = toggleEffects;
        };
    </script>
</body>
</html>
